let answers = new Array(questions.length).fill(null);
let answered = 0;
let submitted = false;

function buildQuiz() {
  const quiz = document.getElementById('quiz');
  quiz.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    const diffs = [1,2,3].map(d => `<div class="diff-dot ${d <= q.diff ? 'on' : ''}"></div>`).join('');
    let codeHtml = '';
    if (q.code) codeHtml = `<div class="code-block">${q.code}</div>`;
    card.innerHTML = `
      <div class="card-meta">
        <span class="tema-pill">${q.tema} آ· ${q.sub}</span>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="difficulty" title="Dificultad">${diffs}</div>
          <span class="q-idx">${String(i+1).padStart(2,'0')}/${questions.length}</span>
        </div>
      </div>
      <div class="q-text">${q.text}</div>
      ${codeHtml}
      <div class="options" id="opts-${i}">
        ${q.opts.map((o, j) => `
          <div class="option" id="opt-${i}-${j}" onclick="selectOption(${i},${j})">
            <div class="opt-key">${letters[j]}</div>
            <span class="opt-text">${o}</span>
          </div>`).join('')}
      </div>
      <div class="explanation" id="exp-${i}">${q.exp}</div>
    `;
    quiz.appendChild(card);
  });
}

function selectOption(qi, oi) {
  if (submitted) return;
  if (answers[qi] !== null) {
    document.getElementById(`opt-${qi}-${answers[qi]}`).classList.remove('selected');
  } else {
    answered++;
    document.getElementById('h-ans').textContent = answered;
    document.getElementById('prog-fill').style.width = `${(answered/questions.length)*100}%`;
  }
  answers[qi] = oi;
  document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
  document.getElementById('submit-btn').disabled = answered < questions.length;
}

function submitQuiz() {
  if (submitted) return;
  submitted = true;
  document.getElementById('submit-btn').disabled = true;

  let correct = 0;
  const wrongMap = {};

  questions.forEach((q, i) => {
    const ua = answers[i];
    const opts = document.querySelectorAll(`#opts-${i} .option`);
    opts.forEach(o => o.style.cursor = 'default');

    if (ua === q.correct) {
      opts[ua].classList.remove('selected'); opts[ua].classList.add('correct');
      correct++;
    } else {
      opts[ua].classList.remove('selected'); opts[ua].classList.add('incorrect');
      opts[q.correct].classList.add('show-correct');
      if (!wrongMap[q.tema]) wrongMap[q.tema] = { sub: new Set(), n: 0, diff: 0 };
      wrongMap[q.tema].sub.add(q.sub);
      wrongMap[q.tema].n++;
      wrongMap[q.tema].diff = Math.max(wrongMap[q.tema].diff, q.diff);
    }

    const exp = document.getElementById(`exp-${i}`);
    exp.classList.add('show', ua === q.correct ? 'ok' : 'fail');
  });

  document.getElementById('h-cor').textContent = correct;
  document.getElementById('h-wrg').textContent = questions.length - correct;
  document.getElementById('r-score').textContent = `${correct}/${questions.length}`;
  const pct = Math.round((correct/questions.length)*100);
  document.getElementById('r-pct').textContent = `${pct}%`;

  if (pct >= 80) v = { e: 'ًںژ¯', t: 'Rendimiento excelente', m: 'Dominas el temario al nivel requerido para el examen. Repasa las أ،reas marcadas para alcanzar la perfecciأ³n.' };
  else if (pct >= 60) v = { e: 'ًں“—', t: 'Buen rendimiento', m: 'Tienes una base sأ³lida. Dedica tiempo extra a los temas seأ±alados para consolidar el aprobado con nota.' };
  else if (pct >= 40) v = { e: 'âڑ ï¸ڈ', t: 'Rendimiento mejorable', m: 'Hay conceptos importantes que no estأ،n bien asentados. Es fundamental repasar las sesiones indicadas antes del examen.' };
  else v = { e: 'ًں”´', t: 'Repaso urgente necesario', m: 'El nivel actual no es suficiente para el examen. Revisa el temario completo comenzando por los temas con mأ،s errores.' };

    'TEMA 1': { icon: 'ًں–¥ï¸ڈ', t: 'Arquitectura y Computadores', s: 'Sesiأ³n 1 آ· Von Neumann, buses, registros, ciclo instrucciأ³n, jerarquأ­a memoria' },
    'TEMA 2': { icon: 'âڑ،', t: 'Lأ³gica Digital y Sistemas Numأ©ricos', s: 'Sesiones 2, 3, 4 آ· Compuertas, Boole, K-maps, conversiones, BCD, Gray' },
    'TEMA 3': { icon: 'ًں”§', t: 'Circuitos Combinacionales', s: 'Sesiones 5, 6, 7 آ· Sumadores, MUX, codificadores, decodificadores, comparadores' },
    'TEMA 4': { icon: 'ًں”„', t: 'Circuitos Secuenciales', s: 'Sesiones 8, 9, 10 آ· Latches, FFs, registros, contadores, FSM, tabla excitaciأ³n' },
    'TEMA 5': { icon: 'ًں’»', t: 'Lenguaje Ensamblador', s: 'Sesiones 11, 12 آ· NASM, segmentos, registros x86, instrucciones, INT 21h, flags' },
  };

  if (Object.keys(wrongMap).length === 0) {
    body.innerHTML = '<div class="repaso-row"><div class="r-icon">âœ¨</div><div class="r-info"><div class="rt">Sin أ،reas de mejora â€” rendimiento perfecto</div><div class="rs">Has respondido todas las preguntas correctamente en el nivel avanzado.</div></div></div>';
  } else {
    Object.keys(wrongMap).sort().forEach(tema => {
      const info = tInfo[tema] || { icon: 'ًں“Œ', t: tema, s: 'Revisa las sesiones correspondientes' };
      const d = wrongMap[tema];
      const stars = 'â­گ'.repeat(d.diff);
      const row = document.createElement('div');
      row.className = 'repaso-row';
      row.innerHTML = `
        <div class="r-icon">${info.icon}</div>
        <div class="r-info">
          <div class="rt">${info.t}</div>
          <div class="rs">Subtemas con errores: ${[...d.sub].join(' آ· ')}</div>
          <div class="rs">Dificultad mأ،xima fallada: ${stars}</div>
          <div class="rs" style="margin-top:4px">Repasar: ${info.s}</div>
          <span class="r-count-badge">${d.n} error(es) en este tema</span>
        </div>
      `;
      body.appendChild(row);
    });
  }

  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
  answers = new Array(questions.length).fill(null);
  answered = 0;
  submitted = false;
  ['h-ans','h-cor','h-wrg'].forEach(id => document.getElementById(id).textContent = id==='h-ans' ? '0' : 'â€”');
  document.getElementById('prog-fill').style.width = '0%';
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('results').classList.remove('show');
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
