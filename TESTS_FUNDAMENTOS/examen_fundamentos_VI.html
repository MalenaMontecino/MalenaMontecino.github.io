<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examen VI — Fundamentos de Computadores</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0e1410;
    --paper: #f4f8f5;
    --accent: #1a4d2e;
    --accent2: #c0441a;
    --muted: #6e8070;
    --correct: #1a6b3c;
    --wrong: #b5451b;
    --rule: #cdd8cf;
    --chip-bg: #eaf0eb;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'IBM Plex Sans', system-ui, sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--paper); color: var(--ink); min-height: 100vh; padding: 0 0 80px; }

  header { background: var(--accent); color: var(--paper); padding: 40px 48px 32px; position: relative; overflow: hidden; }
  header::after { content: 'VI'; position: absolute; right: 36px; bottom: -10px; font-family: var(--serif); font-size: 130px; opacity: .07; line-height: 1; pointer-events: none; }
  .header-inner { position: relative; max-width: 820px; margin: 0 auto; }
  .header-tag { font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: rgba(244,248,245,.5); margin-bottom: 12px; }
  h1 { font-family: var(--serif); font-size: clamp(26px,5vw,46px); line-height: 1.1; margin-bottom: 8px; }
  .header-sub { font-size: 14px; color: rgba(244,248,245,.5); font-weight: 300; margin-bottom: 28px; }
  .meta-pills { display: flex; gap: 10px; flex-wrap: wrap; }
  .pill { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.18); border-radius: 3px; padding: 4px 12px; font-size: 12px; font-family: var(--mono); }

  .progress-bar-wrap { background: var(--accent); padding: 0 48px 18px; }
  .progress-bar-inner { max-width: 820px; margin: 0 auto; }
  .progress-track { height: 2px; background: rgba(255,255,255,.18); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent2); border-radius: 2px; width: 0%; transition: width .4s ease; }
  .progress-label { font-size: 11px; font-family: var(--mono); color: rgba(244,248,245,.35); margin-top: 7px; display: flex; justify-content: space-between; }

  main { max-width: 820px; margin: 0 auto; padding: 0 24px; }

  .section-divider { display: flex; align-items: center; gap: 14px; margin: 48px 0 22px; }
  .section-divider-line { flex: 1; height: 1px; background: var(--rule); }
  .section-divider-label { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }

  .q-card { background: white; border: 1px solid var(--rule); border-radius: 6px; margin-bottom: 14px; overflow: hidden; transition: box-shadow .2s; }
  .q-card:hover { box-shadow: 0 3px 18px rgba(0,0,0,.07); }
  .q-header { display: flex; align-items: flex-start; gap: 14px; padding: 20px 22px 0; }
  .q-num { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--accent); background: #e4f0e8; border: 1px solid #b0ccb8; border-radius: 3px; padding: 2px 8px; white-space: nowrap; margin-top: 2px; flex-shrink: 0; }
  .q-text { font-size: 15px; font-weight: 500; line-height: 1.5; color: var(--ink); padding-bottom: 14px; }
  .q-table { margin: 0 22px 14px; border-collapse: collapse; font-family: var(--mono); font-size: 13px; }
  .q-table th { background: var(--accent); color: white; padding: 6px 18px; text-align: center; font-weight: 500; }
  .q-table td { padding: 6px 18px; text-align: center; border-bottom: 1px solid var(--rule); color: #333; }
  .q-table tr:nth-child(even) td { background: #f2f7f3; }
  .q-code { font-family: var(--mono); font-size: 13px; background: #0e1c12; color: #c8dcc8; border-radius: 5px; padding: 12px 16px; margin: 0 22px 14px; white-space: pre; overflow-x: auto; line-height: 1.7; border-left: 3px solid var(--accent2); }

  .options { padding: 0 14px 14px; display: flex; flex-direction: column; gap: 6px; }
  .opt { display: flex; align-items: flex-start; gap: 12px; padding: 10px 12px; border-radius: 5px; border: 1.5px solid transparent; cursor: pointer; transition: all .15s; font-size: 14px; line-height: 1.45; background: var(--chip-bg); }
  .opt:hover { border-color: var(--accent); background: #d8eadc; }
  .opt-letter { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--muted); min-width: 18px; margin-top: 1px; flex-shrink: 0; }
  .opt.correct { border-color: var(--correct) !important; background: #e8f4ee !important; }
  .opt.correct .opt-letter { color: var(--correct) !important; font-weight: 700; }
  .opt.wrong { border-color: var(--wrong) !important; background: #fdf0eb !important; }
  .opt.wrong .opt-letter { color: var(--wrong) !important; font-weight: 700; }
  .opt.show-correct { border-color: var(--correct) !important; background: #e8f4ee !important; }
  .opt.show-correct .opt-letter { color: var(--correct) !important; }
  .opt.disabled { cursor: default; pointer-events: none; }

  .feedback { margin: 0 14px 14px; padding: 10px 14px; border-radius: 5px; font-size: 13px; line-height: 1.6; display: none; }
  .feedback.show { display: block; }
  .feedback.ok { background: #e8f4ee; border: 1px solid #9fcfb4; color: #0d4d28; }
  .feedback.fail { background: #fdf0eb; border: 1px solid #e8b49a; color: #7a2e0a; }
  .feedback strong { font-weight: 600; }

  .results { display: none; background: var(--ink); color: var(--paper); border-radius: 8px; padding: 40px; margin: 40px 0; text-align: center; position: relative; overflow: hidden; }
  .results::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 40% 60%, rgba(26,77,46,.5) 0%, transparent 60%); }
  .results.show { display: block; }
  .results-inner { position: relative; }
  .results-score { font-family: var(--serif); font-size: 80px; line-height: 1; color: #7ed4a0; margin-bottom: 2px; }
  .results-label { font-size: 12px; color: rgba(244,248,245,.4); font-family: var(--mono); margin-bottom: 20px; letter-spacing: .06em; }
  .results-msg { font-size: 16px; font-weight: 300; color: rgba(244,248,245,.8); margin-bottom: 28px; line-height: 1.55; }
  .results-breakdown { display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; margin-bottom: 28px; }
  .breakdown-item { text-align: center; }
  .breakdown-num { font-family: var(--serif); font-size: 32px; }
  .breakdown-num.g { color: #6fcf97; }
  .breakdown-num.r { color: #eb8c6a; }
  .breakdown-sub { font-size: 10px; font-family: var(--mono); color: rgba(244,248,245,.35); text-transform: uppercase; letter-spacing: .1em; margin-top: 2px; }

  .btn-submit { display: block; width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 5px; font-family: var(--sans); font-size: 14px; font-weight: 600; cursor: pointer; margin: 24px 0 0; transition: background .15s; letter-spacing: .02em; }
  .btn-submit:hover { background: #0f3020; }
  .btn-submit:disabled { background: var(--muted); cursor: default; }
  .btn-reset { display: inline-block; padding: 10px 24px; background: rgba(255,255,255,.08); color: var(--paper); border: 1px solid rgba(255,255,255,.18); border-radius: 5px; font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; transition: background .15s; }
  .btn-reset:hover { background: rgba(255,255,255,.15); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-tag">Simulacro de examen · Serie VI</div>
    <h1>Fundamentos de Computadores</h1>
    <div class="header-sub">Grado en Ciberseguridad · VIU · Dra. Zulaima Chiquin</div>
    <div class="meta-pills">
      <span class="pill">25 preguntas</span>
      <span class="pill">Tipo test · una respuesta correcta</span>
      <span class="pill">Todos los temas</span>
    </div>
  </div>
</header>
<div class="progress-bar-wrap">
  <div class="progress-bar-inner">
    <div class="progress-track"><div class="progress-fill" id="prog"></div></div>
    <div class="progress-label">
      <span id="prog-done">0 respondidas</span>
      <span id="prog-pct">0 %</span>
    </div>
  </div>
</div>

<main>
  <div id="quiz"></div>
  <button class="btn-submit" id="btn-submit" disabled onclick="submit()">Ver resultados</button>
  <div class="results" id="results">
    <div class="results-inner">
      <div class="results-score" id="r-score">—</div>
      <div class="results-label">respuestas correctas de 25</div>
      <div class="results-msg" id="r-msg"></div>
      <div class="results-breakdown">
        <div class="breakdown-item"><div class="breakdown-num g" id="r-ok">—</div><div class="breakdown-sub">Correctas</div></div>
        <div class="breakdown-item"><div class="breakdown-num r" id="r-ko">—</div><div class="breakdown-sub">Incorrectas</div></div>
        <div class="breakdown-item"><div class="breakdown-num" id="r-pct">—</div><div class="breakdown-sub">Porcentaje</div></div>
      </div>
      <button class="btn-reset" onclick="reset()">↺ Intentarlo de nuevo</button>
    </div>
  </div>
</main>

<script>
const Q = [
  // ── TEMA 1 ────────────────────────────────────────────────────────────────
  {
    sec: "Tema 1 — Introducción a los Computadores",
    q: "¿Qué ocurre con el Contador de Programa (PC) después de la fase Fetch?",
    opts: [
      "Se borra para preparar la siguiente instrucción.",
      "Se incrementa automáticamente para apuntar a la siguiente instrucción.",
      "Se copia en el Registro de Instrucción (IR).",
      "Espera a que la ALU termine antes de actualizarse."
    ],
    ans: 1,
    exp: "Tras cada Fetch, el PC se incrementa en el tamaño de la instrucción leída para apuntar a la siguiente. Así el programa avanza en secuencia. Los saltos (JMP, CALL) son los únicos que rompen esta secuencia cargando un nuevo valor en el PC."
  },
  {
    sec: "Tema 1 — Introducción a los Computadores",
    q: "¿Qué componente del procesador almacena la instrucción que se está decodificando en este momento?",
    opts: [
      "El Contador de Programa (PC).",
      "El puntero de pila (SP).",
      "El Registro de Instrucción (IR).",
      "El registro acumulador (AX)."
    ],
    ans: 2,
    exp: "El IR (Instruction Register) contiene la instrucción que fue leída en el Fetch y está siendo interpretada por la Unidad de Control. El PC apunta a la SIGUIENTE instrucción; el IR contiene la ACTUAL que se está procesando."
  },
  {
    sec: "Tema 1 — Introducción a los Computadores",
    q: "¿Cuál de estas afirmaciones sobre la memoria RAM es correcta?",
    opts: [
      "Es no volátil: conserva los datos cuando se apaga el ordenador.",
      "Es volátil: pierde los datos cuando se apaga el ordenador.",
      "Es más lenta que el disco duro.",
      "Almacena instrucciones pero no datos."
    ],
    ans: 1,
    exp: "La RAM es volátil: sin corriente, los datos desaparecen. Por eso cuando reinicias el ordenador los programas que tenías abiertos no están. El almacenamiento (SSD/HDD) es no volátil y persiste. En Von Neumann, la RAM almacena tanto datos como instrucciones."
  },
  // ── TEMA 2 — ÁLGEBRA ──────────────────────────────────────────────────────
  {
    sec: "Tema 2 — Álgebra de Boole",
    q: "Simplifica: F = A·B + A·B̄",
    opts: ["F = B", "F = A + B", "F = A", "F = 0"],
    ans: 2,
    exp: "Saca factor común A: F = A·(B + B̄). Por complemento, B+B̄ = 1. Entonces F = A·1 = A. Regla: cuando ves dos términos que tienen la misma variable pero una con B y otra con B̄, esas dos variables se cancelan y queda solo el factor común."
  },
  {
    sec: "Tema 2 — Álgebra de Boole",
    q: "Simplifica: F = Ā·B̄ + Ā·B",
    opts: ["F = B", "F = Ā", "F = A", "F = A + B"],
    ans: 1,
    exp: "Saca factor común Ā: F = Ā·(B̄ + B). Por complemento, B̄+B = 1. Entonces F = Ā·1 = Ā. El factor común es Ā, que se mantiene. B y B̄ se cancelan entre sí porque su OR siempre es 1."
  },
  {
    sec: "Tema 2 — Álgebra de Boole",
    q: "¿Cuál es el resultado de aplicar De Morgan a NOT(A·B·C)?",
    opts: ["Ā·B̄·C̄", "Ā+B̄+C̄", "A+B+C", "NOT(A)+NOT(B·C)"],
    ans: 1,
    exp: "De Morgan para AND con tres variables: NOT(A·B·C) = Ā+B̄+C̄. El operador AND se convierte en OR y se niegan todas las variables. Funciona con cualquier número de variables: siempre cambia el operador y niega cada término."
  },
  {
    sec: "Tema 2 — Álgebra de Boole",
    q: "Una compuerta AND de dos entradas tiene A=1, B=0. ¿Cuál es la salida?",
    opts: ["1", "0", "Indeterminado", "Depende del reloj"],
    ans: 1,
    exp: "AND: salida 1 SOLO si TODAS las entradas son 1. Como B=0, la salida es 0. No hace falta ni mirar A. Si alguna entrada es 0, la AND siempre da 0."
  },
  {
    sec: "Tema 2 — Álgebra de Boole",
    q: "F(A,B) = Σm(1,2). ¿Cuál es la tabla de verdad correcta?",
    opts: [
      "F=0,1,1,0 para AB=00,01,10,11",
      "F=1,0,0,1 para AB=00,01,10,11",
      "F=0,0,1,1 para AB=00,01,10,11",
      "F=1,1,0,0 para AB=00,01,10,11"
    ],
    ans: 0,
    exp: "Σm(1,2) → F=1 para m₁ y m₂. m₁=AB=01 (decimal 1) y m₂=AB=10 (decimal 2). Tabla: AB=00→F=0, AB=01→F=1, AB=10→F=1, AB=11→F=0. Es exactamente XOR: da 1 cuando las entradas son diferentes."
  },
  // ── TEMA 3 — KARNAUGH ────────────────────────────────────────────────────
  {
    sec: "Tema 3 — Karnaugh y Sistemas de Numeración",
    q: "¿Cuánto vale en decimal 10111010 en binario?",
    opts: ["176", "182", "186", "190"],
    ans: 2,
    exp: "Bits a 1: posición 7=128, posición 5=32, posición 4=16, posición 3=8, posición 1=2. 128+32+16+8+2 = 186. Truco: agrupa 1011|1010, convierte a hex: B|A = BAh. BA en decimal = 11×16+10 = 186 ✓"
  },
  {
    sec: "Tema 3 — Karnaugh y Sistemas de Numeración",
    q: "F(A,B,C) = Σm(0,2,4,6). ¿Cuál es la expresión simplificada?",
    opts: ["F = Ā", "F = B̄", "F = C̄", "F = Ā·C̄"],
    ans: 2,
    exp: "m₀=000, m₂=010, m₄=100, m₆=110. En todos: C=0. A y B varían. Forman un grupo de 4 en la columna C=0. Solo C es constante (siempre 0) → F = C̄. Es la columna completa del bit LSB a 0."
  },
  {
    sec: "Tema 3 — Karnaugh y Sistemas de Numeración",
    q: "F(A,B,C,D) = Σm(0,1,4,5). ¿Cuál es la expresión simplificada?",
    opts: ["F = Ā·C̄", "F = Ā·B̄", "F = B̄·C̄", "F = Ā·D̄"],
    ans: 0,
    exp: "m₀=0000, m₁=0001, m₄=0100, m₅=0101. Variables: A=0 siempre→Ā. B varía. C=0 siempre→C̄. D varía. Las que son constantes son A y C. Resultado: F = Ā·C̄."
  },
  {
    sec: "Tema 3 — Karnaugh y Sistemas de Numeración",
    q: "F(A,B,C,D) = Σm(5,7,13,15). ¿Cuál es la expresión simplificada?",
    opts: ["F = B·D", "F = A·C", "F = B·C", "F = A·D"],
    ans: 0,
    exp: "m₅=0101, m₇=0111, m₁₃=1101, m₁₅=1111. A varía, B=1 siempre→B, C varía, D=1 siempre→D. Resultado: F = B·D. Truco: busca las columnas que no cambian — B y D son siempre 1 en los cuatro minitérminos."
  },
  // ── TEMA 4 — COMBINACIONALES ──────────────────────────────────────────────
  {
    sec: "Tema 4 — Circuitos Combinacionales",
    q: "Un sumador completo tiene A=1, B=1, Cin=1. ¿Cuáles son Suma y Cout?",
    opts: ["S=0, Cout=0", "S=0, Cout=1", "S=1, Cout=0", "S=1, Cout=1"],
    ans: 3,
    exp: "Suma rápida: 1+1+1=3. En binario 3=11 → S=1, Cout=1. Por fórmula: S=1⊕1⊕1=1, Cout=1·1+1·(1⊕1)=1+0=1. Es el único caso donde tanto S como Cout valen 1."
  },
  {
    sec: "Tema 4 — Circuitos Combinacionales",
    q: "Un codificador 4→2 tiene activa la entrada I₂. ¿Cuál es la salida O₁O₀?",
    opts: ["00", "01", "10", "11"],
    ans: 2,
    exp: "I₂ tiene índice 2. 2 en binario con 2 bits = 10. Por tanto O₁O₀ = 10. Regla siempre igual: el índice de la entrada activa convertido a binario es la salida. I₀→00, I₁→01, I₂→10, I₃→11."
  },
  {
    sec: "Tema 4 — Circuitos Combinacionales",
    q: "Un decodificador 3×8 recibe la entrada 110. ¿Qué salida se activa?",
    opts: ["S3", "S5", "S6", "S7"],
    ans: 2,
    exp: "110 en binario = 4+2+0 = 6 en decimal → se activa S6. Regla: convierte la entrada binaria a decimal, esa es la salida. 000=S0, 001=S1, 010=S2, 011=S3, 100=S4, 101=S5, 110=S6, 111=S7."
  },
  {
    sec: "Tema 4 — Circuitos Combinacionales",
    q: "Un MUX 4×1 tiene S₁=1, S₀=1, I₀=0, I₁=1, I₂=0, I₃=1. ¿Cuál es la salida Y?",
    opts: ["Y=0 (pasa I₀)", "Y=1 (pasa I₁)", "Y=0 (pasa I₂)", "Y=1 (pasa I₃)"],
    ans: 3,
    exp: "S₁S₀=11 en binario = 3 en decimal → pasa I₃. I₃=1, por tanto Y=1. La tabla del MUX 4×1: S₁S₀=00→I₀, 01→I₁, 10→I₂, 11→I₃. Convierte S₁S₀ a decimal y selecciona esa entrada."
  },
  {
    sec: "Tema 4 — Circuitos Combinacionales",
    q: "Un MUX 4×1 tiene S₁=1, S₀=0, I₀=1, I₁=1, I₂=0, I₃=1. ¿Cuál es la salida Y?",
    opts: ["Y=1 (pasa I₀)", "Y=1 (pasa I₁)", "Y=0 (pasa I₂)", "Y=1 (pasa I₃)"],
    ans: 2,
    exp: "S₁S₀=10 en binario = 2 en decimal → pasa I₂. I₂=0, por tanto Y=0. Aunque la mayoría de entradas valen 1, lo que cuenta es solo la entrada seleccionada. S₁S₀=10 → I₂."
  },
  // ── TEMA 5 — FF-D ────────────────────────────────────────────────────────
  {
    sec: "Tema 5 — Flip-flop D",
    q: "FF-D con Q inicial = 1. ¿Cuál es la secuencia completa de Q?",
    table: { headers: ["Pulso","D"], rows: [["1","0"],["2","1"],["3","0"],["4","1"]] },
    opts: ["Q: 1, 0, 1, 0", "Q: 0, 1, 0, 1", "Q: 1, 1, 0, 1", "Q: 0, 0, 1, 0"],
    ans: 1,
    exp: "FF-D: Q copia D en cada pulso. Pulso 1: D=0→Q=0. Pulso 2: D=1→Q=1. Pulso 3: D=0→Q=0. Pulso 4: D=1→Q=1. Secuencia: 0,1,0,1. El Q inicial era 1 pero el primer pulso con D=0 lo cambia inmediatamente."
  },
  {
    sec: "Tema 5 — Flip-flop D",
    q: "FF-D con Q inicial = 0. ¿Cuál es Q final?",
    table: { headers: ["Pulso","D"], rows: [["1","1"],["2","0"],["3","1"],["4","1"]] },
    opts: ["Q final = 0", "Q final = 1", "Q final = indeterminado", "Q final = 0 porque hubo un D=0"],
    ans: 1,
    exp: "Pulso 1: D=1→Q=1. Pulso 2: D=0→Q=0. Pulso 3: D=1→Q=1. Pulso 4: D=1→Q=1. Q final = 1. Solo importa el último pulso: D=1→Q=1. El FF-D nunca es indeterminado."
  },
  // ── TEMA 5 — FF-JK ───────────────────────────────────────────────────────
  {
    sec: "Tema 5 — Flip-flop JK",
    q: "FF-JK con Q inicial = 1. ¿Cuál es la secuencia completa de Q?\n(00=Mantiene · 01=Reset · 10=Set · 11=Toggle)",
    table: { headers: ["Pulso","J","K"], rows: [["1","0","1"],["2","1","0"],["3","0","0"],["4","1","1"]] },
    opts: ["Q: 0, 1, 1, 0", "Q: 1, 0, 0, 1", "Q: 0, 1, 0, 0", "Q: 0, 1, 1, 1"],
    ans: 0,
    exp: "Pulso 1: J=0,K=1→Reset→Q=0. Pulso 2: J=1,K=0→Set→Q=1. Pulso 3: J=0,K=0→Mantiene→Q=1. Pulso 4: J=1,K=1→Toggle→Q era 1, invierte→Q=0. Secuencia: 0,1,1,0."
  },
  {
    sec: "Tema 5 — Flip-flop JK",
    q: "FF-JK con Q inicial = 0. ¿Cuál es Q final?\n(00=Mantiene · 01=Reset · 10=Set · 11=Toggle)",
    table: { headers: ["Pulso","J","K"], rows: [["1","1","1"],["2","0","0"],["3","1","1"],["4","0","1"]] },
    opts: ["Q final = 1", "Q final = 0", "Q final = indeterminado", "Q final = 1 por el último Toggle"],
    ans: 1,
    exp: "Pulso 1: Toggle→Q era 0, invierte→Q=1. Pulso 2: Mantiene→Q=1. Pulso 3: Toggle→Q era 1, invierte→Q=0. Pulso 4: Reset→Q=0. Q final = 0. El Toggle del pulso 3 invierte 1→0, y el Reset del 4 lo confirma en 0."
  },
  {
    sec: "Tema 5 — Flip-flop JK",
    q: "FF-JK con Q inicial = 0. ¿Cuál es la secuencia completa de Q?\n(00=Mantiene · 01=Reset · 10=Set · 11=Toggle)",
    table: { headers: ["Pulso","J","K"], rows: [["1","1","0"],["2","1","1"],["3","1","1"],["4","0","0"]] },
    opts: ["Q: 1, 0, 1, 1", "Q: 0, 1, 0, 0", "Q: 1, 1, 0, 0", "Q: 1, 0, 1, 0"],
    ans: 0,
    exp: "Pulso 1: J=1,K=0→Set→Q=1. Pulso 2: J=1,K=1→Toggle→Q era 1, invierte→Q=0. Pulso 3: J=1,K=1→Toggle→Q era 0, invierte→Q=1. Pulso 4: J=0,K=0→Mantiene→Q=1. Secuencia: 1,0,1,1."
  },
  // ── TEMA 6 — ENSAMBLADOR ─────────────────────────────────────────────────
  {
    sec: "Tema 6 — Lenguaje Ensamblador",
    q: "¿Qué imprime el siguiente programa?\n\nMOV CX, 3\nMOV DL, 'Z'\nBUCLE:\n  MOV AH, 02h\n  INT 21h\n  DEC DL\n  LOOP BUCLE",
    code: true,
    opts: ["ZZZ", "ZYX", "XYZ", "ZYZ"],
    ans: 1,
    exp: "CX=3 → 3 iteraciones. DL empieza en 'Z' (5Ah). Iter 1: imprime 'Z', DEC→'Y'. Iter 2: imprime 'Y', DEC→'X'. Iter 3: imprime 'X'. Resultado: ZYX. DEC decrementa el carácter ASCII, moviéndose hacia atrás en el alfabeto."
  },
  {
    sec: "Tema 6 — Lenguaje Ensamblador",
    q: "¿Qué valor queda en AL tras ejecutar estas instrucciones?\n\nMOV AL, 0FFh\nADD AL, 01h",
    code: true,
    opts: ["00h (desbordamiento, AL es 8 bits)", "100h (resultado completo)", "0FEh", "01h"],
    ans: 0,
    exp: "0FFh + 01h = 100h. Pero AL es un registro de 8 bits: solo caben los 8 bits bajos. El '1' de 100h se pierde (va al carry flag CF). Resultado en AL: 00h. Este es el desbordamiento de byte más clásico."
  },
  {
    sec: "Tema 6 — Lenguaje Ensamblador",
    q: "¿Qué función tiene la directiva ORG 100h al inicio de un programa NASM?",
    opts: [
      "Define el número de bytes que ocupa el programa.",
      "Indica al ensamblador que el código empieza en la dirección 100h (formato .COM de DOS).",
      "Reserva 100h bytes de memoria para variables.",
      "Define la versión del ensamblador a usar."
    ],
    ans: 1,
    exp: "ORG 100h indica al ensamblador que el programa se cargará en la dirección 100h del segmento. Esto es obligatorio en programas .COM de MS-DOS porque el sistema operativo ocupa las primeras 256 posiciones (0 a FFh) del segmento con el PSP (Program Segment Prefix)."
  },
];

const answered = new Array(Q.length).fill(null);
let submitted = false;

function build() {
  const c = document.getElementById('quiz');
  c.innerHTML = '';
  let lastSec = '';
  Q.forEach((q, qi) => {
    if (q.sec !== lastSec) {
      lastSec = q.sec;
      const d = document.createElement('div');
      d.className = 'section-divider';
      d.innerHTML = `<div class="section-divider-line"></div><div class="section-divider-label">${q.sec}</div><div class="section-divider-line"></div>`;
      c.appendChild(d);
    }
    const card = document.createElement('div');
    card.className = 'q-card';
    const qlines = q.q.split('\n');
    const qh = document.createElement('div');
    qh.className = 'q-header';
    qh.innerHTML = `<span class="q-num">${String(qi+1).padStart(2,'0')}</span><div class="q-text">${qlines[0]}</div>`;
    card.appendChild(qh);

    if (q.table) {
      const tbl = document.createElement('table');
      tbl.className = 'q-table';
      const thead = document.createElement('thead');
      const hrow = document.createElement('tr');
      q.table.headers.forEach(h => { const th = document.createElement('th'); th.textContent = h; hrow.appendChild(th); });
      thead.appendChild(hrow);
      tbl.appendChild(thead);
      const tbody = document.createElement('tbody');
      q.table.rows.forEach(r => {
        const tr = document.createElement('tr');
        r.forEach(cell => { const td = document.createElement('td'); td.textContent = cell; tr.appendChild(td); });
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
      card.appendChild(tbl);
    }

    if (q.code && qlines.length > 1) {
      const code = document.createElement('div');
      code.className = 'q-code';
      code.textContent = qlines.slice(1).join('\n').trim();
      card.appendChild(code);
    }

    const opts = document.createElement('div');
    opts.className = 'options';
    ['A','B','C','D'].forEach((l, oi) => {
      const opt = document.createElement('div');
      opt.className = 'opt';
      opt.id = `opt-${qi}-${oi}`;
      opt.innerHTML = `<span class="opt-letter">${l}</span><span>${q.opts[oi]}</span>`;
      opt.onclick = () => answer(qi, oi);
      opts.appendChild(opt);
    });
    card.appendChild(opts);

    const fb = document.createElement('div');
    fb.className = 'feedback';
    fb.id = 'fb' + qi;
    card.appendChild(fb);
    c.appendChild(card);
  });
}

function answer(qi, oi) {
  if (submitted || answered[qi] !== null) return;
  answered[qi] = oi;
  const q = Q[qi];
  q.opts.forEach((_, i) => {
    const el = document.getElementById(`opt-${qi}-${i}`);
    el.classList.add('disabled');
    if (i === q.ans) el.classList.add('show-correct');
    if (i === oi && oi !== q.ans) el.classList.add('wrong');
    if (i === oi && oi === q.ans) el.classList.add('correct');
  });
  const ok = oi === q.ans;
  const fb = document.getElementById('fb' + qi);
  fb.innerHTML = `<strong>${ok ? '✓ Correcto.' : `✗ Incorrecto — la respuesta era ${'ABCD'[q.ans]}.`}</strong> ${q.exp}`;
  fb.className = 'feedback show ' + (ok ? 'ok' : 'fail');
  const done = answered.filter(a => a !== null).length;
  const pct = Math.round(done / Q.length * 100);
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-done').textContent = `${done} respondidas`;
  document.getElementById('prog-pct').textContent = `${pct} %`;
  if (done === Q.length) document.getElementById('btn-submit').disabled = false;
}

function submit() {
  submitted = true;
  document.getElementById('btn-submit').disabled = true;
  const ok = answered.filter((a,i) => a === Q[i].ans).length;
  const pct = Math.round(ok / Q.length * 100);
  const msg = ok <= 9  ? 'Hay que repasar bastante. Vuelve al temario y prueba de nuevo.'
    : ok <= 16 ? 'Vas por buen camino. Algunos temas piden más atención.'
    : ok <= 21 ? 'Buen nivel. Repasa los errores y estarás listo.'
    : '¡Excelente! Dominas la materia de principio a fin.';
  document.getElementById('r-score').textContent = `${ok}/25`;
  document.getElementById('r-msg').textContent = msg;
  document.getElementById('r-ok').textContent = ok;
  document.getElementById('r-ko').textContent = 25 - ok;
  document.getElementById('r-pct').textContent = pct + '%';
  const res = document.getElementById('results');
  res.classList.add('show');
  res.scrollIntoView({ behavior: 'smooth' });
}

function reset() {
  answered.fill(null);
  submitted = false;
  document.getElementById('results').classList.remove('show');
  document.getElementById('btn-submit').disabled = true;
  document.getElementById('prog').style.width = '0%';
  document.getElementById('prog-done').textContent = '0 respondidas';
  document.getElementById('prog-pct').textContent = '0 %';
  build();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

build();
</script>
</body>
</html>
