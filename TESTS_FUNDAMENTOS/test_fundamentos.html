ontar los intentos fallidos de acceso para generar la señal de bloqueo", "Almacenar el código de acceso", "Desencriptar la clave"], "a": 1, "e": ["El reloj es externo; no lo genera el contador watchdog.", "Correcto. El contador watchdog cuenta los intentos de acceso (o periodos de tiempo). Cuando llega a 4 (100 en binario), genera la señal F que activa la ALARMA y bloquea el sistema.", "El código se almacena en el registro de desplazamiento, no en el contador.", "No hay desencriptado en este circuito."], "r": "Sesión 10 | Sesion 10 Fundamentos de Computadores.pdf | ~p. 21"}, {"q": "En el sistema Watchdog (Sesión 10), ¿cuál es la ecuación de bloqueo F para estado contador = 100?", "o": ["F = Q2·Q1·Q0", "F = Q2 + Q1 + Q0", "F = Q2·Q1'·Q0'", "F = Q2'·Q1·Q0"], "a": 2, "e": ["Q2·Q1·Q0 = 111, no 100.", "Q2+Q1+Q0 es una OR; no detecta específicamente el estado 100.", "Correcto. El estado 100 en binario es Q2=1, Q1=0, Q0=0. Por tanto F = Q2·Q1'·Q0'.", "Q2'·Q1·Q0 = 011, no 100."], "r": "Sesión 10 | Sesion 10 Fundamentos de Computadores.pdf | ~p. 16"}, {"q": "¿Qué hace la señal ALARMA en el sistema Watchdog cuando se activa?", "o": ["Enciende un LED de advertencia sin más efecto", "Activa el CLEAR asíncrono de todos los flip-flops, reseteando tanto el registro de desplazamiento como el contador", "Detiene el reloj del sistema", "Reinicia sólo el contador, no el registro de desplazamiento"], "a": 1, "e": ["Puede encender un LED, pero su función principal es el reset del sistema.", "Correcto. La señal ALARMA se conecta a la entrada CLEAR asíncrona de todos los flip-flops (registro y contador). El clear asíncrono resetea inmediatamente Q=0 en todos, bloqueando el acceso.", "No detiene el reloj; resetea los flip-flops.", "Resetea TODOS los flip-flops, incluido el registro de desplazamiento."], "r": "Sesión 10 | Sesion 10 Fundamentos de Computadores.pdf | ~p. 29"}, {"q": "¿Cuál es la ecuación de J1 en el FSM del semáforo (Sesión 10)?", "o": ["J1 = Q0", "J1 = Q1'·Q0", "J1 = S·Q1'·Q0'", "J1 = Q1·Q0"], "a": 1, "e": ["J1=Q0 haría que Q1 se activa siempre que Q0=1, sin comprobar Q1.", "Correcto. J1 = Q1'·Q0. El flip-flop Q1 se activa (SET) cuando el estado actual es Amarillo (Q1=0, Q0=1), para pasar a Rojo.", "S·Q1'·Q0' es la ecuación de J0 (para pasar de Verde a Amarillo cuando el sensor S=1).", "Q1·Q0 activaría J1 en el estado 11, que es un estado no usado."], "r": "Sesión 10 | Sesion 10 Fundamentos de Computadores.pdf | ~p. 29"}, {"q": "¿Cuál es la ecuación de J0 del semáforo de la Sesión 10?", "o": ["J0 = Q0", "J0 = Q1'·Q0", "J0 = S·Q1'·Q0'", "J0 = Q1·Q0"], "a": 2, "e": ["J0=Q0 no incluye la condición de que estemos en Verde ni del sensor.", "J0=Q1'·Q0 es la ecuación de J1.", "Correcto. J0 = S·Q1'·Q0'. La transición Verde→Amarillo ocurre sólo si el sensor S=1 y estamos en Verde (Q1=0, Q0=0).", "Q1·Q0 activa J0 en estado 11, que es el estado no usado."], "r": "Sesión 10 | Sesion 10 Fundamentos de Computadores.pdf | ~p. 34"}, {"q": "En el proceso de diseño de la Sesión 9, ¿cuál es el paso que consiste en elegir cuántos y qué tipo de flip-flops usar?", "o": ["Paso 1: Descripción del comportamiento", "Paso 3: Reducción de estados y asignación", "Paso 4: Elección del número de flip-flops y tipo", "Paso 7: Implementación del circuito"], "a": 2, "e": ["El paso 1 es describir el comportamiento con el diagrama de estados.", "El paso 3 es reducción y asignación de estados.", "Correcto. El paso 4 del proceso de síntesis consiste en determinar cuántos flip-flops se necesitan (log₂ de número de estados, redondeando arriba) y elegir el tipo (JK, D, T).", "El paso 7 es la implementación final (dibujar el circuito)."], "r": "Sesión 10 | Sesion 10 Fundamentos de Computadores.pdf | ~p. 21"}, {"q": "La tabla de excitación de un flip-flop JK muestra las entradas J,K necesarias para:", "o": ["Calcular el estado siguiente Q⁺ dado J y K", "Encontrar los valores J,K que producen la transición Q→Q⁺ deseada", "Determinar el tipo de flip-flop a usar", "Calcular las salidas del FSM"], "a": 1, "e": ["Calcular Q⁺ dado J,K es la tabla de verdad o ecuación característica.", "Correcto. La tabla de excitación es la inversa: dado que queremos ir de Q a Q⁺, ¿qué valores de J y K necesitamos? Por ejemplo: 0→0: J=0, K=X; 0→1: J=1, K=X; 1→0: J=X, K=1; 1→1: J=X, K=0.", "La elección del tipo de FF es un paso previo.", "Las salidas del FSM se calculan aparte."], "r": "Sesión 10 | Sesion 10 Fundamentos de Computadores.pdf | ~p. 18"}, {"q": "En el FSM de la caja fuerte (Sesión 10), ¿cuál es la ecuación de K1?", "o": ["K1 = Q0", "K1 = E·Q0", "K1 = E + Q0", "K1 = E'·Q0"], "a": 2, "e": ["K1=Q0 no incluye la condición de la entrada E.", "K1=E·Q0 es la ecuación de J1, no de K1.", "Correcto. K1 = E + Q0. El flip-flop Q1 se resetea cuando E=1 y también cuando Q0=1 (independientemente de E), según la tabla de transiciones del FSM.", "K1=E'·Q0 no captura todos los casos de reseteo."], "r": "Sesión 9 | Sesion 9 Fundamentos de Computadores.pdf | ~p. 12"}, {"q": "En el FSM de la caja fuerte (Sesión 10), ¿cuál es la ecuación de J0?", "o": ["J0 = E XOR Q1", "J0 = E·Q1", "J0 = E + Q1", "J0 = Q0·Q1"], "a": 0, "e": ["Correcto. J0 = E XOR Q1 = E⊕Q1. Esta ecuación refleja las transiciones del estado Q0 en el FSM de la caja fuerte según la tabla de excitación y Karnaugh.", "J0=E·Q1 no captura todos los casos de set de Q0.", "J0=E+Q1 activaría demasiadas transiciones.", "J0=Q0·Q1 no incluye la entrada E."], "r": "Sesión 9 | Sesion 9 Fundamentos de Computadores.pdf | ~p. 12"}, {"q": "En el diagrama de estados de un FSM, ¿qué indican las etiquetas en los arcos (transiciones)?", "o": ["El nombre del estado destino", "La condición de la entrada que provoca la transición (y la salida en Mealy)", "El número de ciclos para la transición", "La codificación binaria de los estados"], "a": 1, "e": ["El estado destino es el nodo al que apunta la flecha, no la etiqueta.", "Correcto. En los arcos se indica: la condición de entrada bajo la cual se produce la transición. En máquinas de Mealy, también se indica la salida asociada a esa transición (formato entrada/salida).", "El tiempo de transición es siempre 1 ciclo de reloj en FSM síncronos.", "La codificación se asigna a los nodos, no a los arcos."], "r": "Sesión 10 | Sesion 10 Fundamentos de Computadores.pdf | ~p. 9"}, {"q": "¿Cuántos flip-flops se necesitan para implementar un FSM con 6 estados?", "o": ["2", "3", "6", "4"], "a": 1, "e": ["Con 2 flip-flops sólo hay 4 combinaciones; no cubren 6 estados.", "Correcto. Se necesita ⌈log₂(6)⌉ = 3 flip-flops (ya que 2²=4 < 6 ≤ 8=2³). Los 2 estados sobrantes (de los 8 posibles) son estados no usados.", "6 flip-flops sería excesivo; la codificación binaria compacta es más eficiente.", "4 flip-flops darían 16 combinaciones, lo que es más de lo necesario."], "r": "Sesión 10 | Sesion 10 Fundamentos de Computadores.pdf | ~p. 9"}, {"q": "¿Qué son los 'estados no usados' en un FSM con codificación binaria?", "o": ["Estados reservados para futuras ampliaciones", "Combinaciones binarias que no corresponden a ningún estado válido del FSM; pueden causar problemas si el circuito entra en ellos", "Estados de error programados explícitamente", "Estados que siempre tienen salida cero"], "a": 1, "e": ["Pueden ser accidentalmente alcanzables, no sólo reservados.", "Correcto. Cuando se usan n flip-flops para 2ⁿ > número de estados, hay estados no usados. Si el circuito llega a uno (por ruido o power-up), puede quedarse bloqueado. Se deben diseñar transiciones de 'recuperación'.", "No son de error necesariamente; son simplemente combinaciones sin asignación.", "No tienen salida definida; su valor es indeterminado (don't care)."], "r": "Sesión 9 | Sesion 9 Fundamentos de Computadores.pdf | ~p. 4"}, {"q": "En el proceso de síntesis de la Sesión 9, ¿cuántos pasos tiene el método sistemático?", "o": ["5", "6", "7", "4"], "a": 2, "e": ["5 pasos son insuficientes; el método completo incluye más etapas.", "6 pasos es incorrecto.", "Correcto. El proceso de síntesis de circuitos secuenciales síncronos de la Sesión 9 consta de 7 pasos: 1-Descripción, 2-Tabla de estados, 3-Reducción/asignación, 4-Flip-flops, 5-Tabla de excitación, 6-Karnaugh/simplificación, 7-Implementación.", "4 pasos son insuficientes."], "r": "Sesión 9 | Sesion 9 Fundamentos de Computadores.pdf | ~p. 21"}, {"q": "En el watchdog de la Sesión 10, ¿cuántos bits tiene el registro de desplazamiento que almacena el código?", "o": ["2", "3", "4", "8"], "a": 1, "e": ["2 bits almacenarían sólo 2 bits de código.", "Correcto. El registro de desplazamiento del watchdog tiene 3 bits (usa 3 flip-flops D en serie) para almacenar los últimos 3 bits del código serial introducido.", "4 bits sería para un código de 4 bits.", "8 bits sería demasiado para este diseño básico."], "r": "Sesión 9 | Sesion 9 Fundamentos de Computadores.pdf | ~p. 4"}, {"q": "¿Qué ventaja tiene usar flip-flops D en la síntesis de FSM en comparación con JK?", "o": ["Los FF D son más rápidos", "La ecuación de excitación D=Q⁺ simplifica el diseño: el valor de D es directamente el estado siguiente", "Los FF D tienen más entradas", "Los FF D no necesitan tabla de excitación"], "a": 1, "e": ["La velocidad depende de la tecnología, no del tipo de FF.", "Correcto. Con FF D, D=Q⁺. Esto significa que la ecuación de excitación es exactamente el estado siguiente, que ya se obtiene directamente de la tabla de estados. No hace falta consultar tabla de excitación.", "El FF D tiene MENOS entradas que el JK (sólo 1 entrada D vs 2 entradas J,K).", "Los FF D no necesitan tabla de excitación porque D=Q⁺ directamente."], "r": "Sesión 10 | Sesion 10 Fundamentos de Computadores.pdf | ~p. 29"}, {"q": "¿Qué es el 'estado siguiente' (Q⁺ o next state) en un circuito secuencial?", "o": ["El estado después del reset del sistema", "El estado que el circuito adoptará en el próximo flanco activo del reloj, basado en el estado actual y las entradas", "El estado de mayor valor binario", "El estado previo al estado actual"], "a": 1, "e": ["El reset lleva al estado inicial, no al 'estado siguiente' genérico.", "Correcto. Q⁺ o next state es el estado al que pasará el circuito en el siguiente flanco del reloj. Se determina por la función de transición: Q⁺ = f(Q_actual, X_entradas).", "El valor binario no determina qué estado es 'el siguiente'.", "El estado previo sería el estado actual; el siguiente está por venir."], "r": "Sesión 9 | Sesion 9 Fundamentos de Computadores.pdf | ~p. 25"}, {"q": "¿Cuáles son las 3 secciones principales de un programa NASM (x86 32-bit Linux)?", "o": [".code, .var, .stack", ".data, .bss, .text", ".init, .main, .end", ".const, .heap, .code"], "a": 1, "e": ["Las secciones en lenguaje ensamblador NASM no se llaman .code, .var ni .stack de esa forma.", "Correcto. Un programa NASM tiene: .data (datos inicializados/constantes), .bss (variables sin valor inicial) y .text (código del programa, con 'global _start').", "Esas no son las secciones de NASM.", "Esas no son las secciones correctas de NASM."], "r": "Sesión 11 | Sesion 11 Fundamentos de Computadores.pdf | ~p. 4"}, {"q": "¿Qué registro se usa como acumulador principal en la arquitectura x86 32-bit?", "o": ["EBX", "ECX", "EAX", "EDX"], "a": 2, "e": ["EBX es el registro base, usado frecuentemente como base de datos.", "ECX es el registro contador (Counter), usado con LOOP.", "Correcto. EAX (Extended Accumulator Register) es el acumulador principal. Sus partes: AX (16 bits), AH (byte alto de AX), AL (byte bajo de AX). Se usa para resultados de MUL, DIV y llamadas al sistema.", "EDX es el registro de datos (Data), usado junto con EAX en multiplicaciones y divisiones de 64 bits."], "r": "Sesión 11 | Sesion 11 Fundamentos de Computadores.pdf | ~p. 8"}, {"q": "¿Qué número de llamada al sistema (EAX) corresponde a sys_write en Linux x86 32-bit?", "o": ["1", "2", "3", "4"], "a": 3, "e": ["EAX=1 es sys_exit (terminar programa).", "EAX=2 es sys_fork.", "EAX=3 es sys_read (leer datos).", "Correcto. EAX=4 es sys_write (escribir en un descriptor de fichero). Ejemplo: MOV EAX,4 / MOV EBX,1 / MOV ECX,mensaje / MOV EDX,longitud / INT 0x80 imprime en stdout."], "r": "Sesión 11 | Sesion 11 Fundamentos de Computadores.pdf | ~p. 18"}, {"q": "¿Cómo se invoca una llamada al sistema (syscall) en Linux x86 32-bit con NASM?", "o": ["SYSCALL", "CALL kernel", "INT 0x80", "TRAP 0x21"], "a": 2, "e": ["SYSCALL es la instrucción para x86-64 (64 bits), no para 32 bits.", "CALL kernel no es una instrucción válida.", "Correcto. En x86 32-bit Linux, las llamadas al sistema se realizan con INT 0x80. El número de syscall va en EAX, los argumentos en EBX, ECX, EDX, ESI, EDI, EBP.", "TRAP 0x21 es la interrupción DOS (INT 21h en modo real)."], "r": "Sesión 11 | Sesion 11 Fundamentos de Computadores.pdf | ~p. 18"}, {"q": "La directiva DB en NASM define una variable de:", "o": ["4 bytes", "2 bytes", "1 byte", "8 bytes"], "a": 2, "e": ["DD define 4 bytes (Double word).", "DW define 2 bytes (Word).", "Correcto. DB = Define Byte. Reserva 1 byte. Ejemplo: MI_BYTE DB 0x41 define un byte con valor 0x41 ('A').", "DQ define 8 bytes (Quad word)."], "r": "Sesión 11 | Sesion 11 Fundamentos de Computadores.pdf | ~p. 12"}, {"q": "La directiva DQ en NASM define una variable de:", "o": ["4 bytes", "2 bytes", "1 byte", "8 bytes"], "a": 3, "e": ["DD define 4 bytes (Double word).", "DW define 2 bytes (Word).", "DB define 1 byte.", "Correcto. DQ = Define Quad word. Reserva 8 bytes. Útil para datos de 64 bits como contadores grandes o valores de doble precisión."], "r": "Sesión 11 | Sesion 11 Fundamentos de Computadores.pdf | ~p. 12"}, {"q": "¿Qué diferencia hay entre EQU y %assign en NASM?", "o": ["Son exactamente iguales", "EQU define una constante que no puede redefinirse; %assign define una constante numérica redefinible", "EQU es sólo para cadenas; %assign es sólo para números", "EQU es más rápido en ejecución"], "a": 1, "e": ["No son lo mismo; tienen diferente comportamiento en redefinición.", "Correcto. EQU crea una constante inmutable: una vez definida, no se puede cambiar. %assign permite redefinir la constante numérica más adelante en el código (útil para contadores en macros).", "EQU puede usarse para cualquier valor, no sólo cadenas.", "La diferencia es en tiempo de ensamblado (no ejecución)."], "r": "Sesión 11 | Sesion 11 Fundamentos de Computadores.pdf | ~p. 14"}, {"q": "¿Qué instrucción usa ECX como contador y salta automáticamente si ECX ≠ 0?", "o": ["JNZ etiqueta", "JCXZ etiqueta", "LOOP etiqueta", "REP instrucción"], "a": 2, "e": ["JNZ salta si el flag Zero=0, pero no decrementa ECX automáticamente.", "JCXZ salta si CX=0 (al contrario: salta cuando el contador es cero).", "Correcto. LOOP etiqueta: decrementa ECX y salta a 'etiqueta' si ECX≠0. Equivale a: DEC ECX; JNZ etiqueta.", "REP repite la instrucción siguiente, pero es diferente de LOOP."], "r": "Sesión 11 | Sesion 11 Fundamentos de Computadores.pdf | ~p. 28"}, {"q": "¿Qué hace la instrucción CMP en ensamblador?", "o": ["Copia el valor del primer operando al segundo", "Realiza una resta invisible (no guarda el resultado) y actualiza los flags", "Compara y guarda el mayor de los dos valores", "Intercambia los valores de los dos operandos"], "a": 1, "e": ["MOV copia valores; CMP compara.", "Correcto. CMP op1, op2 realiza op1 - op2 pero descarta el resultado. Sólo actualiza los flags (ZF, SF, CF, OF). Las instrucciones de salto condicional (JE, JNE, JG, etc.) se basan en estos flags.", "CMP no guarda valores; sólo afecta flags.", "XCHG intercambia valores; CMP compara."], "r": "Sesión 11 | Sesion 11 Fundamentos de Computadores.pdf | ~p. 23"}, {"q": "¿Cuándo salta la instrucción JE (Jump if Equal) después de un CMP?", "o": ["Cuando el primer operando es mayor", "Cuando el resultado de la resta CMP es cero (los operandos son iguales)", "Cuando hay acarreo de la operación", "Cuando el resultado es negativo"], "a": 1, "e": ["Cuando el primero es mayor usaría JG (signed) o JA (unsigned).", "Correcto. JE (= JZ) salta cuando el flag Zero (ZF=1), lo que ocurre cuando CMP da 0, es decir, cuando op1 = op2.", "El acarreo lo detecta JC o JAE/JNC.", "El resultado negativo lo detecta JS (Jump if Sign)."], "r": "Sesión 11 | Sesion 11 Fundamentos de Computadores.pdf | ~p. 23"}, {"q": "La instrucción TEST en ensamblador se diferencia de AND en que:", "o": ["TEST guarda el resultado en el primer operando; AND no", "TEST realiza AND pero no modifica el primer operando; sólo actualiza los flags", "TEST trabaja con bytes, AND con palabras", "No hay diferencia práctica entre ellas"], "a": 1, "e": ["Es al revés: AND guarda el resultado, TEST no.", "Correcto. TEST op1, op2 realiza op1 AND op2 para actualizar los flags (especialmente ZF) pero NO guarda el resultado en op1. Es como un CMP para operaciones lógicas.", "Ambas trabajan con cualquier tamaño de operando.", "Sí hay diferencia: TEST es no destructivo, AND modifica op1."], "r": "Sesión 11 | Sesion 11 Fundamentos de Computadores.pdf | ~p. 23"}, {"q": "¿Qué diferencia hay entre JG y JA en ensamblador x86?", "o": ["Son exactamente iguales", "JG es para comparaciones de enteros con signo; JA es para sin signo", "JG salta siempre; JA nunca", "JG usa el flag Zero; JA usa el Carry"], "a": 1, "e": ["Tienen el mismo efecto en 'mayor que' pero con interpretación de signo diferente.", "Correcto. JG (Jump if Greater) compara con signo (signed): A>B considerando el bit de signo. JA (Jump if Above) compara sin signo (unsigned): interpreta los bits como número positivo.", "Ambas son condicionales; no son siempre/nunca.", "JG usa SF y OF; JA usa CF."], "r": "Sesión 11 | Sesion 11 Fundamentos de Computadores.pdf | ~p. 25"}, {"q": "¿Cómo se declaran los vectores (arrays) en NASM?", "o": ["Usando la directiva ARRAY", "Listando los valores separados por comas después de DW/DB: NUMEROS DW 34,45,56", "Usando paréntesis cuadrados", "Usando la instrucción ALLOC"], "a": 1, "e": ["No existe la directiva ARRAY en NASM.", "Correcto. Los arrays en NASM se declaran listando los valores: NUMEROS DW 34,45,56,67. Para arrays sin inicializar: INVENTORY TIMES 8 DW 0 (repite el valor 8 veces).", "Los corchetes en NASM se usan para acceso a memoria, no para declarar arrays.", "No existe ALLOC en NASM."], "r": "Sesión 11 | Sesion 11 Fundamentos de Computadores.pdf | ~p. 30"}, {"q": "En el BCD sin empaquetar (unpacked BCD), ¿cómo se almacena el dígito 5?", "o": ["0000 0101 en un byte completo", "0101 en 4 bits", "0000 0101 en un nibble", "Igual que el BCD empaquetado"], "a": 0, "e": ["Correcto. En BCD sin empaquetar (unpacked), cada dígito ocupa un byte completo, con los 4 bits superiores a 0. El dígito 5 = 0000 0101 = 05h.", "El BCD sin empaquetar usa un byte completo, no sólo 4 bits.", "Un nibble (medio byte) es el BCD empaquetado, no el sin empaquetar.", "El BCD empaquetado almacena 2 dígitos por byte; el sin empaquetar almacena 1 dígito por byte."], "r": "Sesión 11 | Sesion 11 Fundamentos de Computadores.pdf | ~p. 16"}, {"q": "¿Qué hace la función INT 21h con AH=01h en ensamblador DOS (x86 16-bit)?", "o": ["Imprime un carácter en pantalla", "Lee un carácter del teclado con eco en pantalla, devuelve el código ASCII en AL", "Sale del programa", "Lee una cadena completa de teclado"], "a": 1, "e": ["Imprimir un carácter es la función AH=02h.", "Correcto. AH=01h: lee un carácter del teclado, lo muestra en pantalla (eco) y guarda su código ASCII en el registro AL.", "Salir del programa es AH=4Ch.", "Leer cadena es AH=0Ah."], "r": "Sesión 12 | Sesion 12 Fundamentos de Computadores.pdf | ~p. 6"}, {"q": "En INT 21h con AH=02h, ¿en qué registro debe estar el carácter a imprimir?", "o": ["AL", "AH", "DL", "BL"], "a": 2, "e": ["AL es donde se lee el carácter con AH=01h, pero para imprimir con AH=02h se usa DL.", "AH ya contiene el número de función (02h).", "Correcto. AH=02h imprime el carácter cuyo código ASCII está en DL en la pantalla.", "BL no es el registro usado por esta función."], "r": "Sesión 12 | Sesion 12 Fundamentos de Computadores.pdf | ~p. 8"}, {"q": "¿Cómo se termina una cadena para la función INT 21h AH=09h (imprimir cadena)?", "o": ["Con el byte 00h (null terminator)", "Con el carácter '$' (24h)", "Con el byte FFh", "Con una longitud en DX"], "a": 1, "e": ["El terminador null (00h) se usa en C/C++ y en algunos sistemas, pero la función DOS 09h usa '$'.", "Correcto. La función INT 21h AH=09h imprime la cadena cuya dirección está en DX hasta encontrar el carácter '$' (24h). Ejemplo: MENSAJE DB 'Hola',0Dh,0Ah,'$'", "FFh es una cadena de bits todos a 1; no es el terminador.", "DX apunta a la dirección de inicio de la cadena, no a su longitud."], "r": "Sesión 12 | Sesion 12 Fundamentos de Computadores.pdf | ~p. 9"}, {"q": "¿Para qué sirve INT 21h con AH=4Ch en ensamblador DOS?", "o": ["Lee un fichero", "Imprime un número entero", "Termina el programa y devuelve el control al sistema operativo", "Reserva memoria"], "a": 2, "e": ["Leer ficheros usa otras funciones (AH=3Dh, 3Fh).", "No existe función estándar de DOS para imprimir enteros directamente.", "Correcto. AH=4Ch: exit program. Termina el programa y devuelve el control a DOS. El código de retorno puede ir en AL. Es equivalente al return 0 de C.", "Reservar memoria usa AH=48h."], "r": "Sesión 12 | Sesion 12 Fundamentos de Computadores.pdf | ~p. 10"}, {"q": "¿Qué indica la directiva ORG 100h al inicio de un programa DOS (.COM)?", "o": ["El tamaño máximo del programa", "La dirección de inicio del código en memoria (el programa se carga en offset 100h porque los primeros 256 bytes son el PSP)", "El número de segmentos", "La versión de DOS requerida"], "a": 1, "e": ["ORG no indica el tamaño máximo.", "Correcto. En programas .COM, DOS carga el código en el offset 100h del segmento actual porque los primeros 256 bytes (0-FFh) son el PSP (Program Segment Prefix). ORG 100h indica al ensamblador que el código empieza en esa dirección.", "No indica segmentos.", "No indica versión de DOS."], "r": "Sesión 12 | Sesion 12 Fundamentos de Computadores.pdf | ~p. 4"}, {"q": "¿Cómo se convierte la letra minúscula 'a' a mayúscula 'A' usando operaciones lógicas en ensamblador?", "o": ["MOV AL,'a' / OR AL,20h", "MOV AL,'a' / AND AL,0DFh", "MOV AL,'a' / XOR AL,0FFh", "MOV AL,'a' / ADD AL,32"], "a": 1, "e": ["OR AL,20h activaría el bit 5, convirtiendo de mayúscula a minúscula.", "Correcto. AND AL,0DFh pone a 0 el bit 5 (posición 5). 'a'=61h=0110 0001. 0DFh=1101 1111. 61h AND DFh = 41h = 'A'. El bit 5 es la diferencia entre mayúsculas (bit 5=0) y minúsculas (bit 5=1).", "XOR AL,0FFh invertiría todos los bits, no sólo el bit 5.", "ADD AL,32 funcionaría matemáticamente ('a'-32='A') pero no es la forma con operaciones lógicas."], "r": "Sesión 12 | Sesion 12 Fundamentos de Computadores.pdf | ~p. 28"}, {"q": "¿Cuál es la diferencia entre ASCII de mayúsculas y minúsculas?", "o": ["Difieren en el bit 7 (valor 128)", "Difieren en 32 decimal (20h) - el bit 5", "Las mayúsculas tienen códigos impares y las minúsculas pares", "No hay diferencia sistemática"], "a": 1, "e": ["El bit 7 distingue ASCII extendido; para mayúsculas/minúsculas es el bit 5.", "Correcto. Las mayúsculas van de 41h (A) a 5Ah (Z) y las minúsculas de 61h (a) a 7Ah (z). La diferencia es 20h=32. El bit 5 está a 0 en mayúsculas y a 1 en minúsculas.", "No hay correlación de paridad.", "La diferencia es completamente sistemática."], "r": "Sesión 12 | Sesion 12 Fundamentos de Computadores.pdf | ~p. 28"}, {"q": "¿Cuál es el código ASCII del dígito '0' (cero)?", "o": ["00h", "20h", "30h", "40h"], "a": 2, "e": ["00h es el carácter NULL (control).", "20h es el espacio.", "Correcto. El dígito '0' tiene código ASCII 30h (48 decimal). Los dígitos del '0' al '9' van de 30h a 39h. Para convertir a valor numérico: SUB AL,30h.", "40h es el símbolo '@'."], "r": "Sesión 12 | Sesion 12 Fundamentos de Computadores.pdf | ~p. 24"}, {"q": "¿Qué instrucción de salto condicional corresponde a JGE (Jump if Greater or Equal)?", "o": ["JNA", "JNB", "JNL", "JNG"], "a": 2, "e": ["JNA = JBE (no above, es para sin signo).", "JNB = JAE = JNC (no below, sin signo).", "Correcto. JGE = JNL (No Less than). Ambas instrucciones son sinónimas: saltan cuando el operando izquierdo de CMP es mayor o igual al derecho (comparación con signo).", "JNG = JLE (no greater, es mayor o igual al revés)."], "r": "Sesión 11 | Sesion 11 Fundamentos de Computadores.pdf | ~p. 25"}, {"q": "En el ejercicio 3 de la Sesión 12 (imprimir 0-9), ¿qué registros y valores iniciales se usan?", "o": ["EAX=0, EBX=10, contador en ECX", "CX=000Ah (10 iteraciones), DL=30h (código ASCII de '0')", "AX=9, BX=0, contador manual", "CX=9, DL=41h (letra 'A')"], "a": 1, "e": ["En x86 16-bit se usan registros de 16 bits (CX, DX, etc.).", "Correcto. CX=000Ah (10 iteraciones para '0' hasta '9'), DL=30h ('0'). Cada iteración: imprime DL, incrementa DL, LOOP decremente CX y salta. 30h→31h→...→39h imprime '0'-'9'.", "AX=9 y BX=0 no son los valores correctos del ejercicio.", "DL=41h daría la letra 'A', no el dígito '0'."], "r": "Sesión 12 | Sesion 12 Fundamentos de Computadores.pdf | ~p. 20"}, {"q": "En el ejercicio 5 de la Sesión 12 (intercambio con pila), si se hace PUSH AX luego PUSH BX, al hacer POP AX, ¿qué valor obtiene AX?", "o": ["El valor original de AX", "El valor original de BX", "Un valor aleatorio", "El valor de AX + BX"], "a": 1, "e": ["El PUSH AX se hizo primero; está más profundo en la pila.", "Correcto. La pila es LIFO. PUSH AX pone AX, PUSH BX pone BX encima. Al hacer POP AX, se extrae el último valor pusheado (BX). Así AX obtiene el valor original de BX.", "La pila es determinista.", "La pila no suma valores."], "r": "Sesión 12 | Sesion 12 Fundamentos de Computadores.pdf | ~p. 22"}, {"q": "¿Qué hace INT 21h con AH=08h en comparación con AH=01h?", "o": ["Son idénticas en funcionalidad", "AH=08h lee sin mostrar eco en pantalla; AH=01h lee con eco", "AH=08h imprime; AH=01h lee", "AH=08h lee un número entero; AH=01h lee un carácter"], "a": 1, "e": ["No son idénticas; la diferencia es el eco en pantalla.", "Correcto. AH=01h: lee carácter con eco (el carácter aparece en pantalla). AH=08h: lee carácter sin eco (invisible, útil para contraseñas). Ambas devuelven el ASCII en AL.", "AH=08h también lee; no imprime.", "Ambas leen caracteres individuales."], "r": "Sesión 12 | Sesion 12 Fundamentos de Computadores.pdf | ~p. 7"}, {"q": "En el ejercicio 7 de la Sesión 12 (convertir minúscula a mayúscula), ¿qué operación lógica usa la máscara 0DFh?", "o": ["OR", "AND", "XOR", "NOT"], "a": 1, "e": ["OR activaría bits; para eliminar el bit 5 se necesita AND con 0.", "Correcto. AND AL,0DFh (1101 1111b) pone el bit 5 a 0 sin afectar los demás bits. Convierte minúscula→mayúscula al desactivar el bit que las diferencia.", "XOR invertiría el bit 5 (toggle), no lo pondría a 0 de forma determinista.", "NOT invertiría todos los bits."], "r": "Sesión 12 | Sesion 12 Fundamentos de Computadores.pdf | ~p. 28"}, {"q": "¿Cuál es el propósito de la instrucción PUSH y POP en ensamblador?", "o": ["PUSH copia un registro a memoria; POP lo restaura de memoria en orden FIFO", "PUSH guarda un valor en la pila (LIFO); POP extrae el último valor guardado", "PUSH y POP son sinónimos", "PUSH multiplica por 2; POP divide por 2"], "a": 1, "e": ["La pila es LIFO (Last In First Out), no FIFO.", "Correcto. La pila es una estructura LIFO. PUSH decremente ESP y guarda en [ESP]. POP lee de [ESP] y incrementa ESP. Se usa para guardar/restaurar registros y para pasar parámetros a funciones.", "PUSH y POP son operaciones opuestas.", "No tienen relación con multiplicación/división."], "r": "Sesión 11 | Sesion 11 Fundamentos de Computadores.pdf | ~p. 33"}, {"q": "En el ejercicio 4 de la Sesión 12 (comparar número), ¿qué instrucción compara AL con el valor 12h?", "o": ["SUB AL,12h", "CMP AL,12h", "TEST AL,12h", "AND AL,12h"], "a": 1, "e": ["SUB AL,12h también compararía pero modificaría AL (destructivo).", "Correcto. CMP AL,12h realiza AL-12h de forma invisible, actualizando los flags. La instrucción JGE ES_MAYOR a continuación salta si AL ≥ 12h.", "TEST AL,12h realizaría AND lógico para flags; no es comparación de magnitud.", "AND AL,12h modificaría AL; no es una comparación de magnitud."], "r": "Sesión 12 | Sesion 12 Fundamentos de Computadores.pdf | ~p. 18"}, {"q": "¿Qué instrucción se usa en el ejercicio 6 de la Sesión 12 para cargar la dirección de la cadena en DX antes de INT 21h AH=09h?", "o": ["MOV DX,OFFSET MENSAJE", "LEA DX,MENSAJE", "Ambas son correctas y equivalentes en este contexto", "LOAD DX,MENSAJE"], "a": 2, "e": ["MOV DX,OFFSET MENSAJE es una forma válida de cargar la dirección.", "LEA DX,MENSAJE también carga la dirección efectiva en DX.", "Correcto. Tanto MOV DX,OFFSET MENSAJE como LEA DX,[MENSAJE] cargan la dirección de la cadena en DX. El enunciado de la sesión usa esta instrucción para preparar DX antes de INT 21h.", "LOAD no es una instrucción x86 válida en este formato."], "r": "Sesión 12 | Sesion 12 Fundamentos de Computadores.pdf | ~p. 26"}, {"q": "En la Práctica 2, ¿cuántas entradas tiene el sistema de control de acceso?", "o": ["3 entradas (A, B, C)", "4 entradas (A, B, C, D) más el selector de modo S", "5 entradas (A, B, C, D, E)", "6 entradas"], "a": 1, "e": ["3 entradas sólo generarían 8 combinaciones, insuficientes para 2 perfiles.", "Correcto. La Práctica 2 tiene 4 entradas de código (A, B, C, D) y 1 selector de modo S, total 5 señales de entrada. A,B,C,D forman el código de 4 bits.", "5 entradas de código serían 32 combinaciones; la práctica usa 4.", "6 entradas sería excesivo para el diseño planteado."], "r": "Práctica 2 | Actividad Practica 2 Fundamentos.pdf | ~p. 2"}, {"q": "En la Práctica 2, ¿cuántos minterms forman el perfil F1 (Administrador)?", "o": ["3 minterms", "7 minterms", "10 minterms", "16 minterms"], "a": 1, "e": ["3 minterms es el perfil F2 (invitado), no F1.", "Correcto. F1 (Admin) = Σm(1,4,6,9,12,14,15) = 7 minterms de los 16 posibles.", "10 minterms no es correcto para este diseño.", "16 minterms sería la función que siempre da 1."], "r": "Práctica 2 | Actividad Practica 2 Fundamentos.pdf | ~p. 5"}, {"q": "En la Práctica 2, ¿qué minterms forman el perfil F2 (Invitado)?", "o": ["m(1,4,6)", "m(1,2,3)", "m(0,1,2,3)", "m(5,10,15)"], "a": 1, "e": ["m(1,4,6) es parte del perfil Admin (F1).", "Correcto. F2 (Guest) = Σm(1,2,3). Sólo 3 minterms representan acceso de invitado, mucho más restringido que Admin.", "m(0,1,2,3) incluiría el minterm 0 que es el código 0000 (sin acceso).", "m(5,10,15) no coincide con el diseño de la práctica."], "r": "Práctica 2 | Actividad Practica 2 Fundamentos.pdf | ~p. 5"}, {"q": "En la Práctica 2, ¿cuál es la ecuación de salida Z del multiplexor 2:1 implementado con puertas?", "o": ["Z = S·F1 + S'·F2", "Z = S'·F1 + S·F2", "Z = F1 XOR F2", "Z = S AND (F1 OR F2)"], "a": 1, "e": ["En este caso, S=0 selecciona Admin, no Guest. Si S=1 seleccionara Admin, sería la primera opción.", "Correcto. Z = S'·F1 + S·F2. Cuando S=0: Z=F1 (perfil Admin). Cuando S=1: Z=F2 (perfil Invitado). La ecuación implementa el MUX 2:1 con puertas AND, OR y NOT.", "XOR no produce la función de multiplexación correcta.", "AND no implementa la selección de perfil correctamente."], "r": "Práctica 2 | Actividad Practica 2 Fundamentos.pdf | ~p. 8"}, {"q": "¿Qué significa el principio de 'denegación por defecto' en el diseño de la Práctica 2?", "o": ["Que todos los accesos se deniegan por defecto hasta que se activa el sistema", "Que los minterms no asignados a ningún perfil producen activamente Z=0 (acceso denegado), no un estado flotante", "Que el administrador siempre tiene más accesos que el invitado", "Que el sistema se reinicia después de cada acceso"], "a": 1, "e": ["El principio se refiere a la lógica de los minterms no asignados, no a un estado de arranque.", "Correcto. Con el diseño estructural (decodificador + OR), los minterms no asignados producen 0 lógico activamente. Sin este diseño, entradas flotantes podrían generar EM noise y dar falsos positivos (acceso no autorizado).", "La jerarquía Admin > Invitado es una consecuencia del diseño, no el principio en cuestión.", "No hay reinicio automático descrito en este principio."], "r": "Práctica 2 | Actividad Practica 2 Fundamentos.pdf | ~p. 10"}, {"q": "¿Por qué son peligrosas las entradas flotantes en circuitos digitales CMOS?", "o": ["Porque consumen más energía", "Porque pueden captar ruido electromagnético y presentar un estado lógico aleatorio, causando comportamientos incorrectos", "Porque hacen el circuito más lento", "Porque aumentan el número de transistores necesarios"], "a": 1, "e": ["Las entradas flotantes no necesariamente consumen más energía.", "Correcto. Las entradas flotantes (sin conexión definida) en CMOS pueden oscilar entre 0 y 1 por interferencias electromagnéticas. En un sistema de control de acceso, esto podría causar un falso positivo (acceso no autorizado).", "No afectan directamente a la velocidad.", "El número de transistores es fijo."], "r": "Práctica 2 | Actividad Practica 2 Fundamentos.pdf | ~p. 10"}, {"q": "En la Práctica 2, la Fase 1 implementa:", "o": ["El multiplexor 2:1", "Los perfiles F1 y F2 con puertas OR", "Un decodificador de 4 a 16 con 16 puertas AND de 4 entradas", "El sistema completo integrado"], "a": 2, "e": ["El MUX 2:1 es la Fase 3.", "Los perfiles F1 y F2 son la Fase 2.", "Correcto. La Fase 1 de la Práctica 2 construye el decodificador 4:16 estructuralmente usando 16 puertas AND de 4 entradas, cada una generando uno de los 16 minterms del código de acceso.", "El sistema completo es el resultado de las 3 fases."], "r": "Práctica 2 | Actividad Practica 2 Fundamentos.pdf | ~p. 3"}, {"q": "¿Cuántas fases tiene el diseño de la Práctica 2?", "o": ["2", "3", "4", "5"], "a": 1, "e": ["2 fases no incluirían el MUX selector de perfil.", "Correcto. La Práctica 2 tiene 3 fases: Fase 1 (Decodificador 4:16), Fase 2 (Perfiles F1 y F2 con OR), Fase 3 (MUX 2:1 selector de perfil).", "4 fases son más de las necesarias.", "5 fases son más de las necesarias."], "r": "Práctica 2 | Actividad Practica 2 Fundamentos.pdf | ~p. 2"}, {"q": "En la Práctica 3, ¿cuáles son las entradas del FSM de la máquina expendedora?", "o": ["S1 (1€) y S2 (2€)", "M1 (moneda de 1€) y M2 (moneda de 2€)", "A y B (sensores)", "Sólo M (moneda genérica)"], "a": 1, "e": ["Las entradas se llaman M1 y M2, no S1 y S2.", "Correcto. Las entradas son M1 (inserción de moneda de 1€) y M2 (inserción de moneda de 2€). Nunca se dan simultáneamente (M1=M2=1 es don't care).", "A y B son entradas genéricas; en la Práctica 3 son M1 y M2.", "Hay dos entradas distintas (M1 y M2), no una sola."], "r": "Práctica 3 | Actividad Practica 3 Fundamentos.pdf | ~p. 2"}, {"q": "En la Práctica 3, el estado S3 (codificación binaria 11) representa:", "o": ["0€ acumulados", "1€ acumulado", "2€ acumulados", "3€ acumulados con dispensación del producto"], "a": 3, "e": ["0€ es el estado S0 (00).", "1€ es el estado S1 (01).", "2€ es el estado S2 (10).", "Correcto. S3 (Q1Q0=11) representa haber acumulado 3€, que es el precio del producto. En este estado la salida DISPENSAR=1 y el FSM resetea automáticamente a S0."], "r": "Práctica 3 | Actividad Practica 3 Fundamentos.pdf | ~p. 4"}, {"q": "En la Práctica 3, ¿cuál es la ecuación de la salida DISPENSAR?", "o": ["DISPENSAR = Q1 + Q0", "DISPENSAR = Q1 XOR Q0", "DISPENSAR = Q1·Q0", "DISPENSAR = Q1'·Q0'"], "a": 2, "e": ["Q1+Q0 se activaría en los estados S1, S2 y S3; no sólo en S3.", "Q1 XOR Q0 se activaría en S1 y S2 pero no en S3.", "Correcto. DISPENSAR = Q1·Q0. Sólo cuando Q1=1 Y Q0=1 (estado S3=11) se dispensa el producto.", "Q1'·Q0' corresponde al estado S0 (0€), no a S3."], "r": "Práctica 3 | Actividad Practica 3 Fundamentos.pdf | ~p. 6"}, {"q": "¿Qué tipo de flip-flops se usan en el diseño de la Práctica 3?", "o": ["JK", "SR-NOR", "D", "T"], "a": 2, "e": ["El enunciado especifica D, no JK.", "SR-NOR son biestables simples; la práctica requiere flip-flops D.", "Correcto. La Práctica 3 especifica el uso de flip-flops D para implementar los estados Q1, Q0. Con D, la ecuación de excitación es directamente D=Q⁺.", "T también podría usarse, pero el enunciado pide D."], "r": "Práctica 3 | Actividad Practica 3 Fundamentos.pdf | ~p. 2"}, {"q": "¿Por qué M1=M2=1 es una condición 'don't care' en la Práctica 3?", "o": ["Porque el precio máximo es 1€", "Porque físicamente nunca se insertan dos monedas simultáneamente en una máquina expendedora real", "Porque el MUX no puede manejar dos entradas activas", "Porque la máquina sólo acepta billetes"], "a": 1, "e": ["El precio es 3€, no 1€.", "Correcto. El enunciado establece que las entradas M1 y M2 nunca pueden ser simultáneamente 1 (es físicamente imposible insertar dos monedas a la vez en el mismo instante). Por tanto, M1=M2=1 es un don't care que podemos usar en Karnaugh.", "El MUX no está directamente relacionado con esta restricción.", "La práctica es sobre monedas, no billetes."], "r": "Práctica 3 | Actividad Practica 3 Fundamentos.pdf | ~p. 2"}, {"q": "En la Práctica 3 (solución de Carlos), ¿cuál es la ecuación de D1 (estado siguiente de Q1)?", "o": ["D1 = Q1·Q0 + Q1'·M1", "D1 = Q1·Q0' + Q1'·M2 + M1·Q1'·Q0", "D1 = M1 + M2", "D1 = Q1 XOR Q0"], "a": 1, "e": ["No incluye el término M1·Q1'·Q0 necesario para la transición S1→S2 con M1.", "Correcto. D1 = Q1·Q0' + Q1'·M2 + M1·Q1'·Q0. Estos tres términos cubren: permanecer en S2, ir a S2 desde S0 con M2, e ir a S2 desde S1 con M1 respectivamente.", "M1+M2 no captura la lógica de estados.", "XOR no corresponde a la función de estado siguiente."], "r": "Práctica 3 | Actividad Practica 3 Fundamentos (Solución).pdf | ~p. 3"}, {"q": "¿Qué sucede en la Práctica 3 cuando se alcanza el estado S3 (3€)?", "o": ["El FSM se queda en S3 indefinidamente", "DISPENSAR=1 y en el siguiente ciclo el FSM vuelve automáticamente a S0 (0€), sin devolver cambio", "El FSM va a S2 (2€)", "Se bloquea el sistema hasta reinicio manual"], "a": 1, "e": ["El FSM sólo permanece en S3 durante ese ciclo; se resetea automáticamente.", "Correcto. En S3, DISPENSAR=1 activa la dispensación. El diseño hace que D1=D0=0 cuando Q1=Q0=1 (estado S3), forzando el retorno a S0 en el siguiente flanco. No se devuelve cambio.", "No va a S2; regresa al inicio S0.", "No hay bloqueo; el reset es automático."], "r": "Práctica 3 | Actividad Practica 3 Fundamentos (Solución).pdf | ~p. 6"}, {"q": "¿Para qué se usan los mapas de Karnaugh en la Práctica 3?", "o": ["Para contar los estados del FSM", "Para minimizar las ecuaciones de D1, D0 y DISPENSAR, reduciendo el número de puertas en la implementación", "Para comprobar que el FSM tiene exactamente 4 estados", "Para verificar la tabla de verdad"], "a": 1, "e": ["Los estados se definen previamente; Karnaugh los minimiza.", "Correcto. Tras obtener la tabla de verdad de D1, D0 y DISPENSAR en función de Q1, Q0, M1, M2, se aplican mapas de Karnaugh para obtener la expresión lógica mínima, reduciendo puertas y conexiones en el circuito Logisim.", "El número de estados es 4 por diseño; Karnaugh no lo define.", "La tabla de verdad es el paso previo a Karnaugh, no al revés."], "r": "Práctica 3 | Actividad Practica 3 Fundamentos.pdf | ~p. 3"}, {"q": "En la codificación de estados de la Práctica 3, ¿qué estado tiene la codificación Q1Q0=01?", "o": ["S0: 0€", "S1: 1€", "S2: 2€", "S3: 3€/DISPENSAR"], "a": 1, "e": ["S0 tiene codificación Q1Q0=00.", "Correcto. S1 (1€ acumulado) tiene codificación Q1Q0=01.", "S2 tiene codificación Q1Q0=10.", "S3 tiene codificación Q1Q0=11."], "r": "Práctica 3 | Actividad Practica 3 Fundamentos (Solución).pdf | ~p. 2"}, {"q": "¿En qué herramienta se verifica el circuito de la Práctica 3?", "o": ["Multisim", "Logisim", "MATLAB Simulink", "AutoCAD"], "a": 1, "e": ["Multisim es usado en otras asignaturas de electrónica.", "Correcto. Logisim es el simulador de circuitos digitales especificado en la Práctica 3 (y Práctica 2) para verificar el funcionamiento del FSM con flip-flops D.", "Simulink es para sistemas continuos y control.", "AutoCAD es CAD mecánico."], "r": "Práctica 3 | Actividad Practica 3 Fundamentos.pdf | ~p. 6"}, {"q": "En la Práctica 3 (solución de Carlos), ¿cuál es la ecuación de D0 (estado siguiente de Q0)?", "o": ["D0 = M1 + M2", "D0 = M2'·M1·Q0' + M1'·Q0·Q1' + M2·Q1'·Q0'", "D0 = Q0 XOR M1", "D0 = Q1·Q0"], "a": 1, "e": ["M1+M2 no captura la lógica completa de transiciones.", "Correcto. D0 = M2'·M1·Q0' + M1'·Q0·Q1' + M2·Q1'·Q0'. Estos términos cubren las transiciones: S0→S1 con M1, retención en S1, y S0→S2 con M2 (salto directo).", "Q0 XOR M1 no es la ecuación correcta.", "Q1·Q0 es la ecuación de DISPENSAR."], "r": "Práctica 3 | Actividad Practica 3 Fundamentos (Solución).pdf | ~p. 4"}, {"q": "¿Cuántos estados válidos tiene el FSM de la Práctica 3?", "o": ["2", "3", "4", "8"], "a": 2, "e": ["2 estados son insuficientes para representar 0€, 1€, 2€ y 3€.", "3 estados no cubren las 4 cantidades posibles.", "Correcto. El FSM tiene 4 estados: S0(0€), S1(1€), S2(2€), S3(3€/DISPENSAR). Con 2 flip-flops se codifican 4 combinaciones, todas usadas.", "8 estados necesitarían 3 flip-flops; con 2 bastamos para este diseño."], "r": "Práctica 3 | Actividad Practica 3 Fundamentos.pdf | ~p. 4"}, {"q": "¿Qué registros de índice tiene la arquitectura x86 y para qué se usan?", "o": ["EAX y EBX (origen y destino)", "ESI (Source Index, índice de origen) y EDI (Destination Index, índice de destino)", "EBP y ESP (base y pila)", "ECX y EDX (contador y datos)"], "a": 1, "e": ["EAX y EBX son registros de propósito general, no de índice.", "Correcto. ESI (Extended Source Index) y EDI (Extended Destination Index) son los registros de índice usados para operaciones de cadenas y acceso indexado a arrays. Sus versiones de 16 bits son SI y DI.", "EBP y ESP son registros de puntero de base y pila, no de índice.", "ECX y EDX son registros de propósito general."], "r": "Sesión 11 | Sesion 11 Fundamentos de Computadores.pdf | ~p. 10"}, {"q": "¿Cuál es la diferencia entre los registros ESP y EBP en x86?", "o": ["Son el mismo registro con dos nombres", "ESP (Stack Pointer) apunta al tope de la pila; EBP (Base Pointer) apunta a la base del marco de pila actual", "ESP es de 32 bits y EBP de 16 bits", "EBP es el contador del programa"], "a": 1, "e": ["Son registros distintos con funciones diferentes.", "Correcto. ESP siempre apunta al tope actual de la pila (se modifica con PUSH/POP). EBP apunta a la base del marco de pila (stack frame) de la función actual, usado para acceder a parámetros y variables locales.", "Ambos son registros de 32 bits (con versiones de 16 bits BP y SP).", "EIP (Instruction Pointer) es el contador del programa, no EBP."], "r": "Sesión 11 | Sesion 11 Fundamentos de Computadores.pdf | ~p. 10"}, {"q": "¿Qué instrucción NASM crea una macro con 2 parámetros?", "o": ["MACRO write_string 2 ... END_MACRO", "%macro write_string 2 ... %endmacro", "#define write_string(a,b)", "macro: write_string(2)"], "a": 1, "e": ["La sintaxis MACRO/END_MACRO no existe en NASM.", "Correcto. En NASM: %macro nombre num_params ... cuerpo con %1, %2 para los parámetros ... %endmacro. Ejemplo: %macro write_string 2 / MOV ECX,%1 / MOV EDX,%2 / %endmacro.", "#define es sintaxis de C, no de NASM.", "La sintaxis macro: no existe en NASM."], "r": "Sesión 11 | Sesion 11 Fundamentos de Computadores.pdf | ~p. 36"}, {"q": "En álgebra de Boole, ¿qué es la propiedad conmutativa?", "o": ["A + (B + C) = (A + B) + C", "A + B = B + A", "A(B + C) = AB + AC", "(A + B)' = A'·B'"], "a": 1, "e": ["Esa es la propiedad asociativa (el agrupamiento no cambia el resultado).", "Correcto. La propiedad conmutativa establece que el orden de los operandos no afecta el resultado: A+B=B+A y A·B=B·A.", "Esa es la propiedad distributiva.", "Esa es la ley de De Morgan."], "r": "Sesión 3 | Sesion 3 Fundamentos de Computadores.pdf | ~p. 7"}, {"q": "¿Qué es el IP (Instruction Pointer) en la arquitectura x86?", "o": ["Un registro que almacena el resultado de la ALU", "El registro que contiene la dirección de memoria de la próxima instrucción a ejecutar", "Un registro de propósito general", "Un registro de segmento de datos"], "a": 1, "e": ["El resultado de la ALU va a EAX u otros registros de propósito general.", "Correcto. El IP (Instruction Pointer), o EIP en modo 32-bit, contiene siempre la dirección de la siguiente instrucción que la CPU ejecutará. Se incrementa automáticamente tras cada instrucción y puede modificarse con saltos.", "No es de propósito general; tiene una función específica y crítica.", "Los registros de segmento son CS, DS, SS, ES, FS, GS, distintos del IP."], "r": "Sesión 11 | Sesion 11 Fundamentos de Computadores.pdf | ~p. 9"}];

const state = {
  current: 0,
  answered: new Array(QUESTIONS.length).fill(null), // null | {selected: idx, correct: bool}
  attempted: new Array(QUESTIONS.length).fill(new Set()),
};
// Re-init attempted as actual Sets
for(let i=0;i<QUESTIONS.length;i++) state.attempted[i] = new Set();

function updateScore(){
  let correct = 0, wrong = 0;
  state.answered.forEach(a => {
    if(a !== null){ if(a.firstCorrect) correct++; else wrong++; }
  });
  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent = wrong;
  document.getElementById('sc-total').textContent = (correct+wrong)+'/'+QUESTIONS.length;
  const pct = ((correct+wrong)/QUESTIONS.length)*100;
  document.getElementById('progress-bar').style.width = pct+'%';
}

function renderQuestion(idx){
  const q = QUESTIONS[idx];
  const ans = state.answered[idx];
  const attempted = state.attempted[idx];
  const labels = ['A','B','C','D'];
  
  document.getElementById('q-counter').textContent = 'Pregunta '+(idx+1)+' de '+QUESTIONS.length;
  document.getElementById('question-area').style.display='block';
  document.getElementById('results').style.display='none';
  
  let html = `<div class="question-card">
    <div class="q-number">Pregunta ${idx+1} / ${QUESTIONS.length}</div>
    ${q.r ? '<div class="q-ref">📄 ' + q.r + '</div>' : ''}
    <div class="q-text">${q.q}</div>
    <div class="options">`;
  
  q.o.forEach((opt, i) => {
    let btnClass = 'opt-btn';
    let expClass = '';
    let showExp = attempted.has(i);
    
    let icon = '';
    if(showExp){
      if(i === q.a){ btnClass += ' correct'; expClass = 'correct-exp'; icon = ' ✓'; }
      else { btnClass += ' wrong'; expClass = 'wrong-exp'; icon = ' ✗'; }
    }
    
    html += `<button class="${btnClass}" onclick="selectOption(${idx},${i})">
      <span class="opt-label">${labels[i]}${icon}</span>
      <div class="opt-text">
        ${opt}
        <div class="explanation ${expClass}${showExp?' show':''}">${q.e[i]}</div>
      </div>
    </button>`;
  });
  
  html += `</div></div>`;
  document.getElementById('question-area').innerHTML = html;
  
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === QUESTIONS.length - 1;
}

function selectOption(qIdx, optIdx){
  const q = QUESTIONS[qIdx];
  const isCorrect = optIdx === q.a;
  state.attempted[qIdx].add(optIdx);
  
  if(state.answered[qIdx] === null){
    // Primera vez que se responde: fijar si fue correcta a la primera
    state.answered[qIdx] = { correct: isCorrect, firstCorrect: isCorrect };
  } else {
    // Intento posterior: actualizar para mostrar colores, pero firstCorrect no cambia
    state.answered[qIdx].correct = isCorrect;
    // Si falla de nuevo, también queda registrado (firstCorrect ya es false)
  }
  
  updateScore();
  renderQuestion(qIdx);
}

function navigate(delta){
  const next = state.current + delta;
  if(next >= 0 && next < QUESTIONS.length){
    state.current = next;
    renderQuestion(state.current);
    window.scrollTo(0,0);
  }
}

document.getElementById('btn-prev').addEventListener('click', ()=>navigate(-1));
document.getElementById('btn-next').addEventListener('click', ()=>navigate(1));
document.getElementById('btn-restart').addEventListener('click', ()=>{
  state.current = 0;
  state.answered.fill(null);
  for(let i=0;i<QUESTIONS.length;i++) state.attempted[i] = new Set();
  updateScore();
  renderQuestion(0);
});

// Keyboard navigation
document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight'||e.key==='PageDown') navigate(1);
  if(e.key==='ArrowLeft'||e.key==='PageUp') navigate(-1);
  if(e.key>='1'&&e.key<='4') selectOption(state.current, parseInt(e.key)-1);
});
