<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examen VIII — Fundamentos de Computadores</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0e14;
    --paper: #f2f5f8;
    --accent: #1a3a5c;
    --accent2: #c07a1a;
    --muted: #6a7a8a;
    --correct: #1a6b3c;
    --wrong: #b5451b;
    --rule: #ccd4dc;
    --chip-bg: #e8edf2;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'IBM Plex Sans', system-ui, sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--paper); color: var(--ink); min-height: 100vh; padding: 0 0 80px; }

  header { background: var(--accent); color: var(--paper); padding: 40px 48px 32px; position: relative; overflow: hidden; }
  header::after { content: 'VIII'; position: absolute; right: 24px; bottom: -10px; font-family: var(--serif); font-size: 100px; opacity: .07; line-height: 1; pointer-events: none; }
  .header-inner { position: relative; max-width: 820px; margin: 0 auto; }
  .header-tag { font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: rgba(242,245,248,.5); margin-bottom: 12px; }
  h1 { font-family: var(--serif); font-size: clamp(26px,5vw,46px); line-height: 1.1; margin-bottom: 8px; }
  .header-sub { font-size: 14px; color: rgba(242,245,248,.5); font-weight: 300; margin-bottom: 28px; }
  .meta-pills { display: flex; gap: 10px; flex-wrap: wrap; }
  .pill { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.18); border-radius: 3px; padding: 4px 12px; font-size: 12px; font-family: var(--mono); }

  .progress-bar-wrap { background: var(--accent); padding: 0 48px 18px; }
  .progress-bar-inner { max-width: 820px; margin: 0 auto; }
  .progress-track { height: 2px; background: rgba(255,255,255,.18); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent2); border-radius: 2px; width: 0%; transition: width .4s ease; }
  .progress-label { font-size: 11px; font-family: var(--mono); color: rgba(242,245,248,.35); margin-top: 7px; display: flex; justify-content: space-between; }

  main { max-width: 820px; margin: 0 auto; padding: 0 24px; }

  .section-divider { display: flex; align-items: center; gap: 14px; margin: 48px 0 22px; }
  .section-divider-line { flex: 1; height: 1px; background: var(--rule); }
  .section-divider-label { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }

  .q-card { background: white; border: 1px solid var(--rule); border-radius: 6px; margin-bottom: 14px; overflow: hidden; transition: box-shadow .2s; }
  .q-card:hover { box-shadow: 0 3px 18px rgba(0,0,0,.07); }
  .q-header { display: flex; align-items: flex-start; gap: 14px; padding: 20px 22px 0; }
  .q-num { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--accent); background: #e2eaf2; border: 1px solid #a8bcd0; border-radius: 3px; padding: 2px 8px; white-space: nowrap; margin-top: 2px; flex-shrink: 0; }
  .q-text { font-size: 15px; font-weight: 500; line-height: 1.5; color: var(--ink); padding-bottom: 14px; }
  .q-table { margin: 0 22px 14px; border-collapse: collapse; font-family: var(--mono); font-size: 13px; }
  .q-table th { background: var(--accent); color: white; padding: 6px 18px; text-align: center; font-weight: 500; }
  .q-table td { padding: 6px 18px; text-align: center; border-bottom: 1px solid var(--rule); color: #333; }
  .q-table tr:nth-child(even) td { background: #f4f7fa; }
  .q-code { font-family: var(--mono); font-size: 13px; background: #0a1220; color: #c8d8e8; border-radius: 5px; padding: 12px 16px; margin: 0 22px 14px; white-space: pre; overflow-x: auto; line-height: 1.7; border-left: 3px solid var(--accent2); }

  .options { padding: 0 14px 14px; display: flex; flex-direction: column; gap: 6px; }
  .opt { display: flex; align-items: flex-start; gap: 12px; padding: 10px 12px; border-radius: 5px; border: 1.5px solid transparent; cursor: pointer; transition: all .15s; font-size: 14px; line-height: 1.45; background: var(--chip-bg); }
  .opt:hover { border-color: var(--accent); background: #dce6f0; }
  .opt-letter { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--muted); min-width: 18px; margin-top: 1px; flex-shrink: 0; }
  .opt.correct { border-color: var(--correct) !important; background: #e8f4ee !important; }
  .opt.correct .opt-letter { color: var(--correct) !important; font-weight: 700; }
  .opt.wrong { border-color: var(--wrong) !important; background: #fdf0eb !important; }
  .opt.wrong .opt-letter { color: var(--wrong) !important; font-weight: 700; }
  .opt.show-correct { border-color: var(--correct) !important; background: #e8f4ee !important; }
  .opt.show-correct .opt-letter { color: var(--correct) !important; }
  .opt.disabled { cursor: default; pointer-events: none; }

  .feedback { margin: 0 14px 14px; padding: 10px 14px; border-radius: 5px; font-size: 13px; line-height: 1.6; display: none; }
  .feedback.show { display: block; }
  .feedback.ok { background: #e8f4ee; border: 1px solid #9fcfb4; color: #0d4d28; }
  .feedback.fail { background: #fdf0eb; border: 1px solid #e8b49a; color: #7a2e0a; }
  .feedback strong { font-weight: 600; }

  .results { display: none; background: var(--ink); color: var(--paper); border-radius: 8px; padding: 40px; margin: 40px 0; text-align: center; position: relative; overflow: hidden; }
  .results::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 40%, rgba(26,58,92,.6) 0%, transparent 60%); }
  .results.show { display: block; }
  .results-inner { position: relative; }
  .results-score { font-family: var(--serif); font-size: 80px; line-height: 1; color: #80b8e0; margin-bottom: 2px; }
  .results-label { font-size: 12px; color: rgba(242,245,248,.4); font-family: var(--mono); margin-bottom: 20px; letter-spacing: .06em; }
  .results-msg { font-size: 16px; font-weight: 300; color: rgba(242,245,248,.8); margin-bottom: 28px; line-height: 1.55; }
  .results-breakdown { display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; margin-bottom: 28px; }
  .breakdown-item { text-align: center; }
  .breakdown-num { font-family: var(--serif); font-size: 32px; }
  .breakdown-num.g { color: #6fcf97; }
  .breakdown-num.r { color: #eb8c6a; }
  .breakdown-sub { font-size: 10px; font-family: var(--mono); color: rgba(242,245,248,.35); text-transform: uppercase; letter-spacing: .1em; margin-top: 2px; }

  .btn-submit { display: block; width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 5px; font-family: var(--sans); font-size: 14px; font-weight: 600; cursor: pointer; margin: 24px 0 0; transition: background .15s; letter-spacing: .02em; }
  .btn-submit:hover { background: #102840; }
  .btn-submit:disabled { background: var(--muted); cursor: default; }
  .btn-reset { display: inline-block; padding: 10px 24px; background: rgba(255,255,255,.08); color: var(--paper); border: 1px solid rgba(255,255,255,.18); border-radius: 5px; font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; transition: background .15s; }
  .btn-reset:hover { background: rgba(255,255,255,.15); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-tag">Simulacro de examen · Serie VIII</div>
    <h1>Fundamentos de Computadores</h1>
    <div class="header-sub">Grado en Ciberseguridad · VIU · Dra. Zulaima Chiquin</div>
    <div class="meta-pills">
      <span class="pill">25 preguntas</span>
      <span class="pill">Tipo test · una respuesta correcta</span>
      <span class="pill">Todos los temas</span>
    </div>
  </div>
</header>
<div class="progress-bar-wrap">
  <div class="progress-bar-inner">
    <div class="progress-track"><div class="progress-fill" id="prog"></div></div>
    <div class="progress-label">
      <span id="prog-done">0 respondidas</span>
      <span id="prog-pct">0 %</span>
    </div>
  </div>
</div>

<main>
  <div id="quiz"></div>
  <button class="btn-submit" id="btn-submit" disabled onclick="submit()">Ver resultados</button>
  <div class="results" id="results">
    <div class="results-inner">
      <div class="results-score" id="r-score">—</div>
      <div class="results-label">respuestas correctas de 25</div>
      <div class="results-msg" id="r-msg"></div>
      <div class="results-breakdown">
        <div class="breakdown-item"><div class="breakdown-num g" id="r-ok">—</div><div class="breakdown-sub">Correctas</div></div>
        <div class="breakdown-item"><div class="breakdown-num r" id="r-ko">—</div><div class="breakdown-sub">Incorrectas</div></div>
        <div class="breakdown-item"><div class="breakdown-num" id="r-pct">—</div><div class="breakdown-sub">Porcentaje</div></div>
      </div>
      <button class="btn-reset" onclick="reset()">↺ Intentarlo de nuevo</button>
    </div>
  </div>
</main>

<script>
const Q = [
  // ── TEMA 1 ────────────────────────────────────────────────────────────────
  {
    sec: "Tema 1 — Introducción a los Computadores",
    q: "¿Qué registro de la CPU almacena temporalmente la instrucción que acaba de ser leída de memoria?",
    opts: ["PC (Contador de Programa).", "IR (Registro de Instrucción).", "SP (Puntero de Pila).", "AX (Acumulador)."],
    ans: 1,
    exp: "El IR almacena la instrucción leída durante el Fetch mientras la Unidad de Control la decodifica. El PC apunta a la SIGUIENTE instrucción. Son dos registros distintos: el PC dice dónde ir, el IR contiene lo que se trajo."
  },
  {
    sec: "Tema 1 — Introducción a los Computadores",
    q: "¿Cuál es la diferencia entre memoria volátil y no volátil?",
    opts: [
      "La volátil es más lenta que la no volátil.",
      "La volátil pierde sus datos al apagar el sistema; la no volátil los conserva.",
      "La volátil almacena instrucciones; la no volátil almacena datos.",
      "No hay diferencia práctica entre ambas."
    ],
    ans: 1,
    exp: "RAM = volátil (datos desaparecen sin corriente). SSD/HDD = no volátil (datos persisten). En Von Neumann la RAM almacena tanto datos como instrucciones durante la ejecución, pero todo se pierde al apagar."
  },
  {
    sec: "Tema 1 — Introducción a los Computadores",
    q: "¿Por qué la Arquitectura Von Neumann es relevante para la ciberseguridad?",
    opts: [
      "Porque usa cifrado para proteger los datos.",
      "Porque datos e instrucciones comparten memoria, permitiendo que datos maliciosos sobreescriban instrucciones.",
      "Porque la CPU no puede ejecutar código externo.",
      "Porque el bus de datos está siempre cifrado."
    ],
    ans: 1,
    exp: "Como datos e instrucciones están en la misma memoria, si un atacante consigue que sus datos desborden su zona y sobreescriban instrucciones (buffer overflow), el procesador ejecutará ese dato malicioso como una instrucción legítima. Es la base de los ataques más clásicos."
  },
  // ── TEMA 2 — ÁLGEBRA ──────────────────────────────────────────────────────
  {
    sec: "Tema 2 — Álgebra de Boole",
    q: "Simplifica: F = A·Ā·B + C",
    opts: ["F = A·B + C", "F = C", "F = A + C", "F = B·C"],
    ans: 1,
    exp: "A·Ā = 0 (ley del complemento). Por tanto A·Ā·B = 0·B = 0. F = 0 + C = C. Cuando ves una variable multiplicada por su negación, ese término entero se va a 0 sin importar lo demás."
  },
  {
    sec: "Tema 2 — Álgebra de Boole",
    q: "Simplifica: F = A·B·C + Ā·B·C",
    opts: ["F = A·C", "F = A·B", "F = B·C", "F = Ā·C"],
    ans: 2,
    exp: "Factor común B·C: F = B·C·(A + Ā). Por complemento A+Ā=1. Resultado: F = B·C. Lo común entre los dos términos es B·C. A y Ā se cancelan porque su OR siempre es 1."
  },
  {
    sec: "Tema 2 — Álgebra de Boole",
    q: "¿Cuál es el resultado de NOT(Ā·B)?",
    opts: ["A·B̄", "A+B̄", "Ā+B", "A·B"],
    ans: 1,
    exp: "De Morgan para AND: NOT(X·Y) = X̄+Ȳ. Aplicando: NOT(Ā·B) = NOT(Ā)+NOT(B) = A+B̄. Recuerda: NOT(Ā)=A (doble negación se cancela). Dos pasos: cambia AND por OR y niega cada término."
  },
  {
    sec: "Tema 2 — Álgebra de Boole",
    q: "Una compuerta NAND con A=1, B=1. ¿Cuál es la salida?",
    opts: ["1", "0", "Indeterminado", "Depende del estado anterior"],
    ans: 1,
    exp: "NAND = NOT AND. AND con A=1, B=1 da 1. NAND lo invierte: 1→0. La NAND es la única que da 0 cuando TODAS sus entradas son 1. En todos los demás casos da 1."
  },
  {
    sec: "Tema 2 — Álgebra de Boole",
    q: "¿Cuál de estas afirmaciones sobre el XOR es correcta?",
    opts: [
      "XOR da 1 cuando todas las entradas son 1.",
      "XOR da 1 cuando las entradas son iguales.",
      "XOR da 1 cuando las entradas son diferentes.",
      "XOR es equivalente a AND seguido de NOT."
    ],
    ans: 2,
    exp: "XOR (OR exclusivo): salida 1 cuando las entradas son DIFERENTES, 0 cuando son IGUALES. Por eso A=1,B=1 da 0 (iguales) y A=1,B=0 da 1 (diferentes). Es fundamental en criptografía: XOR con la misma clave dos veces devuelve el dato original."
  },
  // ── TEMA 3 — KARNAUGH ────────────────────────────────────────────────────
  {
    sec: "Tema 3 — Karnaugh y Numeración",
    q: "¿Cuánto vale en decimal el número binario 11010000?",
    opts: ["192", "200", "208", "224"],
    ans: 2,
    exp: "Bits a 1: posición 7=128, posición 6=64, posición 4=16. 128+64+16 = 208. En hex: 1101|0000 = D|0 = D0h. D0 = 13×16+0 = 208 ✓"
  },
  {
    sec: "Tema 3 — Karnaugh y Numeración",
    q: "F(A,B,C,D) = Σm(2,6,10,14). ¿Cuál es la expresión simplificada?",
    opts: ["F = B̄·C·D̄", "F = Ā·C·D̄", "F = C·D̄", "F = B·C·D̄"],
    ans: 2,
    exp: "m₂=0010, m₆=0110, m₁₀=1010, m₁₄=1110. Columna A: 0,0,1,1→cambia. Columna B: 0,1,0,1→cambia. Columna C: 1,1,1,1→siempre 1→C. Columna D: 0,0,0,0→siempre 0→D̄. Resultado: F = C·D̄."
  },
  {
    sec: "Tema 3 — Karnaugh y Numeración",
    q: "F(A,B,C) = Σm(0,1,4,5). ¿Cuál es la expresión simplificada?",
    opts: ["F = Ā·B̄", "F = Ā·C̄", "F = B̄", "F = Ā"],
    ans: 2,
    exp: "m₀=000, m₁=001, m₄=100, m₅=101. Columna A: 0,0,1,1→cambia. Columna B: 0,0,0,0→siempre 0→B̄. Columna C: 0,1,0,1→cambia. Solo B es constante (siempre 0). Resultado: F = B̄."
  },
  {
    sec: "Tema 3 — Karnaugh y Numeración",
    q: "¿Cuánto vale en hexadecimal el número decimal 175?",
    opts: ["A5", "AF", "BF", "B5"],
    ans: 1,
    exp: "175 ÷ 16 = 10 resto 15. 10=A y 15=F. Resultado: AF₁₆. Verificación: 10×16+15 = 160+15 = 175 ✓. En binario: 1010 1111 = A|F = AF."
  },
  // ── TEMA 4 — COMBINACIONALES ──────────────────────────────────────────────
  {
    sec: "Tema 4 — Circuitos Combinacionales",
    q: "Un sumador completo tiene A=1, B=0, Cin=0. ¿Cuáles son Suma y Cout?",
    opts: ["S=0, Cout=0", "S=1, Cout=0", "S=0, Cout=1", "S=1, Cout=1"],
    ans: 1,
    exp: "Suma rápida: 1+0+0=1. En binario 1=01 → S=1, Cout=0. La suma da 1, que cabe en 1 bit sin acarreo. Solo hay Cout cuando la suma da 2 o 3."
  },
  {
    sec: "Tema 4 — Circuitos Combinacionales",
    q: "Un sumador completo tiene A=1, B=1, Cin=0. ¿Cuáles son Suma y Cout?",
    opts: ["S=1, Cout=1", "S=1, Cout=0", "S=0, Cout=1", "S=0, Cout=0"],
    ans: 2,
    exp: "Suma rápida: 1+1+0=2. En binario 2=10 → S=0, Cout=1. La suma da 2, que en binario es 10: el bit bajo es 0 (Suma) y el bit alto es 1 (Cout o acarreo)."
  },
  {
    sec: "Tema 4 — Circuitos Combinacionales",
    q: "Un codificador 4→2 tiene activa la entrada I₃. ¿Cuál es la salida O₁O₀?",
    opts: ["00", "01", "10", "11"],
    ans: 3,
    exp: "I₃ tiene índice 3. 3 en binario con 2 bits = 11. Por tanto O₁O₀ = 11. Regla: subíndice de la entrada activa → binario con tantos bits como salidas. I₀→00, I₁→01, I₂→10, I₃→11."
  },
  {
    sec: "Tema 4 — Circuitos Combinacionales",
    q: "Un decodificador 4×16 recibe la entrada 0111. ¿Qué salida se activa?",
    opts: ["S5", "S6", "S7", "S8"],
    ans: 2,
    exp: "0111 en binario = 0+4+2+1 = 7 en decimal → se activa S7. Regla: convierte la entrada binaria a decimal, ese es el subíndice de la salida activa."
  },
  {
    sec: "Tema 4 — Circuitos Combinacionales",
    q: "Un MUX 4×1 tiene S₁=1, S₀=0, I₀=0, I₁=1, I₂=1, I₃=0. ¿Cuál es la salida Y?",
    opts: ["Y=0 (pasa I₀)", "Y=1 (pasa I₁)", "Y=1 (pasa I₂)", "Y=0 (pasa I₃)"],
    ans: 2,
    exp: "S₁S₀=10 en binario = 2 en decimal → pasa I₂. I₂=1, por tanto Y=1. Regla: S₁S₀ como número binario → decimal → ese es el subíndice de la I que pasa."
  },
  {
    sec: "Tema 4 — Circuitos Combinacionales",
    q: "Un MUX 8×1 tiene S₂=0, S₁=1, S₀=1. ¿Qué entrada pasa a la salida?",
    opts: ["I₂", "I₃", "I₄", "I₅"],
    ans: 1,
    exp: "S₂S₁S₀=011 en binario = 0+2+1 = 3 en decimal → pasa I₃. Misma regla que siempre: convierte los bits de selección a decimal y ese es el subíndice."
  },
  // ── TEMA 5 — FF-D ────────────────────────────────────────────────────────
  {
    sec: "Tema 5 — Flip-flop D",
    q: "FF-D con Q inicial = 1. ¿Cuál es la secuencia completa de Q?",
    table: { headers: ["Pulso","D"], rows: [["1","1"],["2","0"],["3","0"],["4","1"]] },
    opts: ["Q: 0, 1, 1, 0", "Q: 1, 1, 0, 0", "Q: 1, 0, 0, 1", "Q: 0, 0, 1, 1"],
    ans: 2,
    exp: "FF-D: Q copia D en cada pulso. P1: D=1→Q=1. P2: D=0→Q=0. P3: D=0→Q=0. P4: D=1→Q=1. Secuencia: 1,0,0,1. La columna Q es siempre idéntica a la columna D."
  },
  {
    sec: "Tema 5 — Flip-flop D",
    q: "FF-D con Q inicial = 0. ¿Cuál es Q tras el pulso 3?",
    table: { headers: ["Pulso","D"], rows: [["1","0"],["2","1"],["3","0"],["4","1"]] },
    opts: ["Q=1", "Q=0", "Q=indeterminado", "Q=1 porque antes era 1"],
    ans: 1,
    exp: "Pulso 1: D=0→Q=0. Pulso 2: D=1→Q=1. Pulso 3: D=0→Q=0. Q tras el pulso 3 = 0. El FF-D no tiene memoria del pasado más allá del pulso anterior — simplemente copia D."
  },
  // ── TEMA 5 — FF-JK ───────────────────────────────────────────────────────
  {
    sec: "Tema 5 — Flip-flop JK",
    q: "FF-JK con Q inicial = 1. ¿Cuál es la secuencia completa de Q?\n(00=Mantiene · 01=Reset · 10=Set · 11=Toggle)",
    table: { headers: ["Pulso","J","K"], rows: [["1","0","0"],["2","0","1"],["3","1","0"],["4","1","1"]] },
    opts: ["Q: 1, 0, 1, 0", "Q: 1, 1, 0, 1", "Q: 0, 0, 1, 0", "Q: 1, 0, 0, 1"],
    ans: 0,
    exp: "P1: J=0,K=0→Mantiene→Q=1. P2: J=0,K=1→Reset→Q=0. P3: J=1,K=0→Set→Q=1. P4: J=1,K=1→Toggle→Q era 1, invierte→Q=0. Secuencia: 1,0,1,0."
  },
  {
    sec: "Tema 5 — Flip-flop JK",
    q: "FF-JK con Q inicial = 0. ¿Cuál es Q final?\n(00=Mantiene · 01=Reset · 10=Set · 11=Toggle)",
    table: { headers: ["Pulso","J","K"], rows: [["1","1","1"],["2","1","0"],["3","0","1"],["4","1","1"]] },
    opts: ["Q final = 1", "Q final = 0", "Q final = indeterminado", "Q final = 1 por el Set del pulso 2"],
    ans: 1,
    exp: "P1: Toggle→Q era 0, invierte→Q=1. P2: Set→Q=1. P3: Reset→Q=0. P4: Toggle→Q era 0, invierte→Q=1... Espera: P4 Toggle con Q=0→Q=1. Q final=1. Revisando: P3 Reset→Q=0, P4 Toggle 0→1. Q final=1, opción A."
  },
  {
    sec: "Tema 5 — Flip-flop JK",
    q: "FF-JK con Q inicial = 1. ¿Cuál es la secuencia de Q con cuatro Toggles?\n(00=Mantiene · 01=Reset · 10=Set · 11=Toggle)",
    table: { headers: ["Pulso","J","K"], rows: [["1","1","1"],["2","1","1"],["3","1","1"],["4","1","1"]] },
    opts: ["Q: 1, 1, 1, 1", "Q: 0, 1, 0, 1", "Q: 1, 0, 1, 0", "Q: 0, 0, 0, 0"],
    ans: 1,
    exp: "Cuatro Toggles seguidos con Q inicial=1. P1: Toggle 1→0. P2: Toggle 0→1. P3: Toggle 1→0. P4: Toggle 0→1. Secuencia: 0,1,0,1. Con J=K=1 siempre, Q alterna. Si empiezas en 1: 0,1,0,1. Si empiezas en 0: 1,0,1,0."
  },
  // ── TEMA 6 ────────────────────────────────────────────────────────────────
  {
    sec: "Tema 6 — Lenguaje Ensamblador",
    q: "¿Qué imprime el siguiente programa?\n\nMOV CX, 4\nMOV DL, 'D'\nBUCLE:\n  MOV AH, 02h\n  INT 21h\n  DEC DL\n  LOOP BUCLE",
    code: true,
    opts: ["DCBA", "ABCD", "DDDD", "DCDC"],
    ans: 0,
    exp: "CX=4 → 4 iteraciones. DL empieza en 'D'. DEC va hacia atrás en ASCII. Iter 1: imprime 'D', DEC→'C'. Iter 2: imprime 'C', DEC→'B'. Iter 3: imprime 'B', DEC→'A'. Iter 4: imprime 'A'. Resultado: DCBA."
  },
  {
    sec: "Tema 6 — Lenguaje Ensamblador",
    q: "¿Qué función realiza INT 21h con AH=02h?",
    opts: [
      "Lee una cadena del teclado.",
      "Imprime el carácter ASCII contenido en DL.",
      "Imprime una cadena cuya dirección está en DX.",
      "Termina el programa."
    ],
    ans: 1,
    exp: "AH=02h: imprime UN solo carácter. El carácter a imprimir debe estar en DL. Solo puede imprimir un byte a la vez. Para imprimir una cadena completa habría que llamarla tantas veces como caracteres tenga, o usar AH=09h que imprime toda la cadena de una vez."
  },
];

// Corrección: pregunta 22 (FF-JK final) → Q final = 1, opción A
Q[21].ans = 0;
Q[21].exp = "P1: Toggle→Q era 0, invierte→Q=1. P2: Set→Q=1. P3: Reset→Q=0. P4: Toggle→Q era 0, invierte→Q=1. Q final = 1. El Toggle del pulso 4 parte de Q=0 (dejado por el Reset) y lo invierte a 1.";

const answered = new Array(Q.length).fill(null);
let submitted = false;

function build() {
  const c = document.getElementById('quiz');
  c.innerHTML = '';
  let lastSec = '';
  Q.forEach((q, qi) => {
    if (q.sec !== lastSec) {
      lastSec = q.sec;
      const d = document.createElement('div');
      d.className = 'section-divider';
      d.innerHTML = `<div class="section-divider-line"></div><div class="section-divider-label">${q.sec}</div><div class="section-divider-line"></div>`;
      c.appendChild(d);
    }
    const card = document.createElement('div');
    card.className = 'q-card';
    const qlines = q.q.split('\n');
    const qh = document.createElement('div');
    qh.className = 'q-header';
    qh.innerHTML = `<span class="q-num">${String(qi+1).padStart(2,'0')}</span><div class="q-text">${qlines[0]}</div>`;
    card.appendChild(qh);

    if (q.table) {
      const tbl = document.createElement('table');
      tbl.className = 'q-table';
      const thead = document.createElement('thead');
      const hrow = document.createElement('tr');
      q.table.headers.forEach(h => { const th = document.createElement('th'); th.textContent = h; hrow.appendChild(th); });
      thead.appendChild(hrow);
      tbl.appendChild(thead);
      const tbody = document.createElement('tbody');
      q.table.rows.forEach(r => {
        const tr = document.createElement('tr');
        r.forEach(cell => { const td = document.createElement('td'); td.textContent = cell; tr.appendChild(td); });
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
      card.appendChild(tbl);
    }

    if (q.code && qlines.length > 1) {
      const code = document.createElement('div');
      code.className = 'q-code';
      code.textContent = qlines.slice(1).join('\n').trim();
      card.appendChild(code);
    }

    const opts = document.createElement('div');
    opts.className = 'options';
    ['A','B','C','D'].forEach((l, oi) => {
      const opt = document.createElement('div');
      opt.className = 'opt';
      opt.id = `opt-${qi}-${oi}`;
      opt.innerHTML = `<span class="opt-letter">${l}</span><span>${q.opts[oi]}</span>`;
      opt.onclick = () => answer(qi, oi);
      opts.appendChild(opt);
    });
    card.appendChild(opts);

    const fb = document.createElement('div');
    fb.className = 'feedback';
    fb.id = 'fb' + qi;
    card.appendChild(fb);
    c.appendChild(card);
  });
}

function answer(qi, oi) {
  if (submitted || answered[qi] !== null) return;
  answered[qi] = oi;
  const q = Q[qi];
  q.opts.forEach((_, i) => {
    const el = document.getElementById(`opt-${qi}-${i}`);
    el.classList.add('disabled');
    if (i === q.ans) el.classList.add('show-correct');
    if (i === oi && oi !== q.ans) el.classList.add('wrong');
    if (i === oi && oi === q.ans) el.classList.add('correct');
  });
  const ok = oi === q.ans;
  const fb = document.getElementById('fb' + qi);
  fb.innerHTML = `<strong>${ok ? '✓ Correcto.' : `✗ Incorrecto — la respuesta era ${'ABCD'[q.ans]}.`}</strong> ${q.exp}`;
  fb.className = 'feedback show ' + (ok ? 'ok' : 'fail');
  const done = answered.filter(a => a !== null).length;
  const pct = Math.round(done / Q.length * 100);
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-done').textContent = `${done} respondidas`;
  document.getElementById('prog-pct').textContent = `${pct} %`;
  if (done === Q.length) document.getElementById('btn-submit').disabled = false;
}

function submit() {
  submitted = true;
  document.getElementById('btn-submit').disabled = true;
  const ok = answered.filter((a,i) => a === Q[i].ans).length;
  const pct = Math.round(ok / Q.length * 100);
  const msg = ok <= 9  ? 'Hay que repasar bastante. Vuelve al temario y prueba de nuevo.'
    : ok <= 16 ? 'Vas por buen camino. Algunos temas piden más atención.'
    : ok <= 21 ? 'Buen nivel. Repasa los errores y estarás listo.'
    : '¡Excelente! Dominas la materia de principio a fin.';
  document.getElementById('r-score').textContent = `${ok}/25`;
  document.getElementById('r-msg').textContent = msg;
  document.getElementById('r-ok').textContent = ok;
  document.getElementById('r-ko').textContent = 25 - ok;
  document.getElementById('r-pct').textContent = pct + '%';
  const res = document.getElementById('results');
  res.classList.add('show');
  res.scrollIntoView({ behavior: 'smooth' });
}

function reset() {
  answered.fill(null);
  submitted = false;
  document.getElementById('results').classList.remove('show');
  document.getElementById('btn-submit').disabled = true;
  document.getElementById('prog').style.width = '0%';
  document.getElementById('prog-done').textContent = '0 respondidas';
  document.getElementById('prog-pct').textContent = '0 %';
  build();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

build();
</script>
</body>
</html>
