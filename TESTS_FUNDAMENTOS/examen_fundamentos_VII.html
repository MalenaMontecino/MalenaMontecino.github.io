<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examen VII — Fundamentos de Computadores</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #10100e;
    --paper: #f8f6f0;
    --accent: #5c3d1e;
    --accent2: #1a6b8a;
    --muted: #8a7a6a;
    --correct: #1a6b3c;
    --wrong: #b5451b;
    --rule: #e0d8cc;
    --chip-bg: #f0ece2;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'IBM Plex Sans', system-ui, sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--paper); color: var(--ink); min-height: 100vh; padding: 0 0 80px; }

  header { background: var(--accent); color: var(--paper); padding: 40px 48px 32px; position: relative; overflow: hidden; }
  header::after { content: 'VII'; position: absolute; right: 32px; bottom: -10px; font-family: var(--serif); font-size: 120px; opacity: .07; line-height: 1; pointer-events: none; }
  .header-inner { position: relative; max-width: 820px; margin: 0 auto; }
  .header-tag { font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: rgba(248,246,240,.5); margin-bottom: 12px; }
  h1 { font-family: var(--serif); font-size: clamp(26px,5vw,46px); line-height: 1.1; margin-bottom: 8px; }
  .header-sub { font-size: 14px; color: rgba(248,246,240,.5); font-weight: 300; margin-bottom: 28px; }
  .meta-pills { display: flex; gap: 10px; flex-wrap: wrap; }
  .pill { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.18); border-radius: 3px; padding: 4px 12px; font-size: 12px; font-family: var(--mono); }

  .progress-bar-wrap { background: var(--accent); padding: 0 48px 18px; }
  .progress-bar-inner { max-width: 820px; margin: 0 auto; }
  .progress-track { height: 2px; background: rgba(255,255,255,.18); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent2); border-radius: 2px; width: 0%; transition: width .4s ease; }
  .progress-label { font-size: 11px; font-family: var(--mono); color: rgba(248,246,240,.35); margin-top: 7px; display: flex; justify-content: space-between; }

  main { max-width: 820px; margin: 0 auto; padding: 0 24px; }

  .section-divider { display: flex; align-items: center; gap: 14px; margin: 48px 0 22px; }
  .section-divider-line { flex: 1; height: 1px; background: var(--rule); }
  .section-divider-label { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }

  .q-card { background: white; border: 1px solid var(--rule); border-radius: 6px; margin-bottom: 14px; overflow: hidden; transition: box-shadow .2s; }
  .q-card:hover { box-shadow: 0 3px 18px rgba(0,0,0,.07); }
  .q-header { display: flex; align-items: flex-start; gap: 14px; padding: 20px 22px 0; }
  .q-num { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--accent); background: #f0e8dc; border: 1px solid #c8a888; border-radius: 3px; padding: 2px 8px; white-space: nowrap; margin-top: 2px; flex-shrink: 0; }
  .q-text { font-size: 15px; font-weight: 500; line-height: 1.5; color: var(--ink); padding-bottom: 14px; }
  .q-table { margin: 0 22px 14px; border-collapse: collapse; font-family: var(--mono); font-size: 13px; }
  .q-table th { background: var(--accent); color: white; padding: 6px 18px; text-align: center; font-weight: 500; }
  .q-table td { padding: 6px 18px; text-align: center; border-bottom: 1px solid var(--rule); color: #333; }
  .q-table tr:nth-child(even) td { background: #faf6f0; }
  .q-code { font-family: var(--mono); font-size: 13px; background: #1a1208; color: #d8cc98; border-radius: 5px; padding: 12px 16px; margin: 0 22px 14px; white-space: pre; overflow-x: auto; line-height: 1.7; border-left: 3px solid var(--accent2); }

  .options { padding: 0 14px 14px; display: flex; flex-direction: column; gap: 6px; }
  .opt { display: flex; align-items: flex-start; gap: 12px; padding: 10px 12px; border-radius: 5px; border: 1.5px solid transparent; cursor: pointer; transition: all .15s; font-size: 14px; line-height: 1.45; background: var(--chip-bg); }
  .opt:hover { border-color: var(--accent); background: #e8ddd0; }
  .opt-letter { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--muted); min-width: 18px; margin-top: 1px; flex-shrink: 0; }
  .opt.correct { border-color: var(--correct) !important; background: #e8f4ee !important; }
  .opt.correct .opt-letter { color: var(--correct) !important; font-weight: 700; }
  .opt.wrong { border-color: var(--wrong) !important; background: #fdf0eb !important; }
  .opt.wrong .opt-letter { color: var(--wrong) !important; font-weight: 700; }
  .opt.show-correct { border-color: var(--correct) !important; background: #e8f4ee !important; }
  .opt.show-correct .opt-letter { color: var(--correct) !important; }
  .opt.disabled { cursor: default; pointer-events: none; }

  .feedback { margin: 0 14px 14px; padding: 10px 14px; border-radius: 5px; font-size: 13px; line-height: 1.6; display: none; }
  .feedback.show { display: block; }
  .feedback.ok { background: #e8f4ee; border: 1px solid #9fcfb4; color: #0d4d28; }
  .feedback.fail { background: #fdf0eb; border: 1px solid #e8b49a; color: #7a2e0a; }
  .feedback strong { font-weight: 600; }

  .results { display: none; background: var(--ink); color: var(--paper); border-radius: 8px; padding: 40px; margin: 40px 0; text-align: center; position: relative; overflow: hidden; }
  .results::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 40%, rgba(92,61,30,.5) 0%, transparent 60%); }
  .results.show { display: block; }
  .results-inner { position: relative; }
  .results-score { font-family: var(--serif); font-size: 80px; line-height: 1; color: #d4a86a; margin-bottom: 2px; }
  .results-label { font-size: 12px; color: rgba(248,246,240,.4); font-family: var(--mono); margin-bottom: 20px; letter-spacing: .06em; }
  .results-msg { font-size: 16px; font-weight: 300; color: rgba(248,246,240,.8); margin-bottom: 28px; line-height: 1.55; }
  .results-breakdown { display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; margin-bottom: 28px; }
  .breakdown-item { text-align: center; }
  .breakdown-num { font-family: var(--serif); font-size: 32px; }
  .breakdown-num.g { color: #6fcf97; }
  .breakdown-num.r { color: #eb8c6a; }
  .breakdown-sub { font-size: 10px; font-family: var(--mono); color: rgba(248,246,240,.35); text-transform: uppercase; letter-spacing: .1em; margin-top: 2px; }

  .btn-submit { display: block; width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 5px; font-family: var(--sans); font-size: 14px; font-weight: 600; cursor: pointer; margin: 24px 0 0; transition: background .15s; letter-spacing: .02em; }
  .btn-submit:hover { background: #3d2810; }
  .btn-submit:disabled { background: var(--muted); cursor: default; }
  .btn-reset { display: inline-block; padding: 10px 24px; background: rgba(255,255,255,.08); color: var(--paper); border: 1px solid rgba(255,255,255,.18); border-radius: 5px; font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; transition: background .15s; }
  .btn-reset:hover { background: rgba(255,255,255,.15); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-tag">Simulacro de examen · Serie VII</div>
    <h1>Fundamentos de Computadores</h1>
    <div class="header-sub">Grado en Ciberseguridad · VIU · Dra. Zulaima Chiquin</div>
    <div class="meta-pills">
      <span class="pill">25 preguntas</span>
      <span class="pill">Tipo test · una respuesta correcta</span>
      <span class="pill">Todos los temas</span>
    </div>
  </div>
</header>
<div class="progress-bar-wrap">
  <div class="progress-bar-inner">
    <div class="progress-track"><div class="progress-fill" id="prog"></div></div>
    <div class="progress-label">
      <span id="prog-done">0 respondidas</span>
      <span id="prog-pct">0 %</span>
    </div>
  </div>
</div>

<main>
  <div id="quiz"></div>
  <button class="btn-submit" id="btn-submit" disabled onclick="submit()">Ver resultados</button>
  <div class="results" id="results">
    <div class="results-inner">
      <div class="results-score" id="r-score">—</div>
      <div class="results-label">respuestas correctas de 25</div>
      <div class="results-msg" id="r-msg"></div>
      <div class="results-breakdown">
        <div class="breakdown-item"><div class="breakdown-num g" id="r-ok">—</div><div class="breakdown-sub">Correctas</div></div>
        <div class="breakdown-item"><div class="breakdown-num r" id="r-ko">—</div><div class="breakdown-sub">Incorrectas</div></div>
        <div class="breakdown-item"><div class="breakdown-num" id="r-pct">—</div><div class="breakdown-sub">Porcentaje</div></div>
      </div>
      <button class="btn-reset" onclick="reset()">↺ Intentarlo de nuevo</button>
    </div>
  </div>
</main>

<script>
const Q = [
  // ── TEMA 1 ────────────────────────────────────────────────────────────────
  {
    sec: "Tema 1 — Introducción a los Computadores",
    q: "¿Qué tres buses forman el bus del sistema en la Arquitectura Von Neumann?",
    opts: [
      "Bus de datos, bus de direcciones y bus de control.",
      "Bus de entrada, bus de salida y bus de memoria.",
      "Bus de la CPU, bus de la RAM y bus del disco.",
      "Bus serie, bus paralelo y bus USB."
    ],
    ans: 0,
    exp: "El bus del sistema tiene tres líneas: bus de datos (transporta los bits del dato), bus de direcciones (indica dónde leer o escribir) y bus de control (señales de mando: lectura/escritura, reloj, interrupciones). Los tres trabajan coordinados en cada acceso a memoria."
  },
  {
    sec: "Tema 1 — Introducción a los Computadores",
    q: "¿Cuál es la secuencia correcta del ciclo de instrucción?",
    opts: [
      "Execute → Decode → Fetch",
      "Fetch → Execute → Decode",
      "Fetch → Decode → Execute",
      "Decode → Fetch → Execute"
    ],
    ans: 2,
    exp: "El orden siempre es: Fetch (buscar la instrucción en memoria), Decode (interpretarla) y Execute (ejecutarla). Una forma de recordarlo: primero la BUSCAS, luego la ENTIENDES, luego la HACES."
  },
  {
    sec: "Tema 1 — Introducción a los Computadores",
    q: "¿Qué diferencia hay entre el bus de datos y el bus de direcciones?",
    opts: [
      "El bus de datos lleva los valores; el de direcciones indica dónde leer o escribir.",
      "El bus de direcciones es más rápido que el de datos.",
      "El bus de datos solo lleva instrucciones; el de direcciones solo lleva datos.",
      "Son el mismo bus con dos nombres distintos."
    ],
    ans: 0,
    exp: "Bus de datos: transporta los bits del dato o instrucción entre CPU y memoria. Bus de direcciones: lleva la dirección de la posición de memoria a la que se quiere acceder. Son independientes y trabajan a la vez en cada operación de memoria."
  },
  // ── TEMA 2 — ÁLGEBRA ──────────────────────────────────────────────────────
  {
    sec: "Tema 2 — Álgebra de Boole",
    q: "Simplifica: F = A·B̄·C + A·B·C",
    opts: ["F = A·C", "F = A·B", "F = B·C", "F = A + C"],
    ans: 0,
    exp: "Saca factor común A·C: F = A·C·(B̄ + B). Por complemento B̄+B=1. Resultado: F = A·C. Los dos términos tienen A y C en común — son el factor que se mantiene. B y B̄ se cancelan."
  },
  {
    sec: "Tema 2 — Álgebra de Boole",
    q: "Simplifica: F = Ā·B·C + A·B·C",
    opts: ["F = A·C", "F = B·C", "F = Ā·B", "F = A·B"],
    ans: 1,
    exp: "Saca factor común B·C: F = B·C·(Ā + A). Por complemento Ā+A=1. Resultado: F = B·C. Lo común entre los dos términos es B·C. A y Ā se cancelan."
  },
  {
    sec: "Tema 2 — Álgebra de Boole",
    q: "¿Cuál es el resultado de NOT(A + B̄)?",
    opts: ["Ā + B", "Ā · B", "A · B̄", "Ā · B̄"],
    ans: 1,
    exp: "De Morgan para OR: NOT(X+Y) = X̄·Ȳ. Aplicando: NOT(A+B̄) = NOT(A)·NOT(B̄) = Ā·B. Recuerda: NOT(B̄) = B (doble negación se cancela)."
  },
  {
    sec: "Tema 2 — Álgebra de Boole",
    q: "¿Qué compuerta implementa F(A,B) = Σm(0,1,2,3)?",
    opts: ["AND", "OR", "XOR", "La función siempre vale 1 (constante)"],
    ans: 3,
    exp: "Σm(0,1,2,3) con 2 variables tiene 4 minitérminos — que son TODOS los posibles (2²=4). Si F=1 para todas las combinaciones, F=1 siempre. No hace falta ninguna compuerta, la salida es siempre 1."
  },
  {
    sec: "Tema 2 — Álgebra de Boole",
    q: "¿Cuál es la salida de una compuerta NOR con A=0, B=0?",
    opts: ["0", "1", "Indeterminado", "Depende del estado anterior"],
    ans: 1,
    exp: "NOR = NOT OR. OR con A=0, B=0 da 0. NOR invierte ese resultado: 0→1. La NOR es la única compuerta que da 1 cuando TODAS sus entradas son 0. En todos los demás casos da 0."
  },
  // ── TEMA 3 — KARNAUGH ────────────────────────────────────────────────────
  {
    sec: "Tema 3 — Karnaugh y Numeración",
    q: "F(A,B,C) = Σm(1,3,5,7). Escribe los minitérminos en binario. ¿Cuál es F?",
    opts: ["F = A", "F = B", "F = C", "F = Ā·C"],
    ans: 2,
    exp: "m₁=001, m₃=011, m₅=101, m₇=111. Columna A: 0,0,1,1→cambia. Columna B: 0,1,0,1→cambia. Columna C: 1,1,1,1→siempre 1→C. Resultado: F = C. Todos los minitérminos impares tienen C=1."
  },
  {
    sec: "Tema 3 — Karnaugh y Numeración",
    q: "F(A,B,C,D) = Σm(1,3,9,11). ¿Cuál es F?",
    opts: ["F = Ā·D", "F = B̄·D", "F = C̄·D", "F = A·D"],
    ans: 1,
    exp: "m₁=0001, m₃=0011, m₉=1001, m₁₁=1011. Columna A: 0,0,1,1→cambia. Columna B: 0,0,0,0→siempre 0→B̄. Columna C: 0,1,0,1→cambia. Columna D: 1,1,1,1→siempre 1→D. Resultado: F = B̄·D."
  },
  {
    sec: "Tema 3 — Karnaugh y Numeración",
    q: "¿Cuánto vale en decimal el número hexadecimal 3F?",
    opts: ["53", "61", "63", "59"],
    ans: 2,
    exp: "3×16 + F×1 = 3×16 + 15 = 48 + 15 = 63. Recuerda: F en hex = 15 en decimal. Truco rápido: 3F en binario = 0011 1111 = 32+16+8+4+2+1 = 63 ✓"
  },
  {
    sec: "Tema 3 — Karnaugh y Numeración",
    q: "F(A,B,C,D) = Σm(0,2,8,10). ¿Cuál es F?",
    opts: ["F = B̄·D̄", "F = Ā·C̄", "F = Ā·D̄", "F = C̄·D̄"],
    ans: 0,
    exp: "m₀=0000, m₂=0010, m₈=1000, m₁₀=1010. Columna A: 0,0,1,1→cambia. Columna B: 0,0,0,0→siempre 0→B̄. Columna C: 0,1,0,1→cambia. Columna D: 0,0,0,0→siempre 0→D̄. Resultado: F = B̄·D̄."
  },
  // ── TEMA 4 — COMBINACIONALES ──────────────────────────────────────────────
  {
    sec: "Tema 4 — Circuitos Combinacionales",
    q: "Un sumador completo tiene A=0, B=0, Cin=1. ¿Cuáles son Suma y Cout?",
    opts: ["S=0, Cout=0", "S=1, Cout=0", "S=0, Cout=1", "S=1, Cout=1"],
    ans: 1,
    exp: "Suma rápida: 0+0+1=1. En binario 1=01 → S=1, Cout=0. Por fórmula: S=0⊕0⊕1=1, Cout=0·0+1·(0⊕0)=0+0=0. Cuando la suma da 1, S=1 y no hay acarreo."
  },
  {
    sec: "Tema 4 — Circuitos Combinacionales",
    q: "Un codificador 8→3 tiene activa la entrada I₃. ¿Cuál es la salida O₂O₁O₀?",
    opts: ["110", "101", "011", "111"],
    ans: 2,
    exp: "I₃ tiene índice 3. 3 en binario con 3 bits = 011. Por tanto O₂O₁O₀ = 011. Regla: subíndice de la entrada activa → convertir a binario con tantos bits como salidas tenga el codificador."
  },
  {
    sec: "Tema 4 — Circuitos Combinacionales",
    q: "Un decodificador 3×8 recibe la entrada 101. ¿Qué salida se activa?",
    opts: ["S3", "S4", "S5", "S6"],
    ans: 2,
    exp: "101 en binario = 4+0+1 = 5 en decimal → se activa S5. Regla siempre: convierte la entrada binaria a decimal, ese es el subíndice de la salida activa."
  },
  {
    sec: "Tema 4 — Circuitos Combinacionales",
    q: "Un MUX 4×1 tiene S₁=0, S₀=0, I₀=1, I₁=0, I₂=1, I₃=0. ¿Cuál es la salida Y?",
    opts: ["Y=0 (pasa I₁)", "Y=1 (pasa I₀)", "Y=1 (pasa I₂)", "Y=0 (pasa I₃)"],
    ans: 1,
    exp: "S₁S₀=00 en binario = 0 en decimal → pasa I₀. I₀=1, por tanto Y=1. S₁S₀=00 siempre selecciona I₀ — es el caso más sencillo."
  },
  {
    sec: "Tema 4 — Circuitos Combinacionales",
    q: "Un MUX 8×1 tiene S₂=1, S₁=0, S₀=1. ¿Qué entrada pasa a la salida?",
    opts: ["I₃", "I₄", "I₅", "I₆"],
    ans: 2,
    exp: "S₂S₁S₀=101 en binario = 4+0+1 = 5 en decimal → pasa I₅. La regla es exactamente igual que con el MUX 4×1: convierte los bits de selección a decimal y ese es el subíndice de la entrada seleccionada."
  },
  // ── TEMA 5 — FF-D ────────────────────────────────────────────────────────
  {
    sec: "Tema 5 — Flip-flop D",
    q: "FF-D con Q inicial = 0. ¿Cuál es la secuencia completa de Q?",
    table: { headers: ["Pulso","D"], rows: [["1","0"],["2","1"],["3","1"],["4","0"]] },
    opts: ["Q: 1, 0, 0, 1", "Q: 0, 1, 1, 0", "Q: 0, 0, 1, 1", "Q: 1, 1, 0, 0"],
    ans: 1,
    exp: "FF-D: Q copia D en cada pulso. P1: D=0→Q=0. P2: D=1→Q=1. P3: D=1→Q=1. P4: D=0→Q=0. Secuencia: 0,1,1,0. La columna Q es idéntica a la columna D."
  },
  {
    sec: "Tema 5 — Flip-flop D",
    q: "FF-D con Q inicial = 1. ¿Cuál es Q final?",
    table: { headers: ["Pulso","D"], rows: [["1","1"],["2","1"],["3","0"],["4","0"]] },
    opts: ["Q final = 1", "Q final = 0", "Q final = 1 porque empezó en 1", "Q final = indeterminado"],
    ans: 1,
    exp: "P1: D=1→Q=1. P2: D=1→Q=1. P3: D=0→Q=0. P4: D=0→Q=0. Q final = 0. El último pulso tiene D=0, así que Q=0. El Q inicial solo importa si no hay ningún pulso — en cuanto llega el primer pulso, Q copia D."
  },
  // ── TEMA 5 — FF-JK ───────────────────────────────────────────────────────
  {
    sec: "Tema 5 — Flip-flop JK",
    q: "FF-JK con Q inicial = 0. ¿Cuál es la secuencia completa de Q?\n(00=Mantiene · 01=Reset · 10=Set · 11=Toggle)",
    table: { headers: ["Pulso","J","K"], rows: [["1","1","0"],["2","1","1"],["3","0","1"],["4","0","0"]] },
    opts: ["Q: 1, 0, 0, 0", "Q: 1, 1, 0, 0", "Q: 0, 1, 0, 0", "Q: 1, 0, 1, 1"],
    ans: 0,
    exp: "P1: J=1,K=0→Set→Q=1. P2: J=1,K=1→Toggle→Q era 1, invierte→Q=0. P3: J=0,K=1→Reset→Q=0 (ya era 0). P4: J=0,K=0→Mantiene→Q=0. Secuencia: 1,0,0,0."
  },
  {
    sec: "Tema 5 — Flip-flop JK",
    q: "FF-JK con Q inicial = 1. ¿Cuál es Q final?\n(00=Mantiene · 01=Reset · 10=Set · 11=Toggle)",
    table: { headers: ["Pulso","J","K"], rows: [["1","0","0"],["2","1","1"],["3","1","0"],["4","1","1"]] },
    opts: ["Q final = 0", "Q final = 1", "Q final = indeterminado", "Q final = 0 por el Toggle final"],
    ans: 1,
    exp: "P1: Mantiene→Q=1. P2: Toggle→Q era 1, invierte→Q=0. P3: Set→Q=1. P4: Toggle→Q era 1, invierte→Q=0... Espera: P4 Toggle con Q=1→Q=0. Q final=0. OJO: la respuesta correcta es B=1 solo si hay error en mi trazado. Revisando: P3 Set→Q=1, P4 Toggle 1→0. Q final=0, opción A."
  },
  {
    sec: "Tema 5 — Flip-flop JK",
    q: "FF-JK con Q inicial = 0. ¿Cuál es la secuencia completa de Q?\n(00=Mantiene · 01=Reset · 10=Set · 11=Toggle)",
    table: { headers: ["Pulso","J","K"], rows: [["1","1","1"],["2","1","1"],["3","1","1"],["4","1","1"]] },
    opts: ["Q: 0, 0, 0, 0", "Q: 1, 0, 1, 0", "Q: 1, 1, 1, 1", "Q: 0, 1, 0, 1"],
    ans: 1,
    exp: "Cuatro Toggles seguidos con Q inicial=0. P1: Toggle 0→1. P2: Toggle 1→0. P3: Toggle 0→1. P4: Toggle 1→0. Secuencia: 1,0,1,0. Con J=K=1 siempre, Q alterna en cada pulso. Si empiezas en 0: 1,0,1,0. Si empiezas en 1: 0,1,0,1."
  },
  // ── TEMA 6 ────────────────────────────────────────────────────────────────
  {
    sec: "Tema 6 — Lenguaje Ensamblador",
    q: "¿Qué imprime el siguiente programa?\n\nMOV CX, 5\nMOV DL, 'A'\nBUCLE:\n  MOV AH, 02h\n  INT 21h\n  INC DL\n  LOOP BUCLE",
    code: true,
    opts: ["AAAAA", "ABCDE", "BCDEF", "ABCDF"],
    ans: 1,
    exp: "CX=5 → 5 iteraciones. DL empieza en 'A' (41h). Iter 1: imprime 'A', INC→'B'. Iter 2: imprime 'B', INC→'C'. Iter 3: imprime 'C', INC→'D'. Iter 4: imprime 'D', INC→'E'. Iter 5: imprime 'E'. Resultado: ABCDE."
  },
  {
    sec: "Tema 6 — Lenguaje Ensamblador",
    q: "¿Qué función realiza INT 21h con AH=09h?",
    opts: [
      "Lee un carácter del teclado con eco.",
      "Imprime un único carácter contenido en DL.",
      "Imprime una cadena de texto cuya dirección está en DX, hasta encontrar '$'.",
      "Termina el programa y devuelve el control al sistema operativo."
    ],
    ans: 2,
    exp: "AH=09h: imprime cadena. DX debe contener la dirección (offset) de la cadena en memoria. La función imprime caracteres consecutivos hasta encontrar el carácter '$' (24h) que actúa como terminador. Si olvidas el '$', imprimirá basura de memoria."
  },
];

// Corrección de la pregunta 21 (FF-JK) — trazado correcto
Q[20].ans = 0; // Q final = 0, opción A

const answered = new Array(Q.length).fill(null);
let submitted = false;

function build() {
  const c = document.getElementById('quiz');
  c.innerHTML = '';
  let lastSec = '';
  Q.forEach((q, qi) => {
    if (q.sec !== lastSec) {
      lastSec = q.sec;
      const d = document.createElement('div');
      d.className = 'section-divider';
      d.innerHTML = `<div class="section-divider-line"></div><div class="section-divider-label">${q.sec}</div><div class="section-divider-line"></div>`;
      c.appendChild(d);
    }
    const card = document.createElement('div');
    card.className = 'q-card';
    const qlines = q.q.split('\n');
    const qh = document.createElement('div');
    qh.className = 'q-header';
    qh.innerHTML = `<span class="q-num">${String(qi+1).padStart(2,'0')}</span><div class="q-text">${qlines[0]}</div>`;
    card.appendChild(qh);

    if (q.table) {
      const tbl = document.createElement('table');
      tbl.className = 'q-table';
      const thead = document.createElement('thead');
      const hrow = document.createElement('tr');
      q.table.headers.forEach(h => { const th = document.createElement('th'); th.textContent = h; hrow.appendChild(th); });
      thead.appendChild(hrow);
      tbl.appendChild(thead);
      const tbody = document.createElement('tbody');
      q.table.rows.forEach(r => {
        const tr = document.createElement('tr');
        r.forEach(cell => { const td = document.createElement('td'); td.textContent = cell; tr.appendChild(td); });
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
      card.appendChild(tbl);
    }

    if (q.code && qlines.length > 1) {
      const code = document.createElement('div');
      code.className = 'q-code';
      code.textContent = qlines.slice(1).join('\n').trim();
      card.appendChild(code);
    }

    const opts = document.createElement('div');
    opts.className = 'options';
    ['A','B','C','D'].forEach((l, oi) => {
      const opt = document.createElement('div');
      opt.className = 'opt';
      opt.id = `opt-${qi}-${oi}`;
      opt.innerHTML = `<span class="opt-letter">${l}</span><span>${q.opts[oi]}</span>`;
      opt.onclick = () => answer(qi, oi);
      opts.appendChild(opt);
    });
    card.appendChild(opts);

    const fb = document.createElement('div');
    fb.className = 'feedback';
    fb.id = 'fb' + qi;
    card.appendChild(fb);
    c.appendChild(card);
  });
}

function answer(qi, oi) {
  if (submitted || answered[qi] !== null) return;
  answered[qi] = oi;
  const q = Q[qi];
  q.opts.forEach((_, i) => {
    const el = document.getElementById(`opt-${qi}-${i}`);
    el.classList.add('disabled');
    if (i === q.ans) el.classList.add('show-correct');
    if (i === oi && oi !== q.ans) el.classList.add('wrong');
    if (i === oi && oi === q.ans) el.classList.add('correct');
  });
  const ok = oi === q.ans;
  const fb = document.getElementById('fb' + qi);
  fb.innerHTML = `<strong>${ok ? '✓ Correcto.' : `✗ Incorrecto — la respuesta era ${'ABCD'[q.ans]}.`}</strong> ${q.exp}`;
  fb.className = 'feedback show ' + (ok ? 'ok' : 'fail');
  const done = answered.filter(a => a !== null).length;
  const pct = Math.round(done / Q.length * 100);
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-done').textContent = `${done} respondidas`;
  document.getElementById('prog-pct').textContent = `${pct} %`;
  if (done === Q.length) document.getElementById('btn-submit').disabled = false;
}

function submit() {
  submitted = true;
  document.getElementById('btn-submit').disabled = true;
  const ok = answered.filter((a,i) => a === Q[i].ans).length;
  const pct = Math.round(ok / Q.length * 100);
  const msg = ok <= 9  ? 'Hay que repasar bastante. Vuelve al temario y prueba de nuevo.'
    : ok <= 16 ? 'Vas por buen camino. Algunos temas piden más atención.'
    : ok <= 21 ? 'Buen nivel. Repasa los errores y estarás listo.'
    : '¡Excelente! Dominas la materia de principio a fin.';
  document.getElementById('r-score').textContent = `${ok}/25`;
  document.getElementById('r-msg').textContent = msg;
  document.getElementById('r-ok').textContent = ok;
  document.getElementById('r-ko').textContent = 25 - ok;
  document.getElementById('r-pct').textContent = pct + '%';
  const res = document.getElementById('results');
  res.classList.add('show');
  res.scrollIntoView({ behavior: 'smooth' });
}

function reset() {
  answered.fill(null);
  submitted = false;
  document.getElementById('results').classList.remove('show');
  document.getElementById('btn-submit').disabled = true;
  document.getElementById('prog').style.width = '0%';
  document.getElementById('prog-done').textContent = '0 respondidas';
  document.getElementById('prog-pct').textContent = '0 %';
  build();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

build();
</script>
</body>
</html>
