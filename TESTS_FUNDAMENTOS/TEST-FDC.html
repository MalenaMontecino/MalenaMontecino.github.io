<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TEST FDC</title>
    <style>
        :root { --primary: #003366; --secondary: #ff6600; --success: #28a745; --error: #dc3545; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); }
        .nav-bar { position: sticky; top: 0; background: white; padding: 15px 0; z-index: 1000; border-bottom: 2px solid #ddd; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .nav-btn { padding: 8px 12px; border: 1px solid #ccc; border-radius: 8px; background: #f8f9fa; cursor: pointer; font-size: 0.75em; font-weight: bold; transition: 0.3s; color: var(--primary); }
        .nav-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .score-board { position: fixed; top: 20px; right: 20px; background: var(--primary); color: white; padding: 15px 25px; border-radius: 12px; font-weight: bold; box-shadow: 0 8px 20px rgba(0,0,0,0.3); z-index: 2000; }
        .q-card { margin-bottom: 35px; padding: 30px; border: 1px solid #e1e4e8; border-radius: 15px; background: #fafafa; }
        .tag { display: inline-block; background: var(--secondary); color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.7em; font-weight: 800; margin-bottom: 12px; text-transform: uppercase; }
        .q-text { font-weight: 700; font-size: 1.1em; display: block; margin-bottom: 20px; line-height: 1.4; }
        .opt-item { margin: 12px 0; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; background: white; transition: 0.2s; }
        .opt-item:hover { border-color: var(--primary); background: #f0f7ff; transform: translateX(5px); }
        .correct { background-color: #d4edda !important; border-color: var(--success) !important; color: #155724; font-weight: bold; }
        .incorrect { background-color: #f8d7da !important; border-color: var(--error) !important; color: #721c24; }
        .feedback { display: none; margin-top: 20px; padding: 20px; border-radius: 10px; background: #fff; border-left: 6px solid #ccc; font-size: 0.95em; }
        .ref { color: var(--primary); font-weight: 800; display: block; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; font-style: italic; }
        .hidden { display: none !important; }
    </style>
</head>

let cCount = 0; let wCount = 0;
const attempted = new Set();
const alreadyFailed = new Set();

function init() {
    const nav = document.getElementById('nav');
    for(let i=1; i<=12; i++) {
        const b = document.createElement('button');
        b.className = 'nav-btn';
        b.innerText = `S${i}`;
        b.onclick = (e) => filter('s'+i, e.target);
        nav.insertBefore(b, nav.lastElementChild);
    }

    const container = document.getElementById('quiz-container');
    masterBank.forEach((item, idx) => {
        const type = item.s === 'guide' ? 'guide' : 's'+item.s;
        const div = document.createElement('div');
        div.className = `q-card ${type}`;
        div.innerHTML = `
            <span class="tag">${item.s === 'guide' ? 'Guía de Estudio' : 'Sesión ' + item.s}</span>
            <span class="q-text">${idx + 1}. ${item.q}</span>
            <div class="opt-list">
                ${item.a.map((opt, aIdx) => `
                    <div class="opt-item" onclick="check(this, ${idx}, ${aIdx})">
                        ${String.fromCharCode(65+aIdx)}) ${opt}
                    </div>
                `).join('')}
            </div>
            <div id="fb-${idx}" class="feedback"></div>
        `;
        container.appendChild(div);
    });
}

function check(el, qIdx, sel) {
    const item = masterBank[qIdx];
    const fb = document.getElementById(`fb-${qIdx}`);
    if (sel === item.c) {
        el.classList.add('correct');
        if (!attempted.has(qIdx)) {
            if (!alreadyFailed.has(qIdx)) {
                cCount++;
                document.getElementById('c-count').innerText = cCount;
            }
            attempted.add(qIdx);
        }
        fb.innerHTML = `<strong>¡Correcto!</strong> ${item.e} <span class="ref">Fuente: ${item.s === 'guide' ? 'Guía de Estudio' : 'Sesión ' + item.s}</span>`;
        fb.style.display = "block";
        el.parentNode.style.pointerEvents = "none";
    } else {
        if (!el.classList.contains('incorrect')) {
            el.classList.add('incorrect');
            if (!attempted.has(qIdx) && !alreadyFailed.has(qIdx)) {
                wCount++;
                document.getElementById('w-count').innerText = wCount;
                alreadyFailed.add(qIdx);
            }
        }
        fb.innerHTML = `<strong>Error.</strong> Puedes intentarlo de nuevo, pero no sumará al marcador de aciertos.`;
        fb.style.display = "block";
    }
}

function filter(id, btn) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    if(btn) btn.classList.add('active');
    document.querySelectorAll('.q-card').forEach(c => {
        if(id === 'all' || c.classList.contains(id)) c.classList.remove('hidden');
        else c.classList.add('hidden');
    });
    window.scrollTo(0,0);
}

init();
</script>
