            {
                id: 40,
                titulo: "Pregunta 40. Pregunta teórica: estructura adecuada",
                texto: "Queremos modelar una cola de personas esperando en una ventanilla. La primera persona que llega debe ser la primera atendida.\n¿Qué estructura encaja mejor?",
                opciones: [
                    "A) Pila, porque usa LIFO.",
                    "B) Cola, porque usa FIFO.",
                    "C) Árbol, porque todos tienen un padre.",
                    "D) Array sin ninguna operación de salida."
                ],
                correcta: 1
            }
        ];

        let respondidasCount = 0;
        let correctasCount = 0;
        let incorrectasCount = 0;

        const container = document.getElementById('quiz-container');

        function inicializarQuiz() {
            preguntas.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'pregunta-card';
                card.id = `pregunta-${index}`;

                const titulo = document.createElement('div');
                titulo.className = 'pregunta-titulo';
                titulo.innerText = q.titulo;
                card.appendChild(titulo);

                const texto = document.createElement('div');
                texto.className = 'pregunta-texto';
                texto.innerText = q.texto;
                card.appendChild(texto);

                if (q.codigo) {
                    const codigoDiv = document.createElement('pre');
                    codigoDiv.className = 'codigo';
                    codigoDiv.innerText = q.codigo;
                    card.appendChild(codigoDiv);
                }

                const opcionesDiv = document.createElement('div');
                opcionesDiv.className = 'opciones';

                q.opciones.forEach((opcion, opcIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'opcion-btn';
                    btn.innerText = opcion;
                    btn.onclick = () => verificarRespuesta(index, opcIndex, btn);
                    opcionesDiv.appendChild(btn);
                });

                card.appendChild(opcionesDiv);
                container.appendChild(card);
            });
        }

        function verificarRespuesta(pIndex, opcIndex, botonSeleccionado) {
            const q = preguntas[pIndex];
            const card = document.getElementById(`pregunta-${pIndex}`);
            const botones = card.querySelectorAll('.opcion-btn');

            // Incrementar contador de respondidas
            respondidasCount++;
            document.getElementById('respondidas').innerText = respondidasCount;

            if (opcIndex === q.correcta) {
                botonSeleccionado.classList.add('correcto');
                correctasCount++;
                document.getElementById('correctas').innerText = correctasCount;
            } else {
                botonSeleccionado.classList.add('incorrecto');
                // Mostrar la correcta también para aprender del error
                botones[q.correcta].classList.add('correcto');
                incorrectasCount++;
                document.getElementById('incorrectas').innerText = incorrectasCount;
            }

            // Deshabilitar todos los botones de esta tarjeta para que no se vuelva a votar
            botones.forEach(btn => {
                btn.disabled = true;
                btn.classList.add('deshabilitado');
            });
        }

        // Arrancar el test al cargar
        window.onload = inicializarQuiz;
    </script>
</body>
</html>
