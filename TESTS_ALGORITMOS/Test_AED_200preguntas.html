{id:86,tags:['extra'],text:'¿Cuántos tipos primitivos existen en Java?',
options:['4','6','8','10'],
correct:2,explanation:'Java tiene exactamente 8 tipos primitivos: byte, short, int, long, float, double, char y boolean.'},

{id:87,tags:['extra'],text:'¿Cuál es la diferencia entre <code>++x</code> y <code>x++</code>?',
options:['No hay diferencia','++x incrementa ANTES de usar el valor; x++ incrementa DESPUÉS de usar el valor','++x solo funciona con int; x++ funciona con todos los tipos','++x es más rápido'],
correct:1,explanation:'Pre-incremento (++x): incrementa x primero, luego usa el nuevo valor. Post-incremento (x++): usa el valor actual de x primero, luego lo incrementa. Esto importa en expresiones como: y = x++ (y recibe el valor anterior).'},

{id:88,tags:['extra'],text:'¿Qué imprime este código? <code>int x = 1; int y = x++; System.out.println(y);</code>',
options:['2','1','0','Error'],
correct:1,explanation:'x++ es post-incremento: y recibe el valor ACTUAL de x (que es 1), luego x se incrementa a 2. Así y vale 1. Si fuera ++x, y recibiría 2.'},

{id:89,tags:['extra'],text:'¿Qué significa que Java es "fuertemente tipado" (strongly typed)?',
options:['Los programas tardan más en compilar','Cada variable tiene un tipo fijo y Java verifica los tipos en tiempo de compilación','Las variables pueden cambiar de tipo','El compilador es muy lento'],
correct:1,explanation:'En Java, cada variable debe declararse con un tipo específico. El compilador verifica que los tipos sean compatibles. No puedes, por ejemplo, asignar un String a un int sin conversión explícita.'},

{id:90,tags:['extra'],text:'¿Qué operador calcula el resto de la división entera en Java?',
options:['/','//','%','mod'],
correct:2,explanation:'El operador % (módulo) devuelve el resto de la división entera. Por ejemplo: 10 % 3 = 1 (10 dividido entre 3 da 3 con resto 1).'},

{id:91,tags:['extra'],text:'¿Qué ocurre si se accede a la posición array.length de un array en Java?',
options:['Devuelve null','Devuelve 0','Lanza ArrayIndexOutOfBoundsException','Devuelve el último elemento'],
correct:2,explanation:'Los índices válidos de un array de tamaño N son 0 a N-1. Acceder a la posición N (= array.length) está fuera de rango y lanza ArrayIndexOutOfBoundsException en tiempo de ejecución.'},

{id:92,tags:['extra'],text:'¿Qué hace el método <code>Math.sqrt(x)</code> en Java?',
options:['Eleva x al cuadrado','Devuelve la raíz cuadrada de x','Devuelve el valor absoluto de x','Redondea x'],
correct:1,explanation:'Math.sqrt(x) devuelve la raíz cuadrada de x como double. Por ejemplo, Math.sqrt(4) devuelve 2.0. La clase Math contiene funciones matemáticas estáticas.'},

{id:93,tags:['extra'],text:'¿Cuál de estas afirmaciones sobre los bucles for y while es correcta?',
options:['for solo funciona con números','while no puede tener condición','Ambos pueden usarse para la misma tarea; se elige según el contexto','for es más rápido que while'],
correct:2,explanation:'for y while son intercambiables en poder expresivo. Por convención: for se usa cuando se conoce el número de iteraciones, while cuando se repite hasta que una condición cambie.'},

{id:94,tags:['extra'],text:'¿Qué significa <code>static final</code> en un atributo de clase Java?',
options:['El atributo puede cambiar de valor una vez','Es una constante: su valor no puede modificarse tras la inicialización','static significa que es privado','final significa que es público'],
correct:1,explanation:'static: el atributo pertenece a la clase (no a cada instancia). final: su valor no puede cambiar después de inicializarse. Juntos crean una constante de clase. En la práctica: private static final int MAX = 100.'},

{id:95,tags:['extra'],text:'¿Cuál es la complejidad temporal de buscar un elemento en un array desordenado de N elementos?',
options:['O(1)','O(log N)','O(N)','O(N²)'],
correct:2,explanation:'En el peor caso, el elemento buscado está al final o no existe. Hay que comparar con todos los N elementos. La complejidad es O(N) (lineal).'},

{id:96,tags:['extra'],text:'¿Cuál es la complejidad de la búsqueda binaria en un array ordenado?',
options:['O(1)','O(log N)','O(N)','O(N²)'],
correct:1,explanation:'La búsqueda binaria divide el espacio de búsqueda a la mitad en cada paso. El número de pasos para encontrar un elemento en N elementos es log₂N. Complejidad: O(log N).'},

{id:97,tags:['extra'],text:'¿Qué complejidad tiene un algoritmo con dos bucles anidados donde cada uno itera N veces?',
options:['O(N)','O(N + N)','O(N²)','O(2N)'],
correct:2,explanation:'Dos bucles anidados de N iteraciones cada uno producen N × N = N² operaciones en total. La complejidad es O(N²) (cuadrática).'},

{id:98,tags:['extra'],text:'¿Cuál de estas complejidades crece MÁS RÁPIDO para valores grandes de N?',
options:['O(N log N)','O(N²)','O(2ᴺ)','O(N³)'],
correct:2,explanation:'La jerarquía de crecimiento es: O(1) < O(log N) < O(N) < O(N log N) < O(N²) < O(N³) < O(2ᴺ). La exponencial O(2ᴺ) crece mucho más rápido que cualquier polinomio.'},

{id:99,tags:['extra'],text:'¿Cuál es el término dominante de: <code>10N³ + N² + 40N + 80</code>?',
options:['80','40N','N²','10N³'],
correct:3,explanation:'El término dominante es el de mayor grado, que determina el comportamiento para N grande. En 10N³ + N² + 40N + 80, el término dominante es 10N³, así que la función es O(N³).'},

{id:100,tags:['extra'],text:'¿Qué notación representa el límite INFERIOR del tiempo de ejecución?',
options:['O-grande (Big-O)','Omega (Ω)','Theta (Θ)','Delta (Δ)'],
correct:1,explanation:'Omega (Ω) representa el límite inferior: T(N) = Ω(f(N)) significa que el algoritmo tarda AL MENOS cf(N) operaciones. O-grande es el límite superior. Theta es cuando ambos coinciden (cota exacta).'},

{id:101,tags:['extra'],text:'¿Qué es la herencia transitiva en Java?',
options:['Una clase puede heredar de varias clases a la vez','Si A extiende B y B extiende C, entonces A también es de tipo C','La herencia solo funciona con interfaces','Los constructores se heredan automáticamente'],
correct:1,explanation:'La herencia es transitiva: si A extends B y B extends C, entonces A también es un subtipo de C (A "es un" C). Esto permite el polimorfismo en cadenas de herencia.'},

{id:102,tags:['extra'],text:'¿Una clase en Java puede implementar más de una interfaz?',
options:['No, solo una interfaz','Sí, puede implementar varias interfaces','Solo si son del mismo paquete','Solo si la clase es abstracta'],
correct:1,explanation:'Sí. En Java, una clase puede implementar múltiples interfaces: class A extends B implements XX, YY, ZZ {}. Esto es la forma de Java de implementar herencia múltiple de forma segura.'},

{id:103,tags:['extra'],text:'¿Cuál es la diferencia entre <code>extends</code> e <code>implements</code> en Java?',
options:['Son sinónimos','extends se usa para heredar de una clase; implements para implementar interfaces','implements se usa para clases, extends para interfaces','extends es para métodos, implements para atributos'],
correct:1,explanation:'extends: hereda de una clase (solo una). implements: implementa una o más interfaces. Una clase puede combinar ambos: class A extends B implements C, D {}.'},

{id:104,tags:['extra'],text:'¿Qué ocurre si una clase declara implementar una interfaz pero no implementa todos sus métodos?',
options:['Java ignora los métodos no implementados','Error de compilación, a menos que la clase sea abstracta','La clase implementa los métodos vacíos automáticamente','Error en tiempo de ejecución'],
correct:1,explanation:'Si una clase concreta (no abstracta) declara implementar una interfaz, DEBE implementar todos los métodos que declara la interfaz. Si no lo hace, el compilador da error. Una clase abstracta puede dejar métodos sin implementar.'},

{id:105,tags:['extra'],text:'¿Qué es el recorrido preorden de un árbol binario?',
options:['Izquierda → raíz → derecha','Raíz → izquierda → derecha','Izquierda → derecha → raíz','Derecha → raíz → izquierda'],
correct:1,explanation:'Preorden: primero se visita el nodo raíz, luego el subárbol izquierdo recursivamente, luego el subárbol derecho recursivamente. Mnemónico: raíz PRIMERO (pre = antes).'},

{id:106,tags:['extra'],text:'¿Qué es el recorrido postorden de un árbol binario?',
options:['Raíz → izquierda → derecha','Izquierda → raíz → derecha','Izquierda → derecha → raíz','Derecha → izquierda → raíz'],
correct:2,explanation:'Postorden: primero subárbol izquierdo, luego subárbol derecho, finalmente el nodo raíz. Mnemónico: la raíz al FINAL (post = después).'},

{id:107,tags:['extra'],text:'¿El recorrido inorden de un ABB produce los elementos en qué orden?',
options:['Orden descendente','Orden aleatorio','Orden ascendente','Orden de inserción'],
correct:2,explanation:'El recorrido inorden de un ABB produce los elementos en orden ascendente (de menor a mayor). Esto se debe a la propiedad del ABB: izquierda < raíz < derecha.'},

{id:108,tags:['extra'],text:'¿Qué es un árbol AVL?',
options:['Un árbol sin hijos','Un ABB con propiedad de balance: la diferencia de alturas de los subárboles de cada nodo es como máximo 1','Un árbol donde todos los nodos tienen exactamente dos hijos','Un árbol ordenado por nombre de sus creadores'],
correct:1,explanation:'Un árbol AVL (Adelson-Velskii y Landis) es un ABB autobalanceado: para cada nodo, |altura(subárbol izquierdo) - altura(subárbol derecho)| ≤ 1. Garantiza operaciones en O(log N).'},

{id:109,tags:['extra'],text:'¿Cuál es la ventaja principal de un árbol AVL frente a un ABB normal?',
options:['Permite duplicados','Garantiza O(log N) para todas las operaciones porque mantiene el árbol balanceado','No necesita comparar elementos','Ocupa menos memoria'],
correct:1,explanation:'Un ABB normal puede degenerarse (si se insertan elementos en orden, forma una lista → O(N)). El AVL mantiene el balance automáticamente, garantizando siempre O(log N) para búsqueda, inserción y eliminación.'},

{id:110,tags:['extra'],text:'¿Cuál es la complejidad de insertar un elemento en un ArrayList en la posición 0?',
options:['O(1)','O(log N)','O(N)','O(N²)'],
correct:2,explanation:'Insertar en la posición 0 de un ArrayList requiere desplazar todos los N elementos una posición hacia la derecha. Esto es O(N). En contraste, insertar al final es O(1) amortizado.'},

{id:111,tags:['extra'],text:'¿Cuál es la complejidad de todas las operaciones básicas de una Pila implementada con array?',
options:['O(N)','O(log N)','O(1)','O(N²)'],
correct:2,explanation:'Una Pila implementada con array (tope = último elemento) realiza push y pop en O(1). No hay búsqueda ni desplazamientos. El tope siempre está en la posición numElementos-1.'},

{id:112,tags:['extra'],text:'¿Cuál es la complejidad de encolar y desencolar en una Cola implementada con lista doblemente enlazada con centinelas?',
options:['O(N)','O(log N)','O(1)','O(N²)'],
correct:2,explanation:'Con una lista doblemente enlazada con centinelas, añadir al final (encolar) y eliminar del principio (desencolar) son operaciones O(1). Solo se cambian punteros, no hay desplazamientos.'},

{id:113,tags:['extra'],text:'¿Cuántas veces se llama a pop() para evaluar una expresión postfija con un operador binario (+, -, *, /)?',
options:['Una vez','Dos veces','Tres veces','Ninguna'],
correct:1,explanation:'Los operadores binarios (+, -, *, /) operan sobre DOS operandos. Por tanto, cuando se encuentra un operador binario en la expresión postfija, se hacen dos pop() (uno para cada operando), se aplica la operación, y se hace un push() del resultado.'},

{id:114,tags:['extra'],text:'¿Cuál es la forma correcta de declarar un Scanner para leer del teclado en Java?',
options:['Scanner sc = new Scanner();','Scanner sc = new Scanner(System.in);','Scanner sc = Scanner.create();','Input sc = new Input()'],
correct:1,explanation:'Para leer del teclado se usa: Scanner teclado = new Scanner(System.in); System.in representa la entrada estándar (teclado). Después se cierra con teclado.close().'},

{id:115,tags:['extra'],text:'¿Qué método de Scanner lee un entero desde teclado?',
options:['sc.readInt()','sc.getInt()','sc.nextInt()','sc.parseInt()'],
correct:2,explanation:'El método nextInt() de la clase Scanner lee el siguiente token de la entrada y lo interpreta como un entero. Si el usuario escribe algo que no es un número entero, lanza InputMismatchException.'},

{id:116,tags:['extra'],text:'¿Qué hace <code>teclado.close()</code> al final del programa en Prueba_Conjunto?',
options:['Cierra el programa','Cierra el Scanner liberando el recurso System.in','Borra todos los datos leídos','No hace nada importante'],
correct:1,explanation:'teclado.close() cierra el Scanner y libera el recurso asociado (System.in). Es una buena práctica cerrar los recursos abiertos al terminar de usarlos, para evitar fugas de recursos.'},

{id:117,tags:['extra'],text:'Si un algoritmo resuelve dos subproblemas de tamaño N/2 con trabajo lineal adicional, ¿cuál es su complejidad?',
options:['O(N)','O(N²)','O(N log N)','O(log N)'],
correct:2,explanation:'Teorema maestro: si T(N) = 2T(N/2) + N, la solución es O(N log N). Esto aplica a algoritmos como MergeSort y el algoritmo D&C para la subsecuencia contigua de suma máxima.'},

{id:118,tags:['extra'],text:'¿Qué es la subsecuencia contigua de suma máxima?',
options:['El mayor elemento del array','La subsecuencia de elementos consecutivos cuya suma es la mayor posible','El subarray de mayor longitud','El primer elemento positivo'],
correct:1,explanation:'Dado un array de enteros (que pueden ser negativos), la subsecuencia contigua de suma máxima es el subarray contiguo cuya suma de elementos es la mayor posible. Si todos son negativos, la suma máxima es 0 por convenio.'},

{id:119,tags:['extra'],text:'¿Cuál es la complejidad del algoritmo recursivo de Fibonacci <code>fib(n) = fib(n-1) + fib(n-2)</code>?',
options:['O(N)','O(N log N)','O(N²)','O(2ᴺ) (exponencial)'],
correct:3,explanation:'El Fibonacci recursivo simple tiene complejidad exponencial O(2ᴺ). Cada llamada genera dos llamadas recursivas, formando un árbol de tamaño exponencial. Se puede mejorar a O(N) con memoización o programación dinámica.'},

{id:120,tags:['extra'],text:'¿Qué ventaja tiene usar interfaces en Java para definir el TAD Conjunto?',
options:['Es más fácil de escribir','Permite cambiar la implementación (array, árbol, etc.) sin modificar el código que usa el conjunto','Hace el código más lento','Solo funciona con Integer'],
correct:1,explanation:'Programar contra la interfaz (Conjunto<Integer> c = new Conjunto_Array()) permite cambiar la implementación en cualquier momento (por ejemplo, a un árbol AVL) sin cambiar el código que usa c. Es el principio de sustitución de Liskov.'},

// ── MÁS PREGUNTAS EXTRA ────────────────────────────────────────────────────
{id:121,tags:['extra'],text:'¿Cuál es el resultado de <code>"1" + 2 + 3</code> en Java?',
options:['6','123','Tipo error','1 + 2 + 3'],
correct:1,explanation:'Cuando el primer operando de + es un String, todos los demás se convierten a String y se concatenan. "1" + 2 = "12", luego "12" + 3 = "123". Si fuera 1 + 2 + "3" el resultado sería "33".'},

{id:122,tags:['extra'],text:'¿Cuál es el resultado de <code>1 + 2 + "a"</code> en Java?',
options:['"a12"','"3a"','Error de compilación','3a'],
correct:1,explanation:'Los operadores se evalúan de izquierda a derecha. 1 + 2 = 3 (suma entera), luego 3 + "a" = "3a" (concatenación porque "a" es String). El resultado es el String "3a".'},

{id:123,tags:['extra'],text:'¿Qué hace el método <code>greeting.substring(2, 4)</code> si greeting = "hello"?',
options:['Devuelve "hel"','Devuelve "ll"','Devuelve "llo"','Devuelve "el"'],
correct:1,explanation:'substring(inicio, fin) devuelve los caracteres desde la posición inicio (incluida) hasta fin (excluida). "hello".substring(2,4) devuelve "ll" (posiciones 2 y 3 son \'l\' y \'l\').'},

{id:124,tags:['extra'],text:'Una clase puede extender a otra clase usando <code>extends</code>, ¿cuántas clases puede extender como máximo?',
options:['Dos','Ilimitadas','Una sola','Tres'],
correct:2,explanation:'En Java, una clase solo puede extender EXACTAMENTE UNA clase usando extends. Esto evita el "problema del diamante" de la herencia múltiple. Para herencia múltiple se usan interfaces con implements.'},

{id:125,tags:['extra'],text:'¿Cuál es la diferencia entre el TAD Lista y el TAD Conjunto?',
options:['El conjunto puede repetir elementos pero la lista no','La lista admite elementos repetidos y tiene orden posicional; el conjunto no admite repetidos','Son exactamente iguales','El conjunto solo almacena números'],
correct:1,explanation:'Lista: secuencia ordenada posicionalmente, permite duplicados, se puede acceder por índice. Conjunto: colección sin orden garantizado ni elementos repetidos; las operaciones son pertenencia, unión, intersección, etc.'},

{id:126,tags:['extra'],text:'¿Qué ocurre con la pila cuando se llaman métodos recursivos?',
options:['No se usa la pila','En cada llamada se crea un "activation record" y se apila; al retornar se desapila','La pila se vacía al entrar en recursión','Solo la primera llamada usa la pila'],
correct:1,explanation:'Cada llamada a un método (especialmente en recursión) crea un registro de activación (activation record) con las variables locales y el punto de retorno. Este registro se apila. Al retornar, se desapila. Por eso una recursión muy profunda puede causar StackOverflowError.'},

{id:127,tags:['extra'],text:'¿Qué significa que la herencia múltiple en Java se implementa mediante interfaces?',
options:['Java no soporta herencia múltiple','Java solo permite herencia a través de interfaces','Una clase puede implementar varias interfaces (cada una con métodos abstractos) sin los conflictos de la herencia múltiple de clases','Las interfaces no existen en Java'],
correct:2,explanation:'Java prohíbe extends de varias clases para evitar conflictos (dos métodos con el mismo nombre pero distinta implementación). Las interfaces solo declaran métodos sin implementarlos, así no hay conflicto cuando una clase implementa varias.'},

{id:128,tags:['extra'],text:'¿Qué es un nodo hoja en un árbol?',
options:['El nodo raíz','Un nodo que no tiene hijos','Un nodo con exactamente dos hijos','El nodo con mayor profundidad'],
correct:1,explanation:'Un nodo hoja es aquel que no tiene hijos. En un árbol binario, un nodo hoja tiene left == null y right == null. Las hojas son los nodos terminales del árbol.'},

{id:129,tags:['extra'],text:'¿Cuál es la complejidad de buscar un elemento en un ABB balanceado?',
options:['O(1)','O(log N)','O(N)','O(N²)'],
correct:1,explanation:'En un ABB balanceado (como un AVL), la altura es O(log N). En cada paso de la búsqueda se descarta la mitad del árbol. Por tanto la búsqueda es O(log N).'},

{id:130,tags:['extra'],text:'¿Cuál es la complejidad de buscar en un ABB degenerado (lista enlazada)?',
options:['O(1)','O(log N)','O(N)','O(N²)'],
correct:2,explanation:'Un ABB degenerado ocurre cuando se insertan elementos en orden creciente o decreciente. Forma una lista enlazada con altura N. La búsqueda recorre todos los nodos en el peor caso: O(N).'},

{id:131,tags:['extra'],text:'Dado el ABB con raíz 6, hijos 2 y 8; 2 con hijos 1 y 5; 5 con hijo izquierdo 3. Tras remove(2), ¿cuál es el hijo izquierdo de 6?',
options:['1','5','8','3'],
correct:3,explanation:'remove(2): nodo 2 tiene dos hijos (1 y 5). Se reemplaza por el menor del subárbol derecho (que es 3, hijo de 5). Luego se elimina el 3 de su posición original. El resultado: 3 ocupa el lugar de 2, siendo hijo izquierdo de 6.'},

{id:132,tags:['extra'],text:'¿Qué es un recorrido preorden y en qué se diferencia del inorden?',
options:['Preorden visita raíz primero; inorden visita raíz entre los subárboles','Son el mismo recorrido','Preorden va de derecha a izquierda; inorden de izquierda a derecha','Preorden es para pilas; inorden para colas'],
correct:0,explanation:'Preorden: raíz → izq → der (raíz primero). Inorden: izq → raíz → der (raíz en el medio). Postorden: izq → der → raíz (raíz al final). En un ABB, inorden da los elementos ordenados.'},

{id:133,tags:['extra'],text:'¿Qué estructura de datos usa una cola internamente en su implementación más eficiente?',
options:['Array simple','Lista doblemente enlazada con centinelas','Pila','Árbol binario'],
correct:1,explanation:'La implementación más eficiente de una cola usa una lista doblemente enlazada con centinelas. Encolar (añadir al final) y desencolar (eliminar del principio) son ambas O(1) porque se accede directamente a los extremos mediante los centinelas.'},

{id:134,tags:['extra'],text:'¿Cuántos arcos tiene un árbol con 7 nodos?',
options:['7','8','6','5'],
correct:2,explanation:'Un árbol con N nodos tiene N-1 arcos. Con N=7: 7-1 = 6 arcos. Cada nodo (excepto la raíz) está conectado a su padre por exactamente un arco.'},

{id:135,tags:['extra'],text:'¿Qué significa que una solución recursiva sea "cíclica"?',
options:['Que el algoritmo funciona en círculo','Que el problema se expresa en términos de sí mismo con los MISMOS datos, sin converger a un caso base','Que usa bucles for','Que es correcta y eficiente'],
correct:1,explanation:'Una solución recursiva cíclica define el problema en términos de sí mismo pero con los mismos datos (no más pequeños). Nunca llega al caso base → recursión infinita. Es un error de diseño.'},

{id:136,tags:['extra'],text:'¿Qué es la "profundidad de la raíz" en un árbol?',
options:['La altura del árbol','0, por convenio (la raíz no tiene arcos hacia arriba)','1','El número total de hojas'],
correct:1,explanation:'La profundidad (o nivel) de la raíz es 0 por definición. Es la longitud del camino desde la raíz hasta sí misma, que es 0 (sin arcos). Los nodos hijos de la raíz tienen profundidad 1, sus nietos profundidad 2, etc.'},

{id:137,tags:['extra'],text:'¿Cuál es la diferencia entre profundidad y altura en un árbol?',
options:['Son lo mismo','Profundidad: distancia desde la raíz hasta ese nodo. Altura: distancia desde ese nodo hasta la hoja más lejana.','Profundidad es para hojas, altura para la raíz','La profundidad siempre es mayor'],
correct:1,explanation:'Profundidad de un nodo n: número de arcos desde la raíz hasta n (va "de arriba a abajo"). Altura de un nodo n: longitud del camino más largo desde n hasta una hoja (va "de abajo a arriba"). La altura del árbol = altura de la raíz.'},

{id:138,tags:['extra'],text:'Si insertas en un ABB los valores 5, 3, 7, 1, 4 en ese orden, ¿cuál es la raíz?',
options:['1','3','5','7'],
correct:2,explanation:'El primer elemento insertado se convierte en la raíz. 5 es el primer valor, así que 5 es la raíz. Los siguientes se insertan según la propiedad del ABB: 3<5 (izquierda de 5), 7>5 (derecha de 5), etc.'},

{id:139,tags:['extra'],text:'¿Qué complejidad tiene el recorrido inorden de un ABB con N nodos?',
options:['O(1)','O(log N)','O(N)','O(N²)'],
correct:2,explanation:'El recorrido inorden visita TODOS los nodos exactamente una vez. Si hay N nodos, realiza N visitas → O(N). No importa si el árbol está balanceado o no; todos los nodos deben visitarse.'},

{id:140,tags:['extra'],text:'¿Qué es el principio de encapsulación en POO?',
options:['Heredar de varias clases','Ocultar los detalles internos de una clase y exponer solo lo necesario mediante métodos públicos','Crear objetos sin constructores','Usar arrays para todo'],
correct:1,explanation:'La encapsulación consiste en: 1) ocultar los atributos internos (private), 2) controlar el acceso mediante métodos públicos (getters/setters o métodos de la interfaz). En Prueba_Conjunto, datos[] es private y solo se accede mediante agregar(), pertenece(), etc.'},

{id:141,tags:['extra'],text:'¿Cuál es la notación Big-O de la siguiente función: <code>T(N) = 5N² + 3N + 100</code>?',
options:['O(N)','O(N + 100)','O(N²)','O(5N²)'],
correct:2,explanation:'En Big-O solo importa el término dominante (el que crece más rápido) y se ignoran constantes. El término dominante es N² (grado 2). Las constantes multiplicativas (5) y los términos menores (3N, 100) se ignoran. Resultado: O(N²).'},

{id:142,tags:['extra'],text:'¿Verdadero o Falso? "Todos los logaritmos son equivalentes en notación Big-O (log₂N = O(log₁₀N))"',
options:['Verdadero','Falso','Solo para bases mayores que 2','Solo para N > 100'],
correct:0,explanation:'Verdadero. El cambio de base del logaritmo es solo una constante multiplicativa: log₂N = log₁₀N / log₁₀2. Las constantes se ignoran en Big-O. Por eso se escribe O(log N) sin especificar la base.'},

{id:143,tags:['extra'],text:'¿Cuántas veces divide N entre 2 el bucle <code>while(N > 1) { N = N/2; }</code> hasta parar, para N=8?',
options:['2','3','4','8'],
correct:1,explanation:'N=8: 8/2=4, 4/2=2, 2/2=1. Se detiene. Total de iteraciones: 3 = log₂(8). Esto demuestra por qué ese bucle es O(log N).'},

{id:144,tags:['extra'],text:'¿Qué es el "peor caso" (worst case) en el análisis de algoritmos?',
options:['El caso donde el array está ordenado','La entrada que hace que el algoritmo tarde MÁS tiempo','El caso donde hay menos elementos','El caso donde todos los elementos son iguales'],
correct:1,explanation:'El peor caso (worst case) es la entrada que maximiza el tiempo de ejecución del algoritmo. Por ejemplo, para la búsqueda lineal, el peor caso es cuando el elemento buscado está al final o no existe (N comparaciones).'},

{id:145,tags:['extra'],text:'¿Cuál es la diferencia entre <code>ArrayList</code> y <code>LinkedList</code> en Java?',
options:['Son exactamente iguales','ArrayList usa array interno (acceso O(1), insertar al principio O(N)); LinkedList usa nodos enlazados (acceso O(N), insertar con referencia O(1))','ArrayList es más lento siempre','LinkedList no permite duplicados'],
correct:1,explanation:'ArrayList: array dinámico → acceso por índice O(1), pero insertar/eliminar en el medio requiere desplazar elementos O(N). LinkedList: nodos enlazados → acceso por índice O(N), pero insertar/eliminar con referencia O(1).'},

{id:146,tags:['extra'],text:'¿Qué operación hace el operador ternario <code>(x <= y) ? x : y</code>?',
options:['Suma x e y','Devuelve x si x <= y, y en caso contrario','Asigna x a y','Compara x con y e imprime el resultado'],
correct:1,explanation:'El operador ternario tiene la forma: condición ? valorSiVerdadero : valorSiFalso. Si x <= y la expresión evalúa a x; si no, evalúa a y. Es una forma compacta de escribir un if-else.'},

{id:147,tags:['extra'],text:'¿Qué permite el tipo genérico <code>T</code> en una interfaz como <code>Conjunto<T></code>?',
options:['Que la interfaz funcione solo con Integer','Que la interfaz sea reutilizable con cualquier tipo manteniendo la seguridad de tipos en compilación','Que no se puedan declarar métodos','Que la clase sea abstracta'],
correct:1,explanation:'Los genéricos permiten crear código reutilizable y type-safe. Conjunto<T> funciona con cualquier tipo. Al instanciar Conjunto<Integer>, el compilador garantiza que solo se usen Integer. Conjunto<String> funcionaría con Strings.'},

{id:148,tags:['extra'],text:'¿Cuál es la propiedad de balance del árbol AVL?',
options:['La raíz siempre tiene exactamente dos hijos','Para cada nodo, la diferencia entre las alturas de sus subárboles izquierdo y derecho es como máximo 1','Todos los nodos hoja están al mismo nivel','El árbol es siempre completo'],
correct:1,explanation:'Un árbol AVL satisface: para todo nodo n, |altura(n.left) - altura(n.right)| ≤ 1. Si esta propiedad se viola al insertar o eliminar, se realizan rotaciones para restablecer el balance.'},

{id:149,tags:['extra'],text:'¿Qué pasa cuando se elimina un nodo con dos hijos en un ABB según el criterio del "menor del subárbol derecho"?',
options:['Se elimina también el subárbol derecho completo','Se sustituye el valor del nodo por el menor del subárbol derecho, y luego se elimina ese menor recursivamente','Se mueve el nodo a una hoja y se elimina','Se sustituye por el hijo derecho directamente'],
correct:1,explanation:'Algoritmo: 1) Encontrar el menor del subárbol derecho (el más a la izquierda del subárbol derecho). 2) Copiar su valor al nodo a eliminar. 3) Eliminar ese nodo mínimo recursivamente (que tiene a lo sumo un hijo, el derecho).'},

{id:150,tags:['extra'],text:'¿Cuál es el número de operaciones elementales de <code>for(i=0;i<n;i++) for(j=0;j<n;j++) k++;</code>?',
options:['n','2n','n²','n³'],
correct:2,explanation:'El for externo itera n veces. Por cada iteración, el for interno también itera n veces ejecutando k++ (1 operación). Total: n × n = n² operaciones. La complejidad es O(N²).'},

{id:151,tags:['extra'],text:'¿Qué es el "activation record" en el contexto de la recursión?',
options:['Una variable global','Un registro creado en cada llamada a un método que guarda variables locales y el punto de retorno, almacenado en la pila de llamadas','El caso base de la recursión','El resultado final de la función recursiva'],
correct:1,explanation:'Cada llamada a un método crea un activation record (o stack frame) que contiene: variables locales, parámetros y la dirección de retorno. En recursión, cada llamada apila su propio registro. Cuando retorna, se desapila.'},

{id:152,tags:['extra'],text:'¿Cuál de estas afirmaciones sobre la interfaz Conjunto<T> es INCORRECTA?',
options:['Los métodos son implícitamente public y abstractos','Puede contener atributos de instancia no estáticos','Una clase la implementa con implements','Puede contener constantes static final'],
correct:1,explanation:'Una interfaz en Java NO puede tener atributos de instancia (variables de estado). Solo puede tener constantes (static final). Los métodos declarados en la interfaz son implícitamente public y abstract.'},

{id:153,tags:['extra'],text:'¿Qué hace el método <code>num_elem()</code> en la interfaz Conjunto?',
options:['Devuelve el número máximo de elementos posibles (MAX)','Devuelve el número de elementos actualmente en el conjunto','Devuelve el primer elemento','Devuelve el índice del último elemento'],
correct:1,explanation:'num_elem() devuelve numElementos, que es el contador de elementos actualmente almacenados en el conjunto. En Conjunto_Array su implementación es simplemente: return numElementos;'},

{id:154,tags:['extra'],text:'¿Por qué en el método pertenece() solo se itera hasta numElementos y no hasta datos.length?',
options:['Por eficiencia; más allá de numElementos las posiciones son null (vacías)','Porque datos.length siempre es 0','Por un error del programador','Porque MAX no se puede usar en bucles'],
correct:0,explanation:'El array datos[] tiene tamaño MAX=100, pero solo las posiciones 0 a numElementos-1 contienen elementos reales. Las posiciones numElementos a 99 son null. Iterar hasta datos.length haría comparaciones con null innecesariamente.'},

{id:155,tags:['extra'],text:'¿Qué es la "copia defensiva" y por qué se usa en devolver_arreglo()?',
options:['Copiar el código del programa para seguridad','Devolver una nueva copia del array para que modificaciones externas no afecten al estado interno del objeto','Duplicar el objeto completo','Una técnica de optimización de memoria'],
correct:1,explanation:'La copia defensiva protege la encapsulación: en lugar de devolver la referencia al array interno datos[], se devuelve un array nuevo con los mismos valores. Si el llamador modifica la copia, el conjunto original no se altera.'},

{id:156,tags:['extra'],text:'¿Cuál sería el output si c1={} (vacío) y c2={1,2,3} y se ejecuta c1.union(c2)?',
options:['Union: {}','Union: {1, 2, 3}','Error: el conjunto está vacío','Union: {0, 1, 2, 3}'],
correct:1,explanation:'union() itera sobre los elementos de c2 ([1,2,3]) y llama a this.agregar() para cada uno. Como c1 empieza vacío, los tres se añaden. Resultado en c1: {1, 2, 3}.'},

{id:157,tags:['extra'],text:'¿Cuál es la complejidad del método pertenece() en Conjunto_Array?',
options:['O(1)','O(log N)','O(N)','O(N²)'],
correct:2,explanation:'pertenece() recorre el array de 0 a numElementos-1 buscando el elemento. En el peor caso (elemento no está o es el último), compara con todos los numElementos elementos. Complejidad: O(N).'},

{id:158,tags:['extra'],text:'¿Cuál es la complejidad del método union() en Conjunto_Array si c1 tiene n elementos y c2 tiene m?',
options:['O(m)','O(n × m)','O(n + m)','O(1)'],
correct:1,explanation:'union() llama a agregar() una vez por cada elemento de c2 (m llamadas). Cada llamada a agregar() llama a pertenece() que es O(n) (tamaño de c1 que crece). En el peor caso: O(m × n).'},

{id:159,tags:['extra'],text:'¿Qué implication tiene declarar <code>private static final int MAX = 100</code> como atributo de Conjunto_Array?',
options:['Cada objeto tiene su propio MAX','MAX es una constante compartida por todos los objetos de la clase, con valor fijo de 100','MAX puede cambiar en tiempo de ejecución','Solo el método main puede acceder a MAX'],
correct:1,explanation:'private: solo accesible dentro de la clase. static: pertenece a la clase (no a cada instancia; hay un solo MAX). final: valor inmutable (no puede cambiar). Es una constante de clase: todos los Conjunto_Array comparten el mismo MAX=100.'},

{id:160,tags:['extra'],text:'¿Cuál es la diferencia entre <code>return</code> en un método <code>void</code> y en un método que devuelve un tipo?',
options:['En void no hay return; en otros sí','En void, return termina el método sin devolver valor; en otros, return debe devolver un valor del tipo declarado','Son idénticos','void puede devolver cualquier tipo'],
correct:1,explanation:'En un método void, se puede usar return; (sin valor) para salir anticipadamente, o simplemente no poner return y el método termina al final. En un método que devuelve tipo (int, boolean...), DEBE haber un return con un valor del tipo correcto.'},

// ── PREGUNTAS AVANZADAS ───────────────────────────────────────────────────
{id:161,tags:['extra'],text:'¿Cuál es el recorrido preorden del siguiente ABB: raíz 5, izquierda 3 (con hijos 1 y 4), derecha 7?',
options:['1, 3, 4, 5, 7','5, 3, 1, 4, 7','5, 7, 3, 4, 1','1, 4, 3, 7, 5'],
correct:1,explanation:'Preorden: raíz→izq→der. Visitar 5, luego preorden de subárbol izq (raíz 3): visitar 3, luego preorden de subárbol izq de 3 (raíz 1): visitar 1, luego preorden de subárbol der de 3: visitar 4. Luego preorden de subárbol der de 5: visitar 7. Resultado: 5, 3, 1, 4, 7.'},

{id:162,tags:['extra'],text:'¿Cuál es el recorrido postorden del mismo árbol (raíz 5, izq 3 con hijos 1 y 4, der 7)?',
options:['1, 4, 3, 7, 5','5, 3, 1, 4, 7','1, 3, 4, 5, 7','5, 7, 4, 3, 1'],
correct:0,explanation:'Postorden: izq→der→raíz. Postorden del subárbol izq (raíz 3): postorden de 1 (hoja: 1), postorden de 4 (hoja: 4), luego 3. Postorden del subárbol der de 5: 7. Luego 5. Resultado: 1, 4, 3, 7, 5.'},

{id:163,tags:['extra'],text:'¿Qué operación de la pila se usa para ver el elemento del tope SIN eliminarlo?',
options:['push()','pop()','peek() / top()','size()'],
correct:2,explanation:'peek() (o top() en algunos libros) devuelve el elemento del tope de la pila sin eliminarlo. pop() devuelve y elimina el tope. push() añade un elemento. Es importante la distinción: peek no modifica la pila.'},

{id:164,tags:['extra'],text:'¿Cuál es la diferencia entre una pila y una cola?',
options:['La pila tiene más capacidad','Pila es LIFO (último en entrar, primero en salir); cola es FIFO (primero en entrar, primero en salir)','Son la misma estructura con distinto nombre','La cola no permite eliminar elementos'],
correct:1,explanation:'Pila (Stack): LIFO — push añade al tope, pop extrae del tope. El último añadido es el primero en salir. Cola (Queue): FIFO — encolar añade al final, desencolar extrae del frente. El primero añadido es el primero en salir.'},

{id:165,tags:['extra'],text:'¿Cómo se puede verificar si una expresión tiene paréntesis equilibrados usando una pila?',
options:['Contando el número total de paréntesis','Recorrer la expresión: push para cada ( y pop para cada ); si al final la pila está vacía, están equilibrados','Usando un contador que suma 1 por ( y resta 1 por )','No se puede verificar con una pila'],
correct:1,explanation:'Algoritmo: recorrer la expresión carácter a carácter. Si es \'(\': push. Si es \')\': si la pila está vacía → desequilibrado; si no, pop. Al final, si la pila está vacía → equilibrado; si no → desequilibrado.'},

{id:166,tags:['extra'],text:'¿Cuál es la complejidad de agregar() en Conjunto_Array?',
options:['O(1)','O(log N)','O(N)','O(N²)'],
correct:2,explanation:'agregar() llama primero a pertenece() que es O(N). Si el elemento no está, lo añade en O(1). La complejidad total es dominada por pertenece(): O(N).'},

{id:167,tags:['extra'],text:'¿Cuándo se usa import en Java?',
options:['Para heredar de otra clase','Para usar clases de otros paquetes que no son java.lang','Para declarar variables globales','Para crear nuevos tipos primitivos'],
correct:1,explanation:'import permite usar clases de otros paquetes. Por ejemplo, import java.util.Scanner; permite usar Scanner en el código. Las clases del paquete java.lang (String, Math...) se importan automáticamente.'},

{id:168,tags:['extra'],text:'¿Qué es un "subárbol" de un árbol?',
options:['El nodo raíz solo','Cualquier nodo del árbol junto con todos sus descendientes, formando a su vez un árbol válido','Solo las hojas del árbol','El último nivel del árbol'],
correct:1,explanation:'Un subárbol es una parte del árbol que también es un árbol válido. Está formado por un nodo cualquiera (que actúa como raíz del subárbol) y todos sus descendientes. Los árboles son estructuras recursivas: cada subárbol es un árbol.'},

{id:169,tags:['extra'],text:'¿Qué hace el operador % (módulo) con números negativos? Ejemplo: <code>-7 % 3</code>',
options:['Devuelve 2','Devuelve -1','Devuelve 1','Lanza una excepción'],
correct:1,explanation:'En Java, el resultado del módulo tiene el mismo signo que el dividendo. -7 % 3 = -1 (porque -7 = -2 × 3 + (-1)). Esto difiere de algunos lenguajes que dan el resultado con el signo del divisor.'},

{id:170,tags:['extra'],text:'¿Qué diferencia hay entre declarar <code>int[] a</code> y crear el array con <code>new int[5]</code>?',
options:['Son lo mismo','Declarar solo crea la variable referencia (vale null); new int[5] crea el array en memoria y asigna la referencia','new int[5] crea una variable local; la declaración crea una global','No se puede separar la declaración de la creación'],
correct:1,explanation:'int[] a; — solo declara la variable a de tipo referencia a int[]. Está a null y no se puede usar. new int[5] — crea el array en el heap con 5 posiciones. a = new int[5] asigna esa referencia a a.'},

{id:171,tags:['extra'],text:'¿Qué valor tienen los elementos de un array <code>int[] a = new int[5]</code> antes de asignarles valores?',
options:['Valores aleatorios','null','0 (valor por defecto de int)','No definido'],
correct:2,explanation:'En Java, los arrays de tipos primitivos se inicializan automáticamente a sus valores por defecto: int[] → 0, double[] → 0.0, boolean[] → false. Los arrays de objetos (Integer[], String[]) se inicializan a null.'},

{id:172,tags:['extra'],text:'¿Cuál de estas afirmaciones sobre String en Java es CORRECTA?',
options:['String es un tipo primitivo','String es un tipo de referencia (clase)','String se declara con minúscula (string)','Los Strings no pueden concatenarse'],
correct:1,explanation:'String es una clase en Java (java.lang.String), por tanto es un tipo de referencia. Se escribe con S mayúscula. Se pueden concatenar con + y comparar con .equals(). A diferencia de C++, los Strings en Java son inmutables.'},

{id:173,tags:['extra'],text:'¿Qué sucede si se llama a pertenece() con un elemento null en Conjunto_Array?',
options:['Devuelve true','Devuelve false siempre','Puede lanzar NullPointerException en datos[i].equals(null)','El programa continúa normalmente'],
correct:2,explanation:'Si elemento es null y se llama datos[i].equals(null): si datos[i] no es null, equals(null) devuelve false (correcto). Pero si datos[i] es null, se lanzaría NullPointerException. Sería necesario manejar este caso.'},

{id:174,tags:['extra'],text:'¿Qué es la "recursión de cola" (tail recursion)?',
options:['Una recursión que no tiene caso base','Una recursión donde la llamada recursiva es la ÚLTIMA operación del método (ninguna operación pendiente al retornar)','Una recursión con dos llamadas recursivas','Una recursión con bucle for'],
correct:1,explanation:'La recursión de cola (tail recursion) ocurre cuando la llamada recursiva es la última instrucción y no hay operaciones pendientes al retornar. Algunos compiladores la optimizan como iteración. El factorial recursivo simple NO es de cola porque hay una multiplicación pendiente al retornar.'},

{id:175,tags:['extra'],text:'¿Cuál es la complejidad del método toString() en Conjunto_Array?',
options:['O(1)','O(log N)','O(N)','O(N²)'],
correct:2,explanation:'toString() construye la cadena recorriendo todos los numElementos elementos del array. Concatenar strings en un bucle también es O(N) (o más si se usa concatenación con +). La complejidad total es O(N).'},

{id:176,tags:['extra'],text:'Un árbol binario completo de altura h, ¿cuántos nodos máximos puede tener?',
options:['h','h²','2^(h+1) - 1','2h + 1'],
correct:2,explanation:'Un árbol binario completo de altura h tiene como máximo 2^(h+1) - 1 nodos (todos los niveles llenos). Por ejemplo, h=0: 1 nodo. h=1: 3 nodos. h=2: 7 nodos = 2³-1.'},

{id:177,tags:['extra'],text:'¿Qué es el "principio de sustitución de Liskov" (aunque no se nombre en los apuntes)?',
options:['Los objetos de una subclase deben poder sustituir a objetos de su superclase sin alterar el comportamiento correcto del programa','Solo los constructores se heredan','Las interfaces no pueden tener constantes','La herencia es siempre correcta'],
correct:0,explanation:'Si tienes Conjunto<Integer> c = new Conjunto_Array(), puedes usar c como cualquier Conjunto<Integer>. El código que usa la interfaz no necesita saber si es un array, árbol AVL, etc. Esto es lo que hace útiles las interfaces.'},

{id:178,tags:['extra'],text:'¿Cuál es el comportamiento del método equals() heredado de Object vs el implementado en Integer?',
options:['Son idénticos','Object.equals() compara referencias; Integer.equals() compara el valor numérico','Integer no tiene equals()','Object.equals() compara valores numéricos'],
correct:1,explanation:'Object.equals() compara si dos referencias apuntan al mismo objeto (== de referencias). Integer.equals() compara el valor entero representado. Por eso datos[i].equals(elemento) funciona correctamente para comparar valores Integer.'},

{id:179,tags:['extra'],text:'Si se insertan en orden los valores 1, 2, 3, 4, 5 en un ABB, ¿qué forma tiene el árbol?',
options:['Un árbol balanceado con raíz 3','Una lista enlazada (árbol degenerado) hacia la derecha','Un árbol con raíz 1 y hijos 2 y 3','Un árbol completo'],
correct:1,explanation:'Si se insertan en orden creciente, cada nuevo elemento es mayor que todos los anteriores y se inserta siempre como hijo derecho. El resultado es una cadena hacia la derecha: 1→2→3→4→5. Altura N-1 = 4 en lugar de log₂5 ≈ 2.3.'},

{id:180,tags:['extra'],text:'¿Cuál sería la complejidad de buscar en el ABB degenerado del ejercicio anterior?',
options:['O(log 5) = O(1)','O(5) = O(N)','O(1)','O(25)'],
correct:1,explanation:'En el árbol degenerado (lista hacia la derecha con 5 elementos), buscar el elemento 5 (el último) requiere seguir 4 punteros: 1→2→3→4→5. En general, la búsqueda en un árbol degenerado de N elementos es O(N).'},

{id:181,tags:['extra'],text:'¿Qué hace <code>teclado.nextInt()</code> si el usuario escribe texto en lugar de un número?',
options:['Devuelve 0','Devuelve null','Lanza InputMismatchException','Lee el siguiente número ignorando el texto'],
correct:2,explanation:'Si el usuario escribe texto donde nextInt() espera un entero, se lanza InputMismatchException en tiempo de ejecución. Para evitarlo se puede usar un try-catch o nextLine() + Integer.parseInt().'},

{id:182,tags:['extra'],text:'¿Cuál es la diferencia entre la interfaz definida en los apuntes y las restricciones de la práctica? La interfaz usa <T> pero la clase implementa Conjunto<Integer>. ¿Por qué?',
options:['Error del enunciado','<T> hace la interfaz genérica (reutilizable); al implementarla con <Integer> se especifica el tipo concreto','La interfaz solo funciona con Integer','<T> y <Integer> son lo mismo'],
correct:1,explanation:'La interfaz Conjunto<T> es genérica: podría usarse con cualquier tipo. Al escribir class Conjunto_Array implements Conjunto<Integer>, se fija T=Integer para esta implementación concreta. Así la clase almacena solo enteros, pero la interfaz podría reutilizarse para otros tipos.'},

{id:183,tags:['extra'],text:'¿Cuántas veces se ejecuta el cuerpo del for en: <code>for(int i=0; i<numElementos; i++)</code> cuando el conjunto tiene 5 elementos?',
options:['4','5','6','Depende del contenido'],
correct:1,explanation:'El bucle va desde i=0 hasta i=numElementos-1 (es decir, i<numElementos). Con numElementos=5, i toma los valores 0,1,2,3,4 → 5 iteraciones. El cuerpo se ejecuta exactamente numElementos veces.'},

{id:184,tags:['extra'],text:'¿Qué es un "hermano" (sibling) en terminología de árboles?',
options:['El padre de un nodo','Nodos que están al mismo nivel del árbol','Nodos que comparten el mismo padre','Los hijos de la raíz'],
correct:2,explanation:'En un árbol, dos nodos son hermanos (siblings) si tienen el mismo padre. Por ejemplo, si 2 y 8 son hijos de 6 (raíz), entonces 2 y 8 son hermanos entre sí. No basta con estar al mismo nivel; deben compartir padre.'},

{id:185,tags:['extra'],text:'¿Cuál es la complejidad de insertar un elemento al FINAL de una lista enlazada simple (sin centinela de cola)?',
options:['O(1)','O(log N)','O(N)','O(N²)'],
correct:2,explanation:'Sin referencia al último nodo, para insertar al final hay que recorrer toda la lista desde el principio hasta encontrar el último nodo (el que tiene siguiente = null). Esto es O(N). Con una referencia al último nodo (centinela de cola), sería O(1).'},

{id:186,tags:['extra'],text:'¿Qué ventaja aporta el recorrido inorden en un ABB para ordenar datos?',
options:['Permite obtener los datos en orden ascendente sin necesidad de un algoritmo de ordenación separado','Es más rápido que cualquier algoritmo de ordenación','Reordena el árbol','Permite buscar el elemento mínimo'],
correct:0,explanation:'El recorrido inorden de un ABB produce los elementos en orden ascendente (propiedad del ABB). Si se tienen N datos y se insertan en un ABB, el recorrido inorden los lista ordenados en O(N). La construcción del ABB cuesta O(N log N) con un árbol balanceado.'},

{id:187,tags:['extra'],text:'¿Qué es "Theta de N" (Θ(N)) en el análisis de algoritmos?',
options:['Un límite superior','Un límite inferior','Una cota exacta: el algoritmo crece exactamente como N para entradas grandes','El número de operaciones exactas'],
correct:2,explanation:'Θ(f(N)) (Theta) es la cota exacta: el algoritmo crece exactamente como f(N) para N grande. Implica que T(N) = O(f(N)) Y T(N) = Ω(f(N)). Es más informativo que solo O-grande.'},

{id:188,tags:['extra'],text:'¿Cuál es la forma de calcular la altura de un árbol binario recursivamente?',
options:['Contar todos los nodos','Si el árbol es vacío → -1; si no → 1 + max(altura(izquierdo), altura(derecho))','Contar solo las hojas','Contar los nodos de la mitad'],
correct:1,explanation:'Definición recursiva de la altura: caso base (árbol vacío) → -1. Caso recursivo → 1 + max(altura(subárbol izquierdo), altura(subárbol derecho)). Esta naturaleza recursiva hace que los árboles se procesen fácilmente de forma recursiva.'},

{id:189,tags:['extra'],text:'En la práctica, el main tiene: <code>Conjunto<Integer> c1 = new Conjunto_Array();</code> ¿Por qué c1 es de tipo interfaz y no de tipo Conjunto_Array?',
options:['Por error del programador','Para aprovechar el polimorfismo: el código que usa c1 no depende de la implementación concreta','Porque Conjunto_Array no tiene constructor','Porque Conjunto<Integer> es un tipo primitivo'],
correct:1,explanation:'Programar contra la interfaz (no la implementación) es una buena práctica: si en el futuro se cambia Conjunto_Array por una implementación con árbol AVL, el código del main no necesita modificarse, solo se cambia la línea new Conjunto_Array().'},

{id:190,tags:['extra'],text:'¿Cuál es la complejidad del algoritmo para encontrar el k-ésimo menor elemento en un ABB con campo "size" en cada nodo?',
options:['O(N²)','O(N)','O(log N) si el árbol está balanceado','O(1)'],
correct:1,explanation:'Con un campo size en cada nodo (número de nodos en su subárbol), se puede encontrar el k-ésimo menor en O(N) en el caso general (siguiendo un camino desde la raíz). Si el árbol está balanceado, el camino es O(log N).'},

{id:191,tags:['extra'],text:'¿Cuántos nodos tiene el árbol: raíz 6, hijos 2 y 8; 2 con hijos 1 y 5; 5 con hijo izquierdo 3?',
options:['5','6','7','8'],
correct:1,explanation:'Contando los nodos: 6 (raíz), 2, 8, 1, 5, 3. Total = 6 nodos. Por tanto el árbol tiene 6-1 = 5 arcos.'},

{id:192,tags:['extra'],text:'¿Cuál es la diferencia entre la recursión de Fibonacci simple (exponencial) y la versión con memoización?',
options:['No hay diferencia','La memoización guarda resultados ya calculados evitando recalcularlos, reduciendo de O(2ᴺ) a O(N)','La memoización es siempre más lenta','La versión simple es más precisa'],
correct:1,explanation:'Fibonacci recursivo simple recalcula los mismos subproblemas múltiples veces → O(2ᴺ). Con memoización (guardar fib(k) en un array la primera vez), cada valor se calcula una sola vez → O(N). Es el principio de la programación dinámica.'},

{id:193,tags:['extra'],text:'¿Qué ocurre en el ABB si se hace remove() del único elemento (la raíz con dos hijos nulos)?',
options:['El árbol queda vacío (null)','La raíz queda como nodo hoja','Se lanza una excepción','El árbol no cambia'],
correct:0,explanation:'Si se elimina el único nodo del árbol (la raíz que es una hoja, sin hijos), el árbol queda vacío. En la implementación recursiva, el método devuelve null y la raíz del árbol pasa a ser null.'},

{id:194,tags:['extra'],text:'¿Cuál es el orden correcto de las instrucciones para insertar un elemento en Conjunto_Array?',
options:['datos[numElementos] = elemento; numElementos++;','numElementos++; datos[numElementos] = elemento;','Solo datos[numElementos] = elemento;','Solo numElementos++;'],
correct:0,explanation:'Primero se guarda el elemento en datos[numElementos] (posición actual libre), y luego se incrementa numElementos. Si fuera al revés (numElementos++ primero), se guardaría en la posición siguiente y se perdería la actual.'},

{id:195,tags:['extra'],text:'¿Cuál es la altura del árbol con los nodos: raíz 6, hijos 2 y 8; 2 con hijos 1 y 5; 5 con hijo izquierdo 3?',
options:['2','3','4','1'],
correct:1,explanation:'La altura de la raíz (6) es el camino más largo hasta una hoja. Caminos desde la raíz: 6→8 (longitud 1), 6→2→1 (longitud 2), 6→2→5→3 (longitud 3). El más largo es 3. Altura = 3.'},

{id:196,tags:['extra'],text:'¿Por qué el recorrido de un árbol se implementa naturalmente de forma recursiva?',
options:['Por convención del lenguaje Java','Porque un árbol se define recursivamente: cada subárbol es un árbol, y el mismo algoritmo se aplica a cada subárbol','Porque los bucles no funcionan con árboles','Por razones de eficiencia'],
correct:1,explanation:'La estructura recursiva del árbol (cada nodo tiene subárboles que son también árboles) hace que los algoritmos recursivos sean la solución natural. visitar(n) = procesar n + visitar(subárbol_izquierdo) + visitar(subárbol_derecho).'},

{id:197,tags:['extra'],text:'¿Qué es la "regla 1" del análisis de algoritmos para sumar complejidades?',
options:['T1+T2 = O(T1 × T2)','T1(N) + T2(N) = O(max(f(N), g(N))): el resultado es el orden del término dominante','T1+T2 = O(T1)','T1+T2 = O(T1+T2) siempre'],
correct:1,explanation:'Si T1(N) = O(f(N)) y T2(N) = O(g(N)), entonces T1+T2 = O(max(f(N),g(N))). Solo importa el término de mayor crecimiento. Ejemplo: O(N²) + O(N) = O(N²).'},

{id:198,tags:['extra'],text:'¿Cuál de estas expresiones es O(N²) según la jerarquía Big-O?',
options:['1000N (es O(N))','log N (es O(log N))','N² + 100N + 50 (es O(N²))','2ᴺ (es O(2ᴺ))'],
correct:2,explanation:'N² + 100N + 50: el término dominante es N². Los términos de menor grado (100N, 50) se ignoran en Big-O. Resultado: O(N²). Las otras opciones son O(N), O(log N) y O(2ᴺ) respectivamente.'},

{id:199,tags:['extra'],text:'¿Cuál es la única operación que un método void NO puede usar?',
options:['Llamar a otros métodos','return valor (con un valor del tipo que no es void)','Usar bucles','Declarar variables locales'],

// ─── STATE ─────────────────────────────────────────────────────────────────
let answered = {}; // id → {correct: bool, firstTry: bool}
let wrongIds = new Set();
let triedOptions = {}; // id → Set of tried option indices
let currentFilter = 'all';
let displayOrder = QUESTIONS.map(q => q.id);

function updateStats() {
  const ok = Object.values(answered).filter(v => v && v.correct && v.firstTry).length;
  const ko = wrongIds.size;
  const done = Object.values(answered).filter(v => v && v.correct).length;
  const left = QUESTIONS.length - done - (ko - done > 0 ? ko - done : 0);
  const leftReal = QUESTIONS.length - Object.values(answered).filter(v => v && v.correct).length;
  document.getElementById('stat-ok').textContent = ok;
  document.getElementById('stat-ko').textContent = ko;
  document.getElementById('stat-left').textContent = leftReal;
  const total = QUESTIONS.length;
  const donePct = Object.values(answered).filter(v => v && v.correct).length;
  const pct = Math.round(donePct / total * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-txt').textContent = donePct + ' / ' + total;
}

function buildQuestion(q) {
  const div = document.createElement('div');
  div.className = 'q-card';
  div.id = 'card-' + q.id;

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'q-header';
  const num = document.createElement('span');
  num.className = 'q-num';
  num.textContent = '#' + q.id;
  const txt = document.createElement('div');
  txt.className = 'q-text';
  txt.innerHTML = q.text;
  hdr.appendChild(num); hdr.appendChild(txt);
  div.appendChild(hdr);

  // Tags
  const tgWrap = document.createElement('div');
  tgWrap.className = 'q-tags';
  q.tags.forEach(t => {
    const tg = document.createElement('span');
    tg.className = 'tag tag-' + t;
    tg.textContent = t === 'repaso' ? '🔴 Repaso' : t === 'practica' ? '🔵 Práctica Java' : '🟢 Extra';
    tgWrap.appendChild(tg);
  });
  div.appendChild(tgWrap);

  // Options
  const opts = document.createElement('div');
  opts.className = 'q-options';
  const letters = ['A','B','C','D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('div');
    btn.className = 'option';
    btn.id = 'opt-' + q.id + '-' + i;
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span class="opt-text">${opt}</span>`;
    btn.addEventListener('click', () => handleAnswer(q, i, btn));
    opts.appendChild(btn);
  });
  div.appendChild(opts);

  // Feedback
  const fb = document.createElement('div');
  fb.className = 'feedback';
  fb.id = 'fb-' + q.id;
  div.appendChild(fb);

  return div;
}

function handleAnswer(q, selected, btn) {
  // If already answered correctly → locked
  if (answered[q.id] !== undefined && answered[q.id].correct) return;
  // If this exact option was already tried → ignore re-click
  if (!triedOptions[q.id]) triedOptions[q.id] = new Set();
  if (triedOptions[q.id].has(selected)) return;

  const isCorrect = selected === q.correct;
  triedOptions[q.id].add(selected);

  const card = document.getElementById('card-' + q.id);
  const fb = document.getElementById('fb-' + q.id);

  if (isCorrect) {
    // ── CORRECT ──────────────────────────────────────────────
    const firstTry = triedOptions[q.id].size === 1; // no wrong attempts before
    answered[q.id] = { correct: true, firstTry };
    if (firstTry) {
      // Count as correct in stats only if first try
    } else {
      // Answered eventually — mark as wrong for stats (already added to wrongIds)
    }

    // Lock ALL options
    const allOpts = document.querySelectorAll('[id^="opt-' + q.id + '-"]');
    allOpts.forEach(o => o.classList.add('disabled'));
    btn.classList.add('correct-ans');
    card.classList.remove('answered-wrong');
    card.classList.add(firstTry ? 'answered-correct' : 'answered-wrong');

    fb.className = 'feedback ' + (firstTry ? 'correct' : 'wrong');
    fb.innerHTML = (firstTry
      ? '✅ <strong>¡Correcto a la primera!</strong> '
      : '✅ <strong>Correcto, pero no a la primera.</strong> ') + q.explanation;

    if (firstTry) {
      // Remove from wrongIds if somehow there
      wrongIds.delete(q.id);
    }
    updateStats();

  } else {
    // ── WRONG ────────────────────────────────────────────────
    if (!answered[q.id]) {
      // First wrong attempt — mark in stats
      wrongIds.add(q.id);
      answered[q.id] = { correct: false, firstTry: false };
      updateStats();
    }

    // Mark THIS option as tried (dimmed) but keep others clickable
    btn.classList.add('tried');
    card.classList.add('answered-wrong');

    // Show feedback without locking
    const tries = triedOptions[q.id].size;
    fb.className = 'feedback wrong';
    fb.innerHTML = '❌ <strong>Incorrecto.</strong> Intento ' + tries + '/4 — sigue intentándolo o revisa las otras opciones.';
  }
}

function filterQuestions(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuestions();
}

function renderQuestions() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  let toShow;
  if (currentFilter === 'all') toShow = displayOrder.map(id => QUESTIONS.find(q => q.id === id));
  else if (currentFilter === 'wrong') toShow = displayOrder.map(id => QUESTIONS.find(q => q.id === id)).filter(q => wrongIds.has(q.id) && !(answered[q.id] && answered[q.id].correct && answered[q.id].firstTry));
  else toShow = displayOrder.map(id => QUESTIONS.find(q => q.id === id)).filter(q => q.tags.includes(currentFilter));

  // Group by type
  const groups = { repaso: [], practica: [], extra: [] };
  toShow.forEach(q => {
    const tag = q.tags[0];
    groups[tag].push(q);
  });

  const groupLabels = { repaso: '🔴 Del Repaso Oficial & Actividades', practica: '🔵 De la Práctica Java (Prueba_Conjunto & ABB)', extra: '🟢 Preguntas Adicionales (basadas en los apuntes)' };

  Object.entries(groups).forEach(([type, qs]) => {
    if (qs.length === 0) return;
    const sec = document.createElement('div');
    sec.className = 'section-header';
    sec.textContent = groupLabels[type] + ' (' + qs.length + ')';
    main.appendChild(sec);
    qs.forEach(q => {
      const card = buildQuestion(q);
      // Restore state if answered
      if (answered[q.id] !== undefined && answered[q.id].correct) {
        restoreState(q, card);
      }
      main.appendChild(card);
    });
  });

  if (toShow.length === 0) {
    main.innerHTML = '<p style="color:var(--text-muted);text-align:center;margin-top:60px">No hay preguntas en esta categoría aún.</p>';
  }
}

function restoreState(q, card) {
  const state = answered[q.id];
  const isCorrect = state && state.correct;
  const firstTry = state && state.firstTry;
  const allOpts = card.querySelectorAll('.option');
  allOpts.forEach(o => o.classList.add('disabled'));

  const correctOpt = card.querySelector('#opt-' + q.id + '-' + q.correct);
  if (correctOpt) correctOpt.classList.add('correct-ans');
  card.classList.add((isCorrect && firstTry) ? 'answered-correct' : 'answered-wrong');

  const fb = card.querySelector('.feedback');
  if (fb) {
    const cls = (isCorrect && firstTry) ? 'correct' : 'wrong';
    fb.className = 'feedback ' + cls;
    fb.innerHTML = (isCorrect && firstTry
      ? '✅ <strong>¡Correcto a la primera!</strong> '
      : isCorrect
        ? '✅ <strong>Correcto, pero no a la primera.</strong> '
        : '❌ <strong>Incorrecto.</strong> ') + q.explanation;
  }
}

function shuffleAll() {
  for (let i = displayOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [displayOrder[i], displayOrder[j]] = [displayOrder[j], displayOrder[i]];
  }
  renderQuestions();
}

function resetAll() {
  if (!confirm('¿Reiniciar todo el test? Se perderá el progreso actual.')) return;
  answered = {};
  wrongIds = new Set();
  triedOptions = {};
  displayOrder = QUESTIONS.map(q => q.id);
  updateStats();
  renderQuestions();
}

// Init
renderQuestions();
updateStats();
</script>
